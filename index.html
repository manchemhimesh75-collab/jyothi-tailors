                        <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
                    </button>
                    
                    <form onSubmit={handleSubmit} className="space-y-6">
                        {/* Client Details */}
                        <div className="glass-card rounded-3xl p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4"><i className="fa-solid fa-user-circle text-brand-600 mr-2"></i> Client Information</h3>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Mobile Number</label>
                                <input type="tel" value={searchPhone} onChange={e=>setSearchPhone(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none font-medium" placeholder="Search or enter 10-digit number" maxLength="10" required />
                                {selectedCustomer && (
                                    <p className="text-sm font-medium text-green-600 mt-2 flex items-center gap-1"><i className="fa-solid fa-check-circle"></i> Found existing profile: {selectedCustomer.name}</p>
                                )}
                                {!selectedCustomer && searchPhone.length >= 10 && (
                                    <p className="text-sm font-medium text-amber-600 mt-2"><i className="fa-solid fa-info-circle"></i> New client profile will be created for this number.</p>
                                )}
                            </div>
                        </div>

                        {/* Order Items */}
                        <div className="glass-card rounded-3xl p-6 shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-scissors text-brand-600 mr-2"></i> Garment Details</h3>
                            </div>
                            
                            <div className="space-y-4">
                                {items.map((item, idx) => (
                                    <div key={idx} className="bg-slate-50 p-4 rounded-2xl border border-slate-200 relative">
                                        {items.length > 1 && (
                                            <button type="button" onClick={() => removeItem(idx)} className="absolute top-4 right-4 text-slate-400 hover:text-red-500">
                                                <i className="fa-solid fa-times-circle"></i>
                                            </button>
                                        )}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-500 mb-1">Category</label>
                                                <select value={item.category} onChange={e => updateItem(idx, 'category', e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm">
                                                    {ITEM_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Quantity</label>
                                                    <input type="number" min="1" value={item.quantity} onChange={e => updateItem(idx, 'quantity', e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm" required />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Price (per unit)</label>
                                                    <input type="number" min="0" value={item.price} onChange={e => updateItem(idx, 'price', e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm" required />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mb-4">
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Design Specs / Measurements</label>
                                            <textarea value={item.description} onChange={e => updateItem(idx, 'description', e.target.value)} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm resize-none h-20" placeholder="Fabric details, exact measurements, styling requests..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Reference Design Sketch</label>
                                            <div className="flex items-center gap-4">
                                                {item.images.length > 0 && <img src={item.images[0]} alt="Ref" className="w-12 h-12 rounded object-cover border border-slate-200" />}
                                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(idx, e)} className="text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 cursor-pointer" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <Button type="button" variant="outline" onClick={addItem} className="w-full mt-4 border-dashed py-3" icon="fa-plus">Add Another Garment</Button>
                        </div>

                        {/* Scheduling & Payment */}
                        <div className="glass-card rounded-3xl p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4"><i className="fa-solid fa-calendar-check text-brand-600 mr-2"></i> Scheduling & Payment</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-2">Expected Delivery Date</label>
                                    <input type="date" value={expectedDate} onChange={e=>setExpectedDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium" required />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-2">Advance Paid (₹)</label>
                                    <input type="number" min="0" value={amountPaid} onChange={e=>setAmountPaid(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium" />
                                </div>
                            </div>
                            
                            <div className="bg-slate-800 text-white p-5 rounded-2xl flex justify-between items-center">
                                <div>
                                    <p className="text-xs text-slate-400 font-medium mb-1">Total Bill Amount</p>
                                    <p className="text-2xl font-bold">₹{totalAmount}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-slate-400 font-medium mb-1">Balance Due</p>
                                    <p className="text-xl font-bold text-accent-500">₹{totalAmount - (parseFloat(amountPaid) || 0)}</p>
                                </div>
                            </div>
                        </div>

                        <Button type="submit" className="w-full py-4 text-lg" icon="fa-check-circle">Confirm & Generate Order</Button>
                    </form>
                </div>
            );
        };

        // --- MAIN APP CONTROLLER ---
        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null); 
            const [orders, setOrders] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [toast, setToast] = useState(null);
            
            // Firebase State References
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [isLiveMode, setIsLiveMode] = useState(false);
            const [otpSent, setOtpSent] = useState(false);
            const confirmationResultRef = useRef(null);
            const recaptchaVerifierRef = useRef(null);

            const showToast = (message, type = 'info') => setToast({ message, type });

            // Initialize connection to Firebase or Fallback
            useEffect(() => {
                const initializeFirebase = async () => {
                    // Check if Firebase is provided by Web Sandbox Config
                    const hasConfig = typeof __firebase_config !== 'undefined' && __firebase_config;
                    
                    if (hasConfig && window.FirebaseSDK) {
                        try {
                            const { initializeApp, getAuth, getFirestore, signInAnonymously, signInWithCustomToken } = window.FirebaseSDK;
                            const config = JSON.parse(__firebase_config);
                            const app = initializeApp(config);
                            const db = getFirestore(app);
                            const auth = getAuth(app);
                            
                            window.firebaseAppInstance = app;
                            window.firebaseDbInstance = db;
                            window.firebaseAuthInstance = auth;

                            // Rule 3: Auth Before Queries
                            const hasInitialToken = typeof __initial_auth_token !== 'undefined' && __initial_auth_token;
                            if (hasInitialToken) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }

                            setIsLiveMode(true);
                            setFirebaseReady(true);
                            showToast("Connected to live secure cloud server.", "success");
                        } catch (err) {
                            console.error("Firebase startup issues:", err);
                            setupFallbackData();
                        }
                    } else {
                        setupFallbackData();
                    }
                };

                const setupFallbackData = () => {
                    const localOrders = localStorage.getItem('ja_orders');
                    const localCustomers = localStorage.getItem('ja_customers');
                    const localGallery = localStorage.getItem('ja_gallery');
                    
                    if (localOrders && localCustomers) {
                        setOrders(JSON.parse(localOrders));
                        setCustomers(JSON.parse(localCustomers));
                    } else {
                        setOrders(initialOrders);
                        setCustomers(initialCustomers);
                        localStorage.setItem('ja_orders', JSON.stringify(initialOrders));
                        localStorage.setItem('ja_customers', JSON.stringify(initialCustomers));
                    }

                    if (localGallery) {
                        setGallery(JSON.parse(localGallery));
                    } else {
                        setGallery(initialGallery);
                        localStorage.setItem('ja_gallery', JSON.stringify(initialGallery));
                    }
                    
                    const savedUser = localStorage.getItem('ja_user');
                    if (savedUser) {
                        const parsed = JSON.parse(savedUser);
                        setUser(parsed);
                        setView(parsed.role === 'admin' ? 'ownerDash' : 'clientDash');
                    }
                    setFirebaseReady(true);
                };

                // Listen for modular SDK ready trigger
                if (window.FirebaseSDK) {
                    initializeFirebase();
                } else {
                    window.addEventListener('FirebaseSDKReady', initializeFirebase);
                }

                return () => {
                    window.removeEventListener('FirebaseSDKReady', initializeFirebase);
                };
            }, []);

            // Firebase Live Snapshot Listeners (Rule 1 & Rule 2 compliant)
            useEffect(() => {
                if (!isLiveMode || !firebaseReady) return;
                
                const db = window.firebaseDbInstance;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                const { onSnapshot, collection, query } = window.FirebaseSDK;

                // Rule 1: Strict Paths
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const customersRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                const galleryRef = collection(db, 'artifacts', appId, 'public', 'data', 'gallery');

                // Rule 2: Simple queries, fetch all and filter in memory
                const unsubOrders = onSnapshot(query(ordersRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setOrders(list.length ? list : initialOrders);
                }, (err) => console.error("Orders sync error:", err));

                const unsubCustomers = onSnapshot(query(customersRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setCustomers(list.length ? list : initialCustomers);
                }, (err) => console.error("Customers sync error:", err));

                const unsubGallery = onSnapshot(query(galleryRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setGallery(list.length ? list : initialGallery);
                }, (err) => console.error("Gallery sync error:", err));

                return () => {
                    unsubOrders();
                    unsubCustomers();
                    unsubGallery();
                };
            }, [isLiveMode, firebaseReady]);

            // --- REAL SMS OTP MANAGEMENT ---
            const triggerSendOTP = async (phoneNumber) => {
                if (!isLiveMode) {
                    // Fallback simulated OTP mode if configuration isn't connected yet
                    showToast("Simulated verification path trigger.", "info");
                    setTimeout(() => {
                        setOtpSent(true);
                        showToast("Simulated code sent! Use any 6 digits.", "success");
                    }, 1000);
                    return;
                }

                const auth = window.firebaseAuthInstance;
                const { RecaptchaVerifier, signInWithPhoneNumber } = window.FirebaseSDK;

                try {
                    if (!recaptchaVerifierRef.current) {
                        recaptchaVerifierRef.current = new RecaptchaVerifier(auth, 'recaptcha-container', {
                            size: 'invisible',
                            callback: () => {}
                        });
                    }

                    // Format local number to standard international dial format
                    const formattedNum = phoneNumber.startsWith('+') ? phoneNumber : `+91${phoneNumber}`;
                    const confirmationResult = await signInWithPhoneNumber(auth, formattedNum, recaptchaVerifierRef.current);
                    
                    confirmationResultRef.current = confirmationResult;
                    setOtpSent(true);
                    showToast("SMS Verification code delivered!", "success");
                } catch (error) {
                    console.error("SMS verification failed:", error);
                    showToast(`SMS failed. Enable Phone Authentication in your Firebase Console.`, "error");
                }
            };

            const triggerVerifyOTP = async (otpCode) => {
                if (!isLiveMode) {
                    // Simulated sign in
                    const savedUser = { role: 'client', phone: '9876543210' };
                    setUser(savedUser);
                    localStorage.setItem('ja_user', JSON.stringify(savedUser));
                    setView('clientDash');
                    setOtpSent(false);
                    showToast("Successfully signed in.", "success");
                    return;
                }

                try {
                    const result = await confirmationResultRef.current.confirm(otpCode);
                    const savedUser = { role: 'client', phone: result.user.phoneNumber };
                    setUser(savedUser);
                    setView('clientDash');
                    setOtpSent(false);
                    showToast("Authenticated successfully!", "success");
                } catch (error) {
                    console.error("Incorrect verification code:", error);
                    showToast("Invalid OTP Code. Please re-enter.", "error");
                }
            };

            // --- REAL FIREBASE PERSISTENCE (Firestore) ---
            const addCustomer = async (customer) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                    const { doc, setDoc } = window.FirebaseSDK;
                    
                    // Create document on path structure
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', customer.id), customer);
                } else {
                    const updated = [...customers, customer];
                    setCustomers(updated);
                    localStorage.setItem('ja_customers', JSON.stringify(updated));
                }
            };
            
            const addOrder = async (order) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                    const { doc, setDoc } = window.FirebaseSDK;
                    
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), order);
                } else {
                    const updated = [order, ...orders];
                    setOrders(updated);
                    localStorage.setItem('ja_orders', JSON.stringify(updated));
                }
            };

            const addGalleryItem = async (item) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                    const { doc, setDoc } = window.FirebaseSDK;
                    
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', item.id), item);
                } else {
                    const updated = [item, ...gallery];
                    setGallery(updated);
                    localStorage.setItem('ja_gallery', JSON.stringify(updated));
                }
            };
            
            const deleteGalleryItem = async (id) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', id));
                } else {
                    const updated = gallery.filter(item => item.id !== id);
                    setGallery(updated);
                    localStorage.setItem('ja_gallery', JSON.stringify(updated));
                }
                showToast('Item removed from portfolio.', 'success');
            };
            
            const updateOrderStatus = async (orderId, newStatus) => {
                const targetOrder = orders.find(o => o.id === orderId);
                if (!targetOrder) return;

                const updatedData = { ...targetOrder, status: newStatus };
                if (newStatus === 'Delivered') updatedData.deliveryDate = new Date().toISOString();

                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-atelier';
                    const { doc, setDoc } = window.FirebaseSDK;
                    
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId), updatedData);
                } else {
                    const updated = orders.map(o => o.id === orderId ? updatedData : o);
                    setOrders(updated);
                    localStorage.setItem('ja_orders', JSON.stringify(updated));
                }
                showToast(`Order status updated to ${newStatus}`, 'success');
            };

            const handleLogin = (role, phone) => {
                const userData = { role, phone };
                setUser(userData);
                localStorage.setItem('ja_user', JSON.stringify(userData));
                setView(role === 'admin' ? 'ownerDash' : 'clientDash');
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('ja_user');
                setView('login');
            };

            if (!firebaseReady) return <div className="min-h-screen flex items-center justify-center text-brand-900 font-bold text-xl"><i className="fa-solid fa-circle-notch fa-spin mr-3"></i> Syncing security systems...</div>;

            return (
                <div className="min-h-screen flex flex-col relative">
                    {/* Header bar for internal views */}
                    {view !== 'login' && (
                        <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 bg-brand-900 text-accent-500 rounded-lg flex items-center justify-center font-serif font-bold shadow-sm">J</div>
                                    <span className="font-serif font-bold text-slate-800 tracking-wide">{SHOP_NAME}</span>
                                </div>
                                {user?.role === 'admin' && (
                                    <span className="text-xs font-bold uppercase tracking-widest text-brand-600 bg-brand-50 px-2 py-1 rounded">Owner Mode</span>
                                )}
                            </div>
                        </header>
                    )}

                    {/* View Router */}
                    <main className="flex-1">
                        {view === 'login' && (
                            <LoginView 
                                onLogin={handleLogin} 
                                showToast={showToast} 
                                authReady={isLiveMode} 
                                sendOTP={triggerSendOTP} 
                                verifyOTP={triggerVerifyOTP}
                                otpSent={otpSent}
                            />
                        )}
                        {view === 'clientDash' && <ClientDashboard phone={user?.phone} orders={orders} gallery={gallery} logout={handleLogout} />}
                        {view === 'ownerDash' && <OwnerDashboard orders={orders} customers={customers} gallery={gallery} setView={setView} updateOrderStatus={updateOrderStatus} logout={handleLogout} showToast={showToast} addGalleryItem={addGalleryItem} deleteGalleryItem={deleteGalleryItem} isLive={isLiveMode} />}
                        {view === 'newCustomer' && <NewCustomerForm setView={setView} addCustomer={addCustomer} showToast={showToast} />}
                        {view === 'newOrder' && <NewOrderForm setView={setView} addOrder={addOrder} customers={customers} showToast={showToast} />}
                    </main>

                    {/* Global Toast */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
