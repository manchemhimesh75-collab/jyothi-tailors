                    high += 1500;

                    high += 5000;

                                    <i className="fa-brands fa-whatsapp mr-2 text-base"></i> Consultation Line
                                </a>
                            </div>

        const GalleryView = ({ t, galleryItems, isAdmin, onDeleteGalleryItem }) => {
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [lightboxItem, setLightboxItem] = useState(null); 
            const categories = ['All', ...t.categories];

            const filteredItems = selectedCategory === 'All'

            return (
                <div className="py-20 bg-cream min-h-screen">

                                        >
                                            <i className="fa-solid fa-trash text-xs"></i>

                                    <div className="absolute inset-0 bg-gradient-to-t from-maroon-950 via-maroon-950/20 to-transparent opacity-0 group-hover:opacity-95 transition duration-300 flex flex-col justify-end p-6">

        const OrderFormView = ({ t, addOrder }) => {
            const [formData, setFormData] = useState({
                name: '', phone: '', whatsapp: '', email: '', address: '', measurements: '', instructions: ''
            });
            const [items, setItems] = useState([{ dressType: '', fabricDetails: '', images: [] }]);
            const [measurementSheet, setMeasurementSheet] = useState(null);
            const [measurementFileName, setMeasurementFileName] = useState('');
            const [submitted, setSubmitted] = useState(false);
            const [orderId, setOrderId] = useState('');
            const [showPromptModal, setShowPromptModal] = useState(true);

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleItemChange = (index, field, value) => {
                const updatedItems = [...items];
                updatedItems[index][field] = value;
                setItems(updatedItems);
            };

            const handleItemImageUpload = (index, e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const updatedItems = [...items];
                if (!updatedItems[index].images) {
                    updatedItems[index].images = [];
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updatedItems[index].images.push(reader.result);
                        setItems([...updatedItems]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleRemoveItemImage = (itemIndex, imageIndex) => {
                const updatedItems = [...items];
                updatedItems[itemIndex].images.splice(imageIndex, 1);
                setItems(updatedItems);
            };

            const addItemRow = () => {
                setItems([...items, { dressType: '', fabricDetails: '', images: [] }]);
            };

            const removeItemRow = (index) => {
                if (items.length > 1) {
                    setItems(items.filter((_, idx) => idx !== index));
                }
            };

            const handleMeasurementUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setMeasurementFileName(file.name);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setMeasurementSheet(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newId = 'ORD-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                const newOrder = {
                    id: newId,
                    ...formData,
                    items: items,
                    measurementSheet: measurementSheet,
                    measurementFileName: measurementFileName,
                    status: 'Received',
                    amount: 0,
                    discount: 0,
                    amountPaid: 0,
                    date: new Date().toISOString().split('T')[0]
                };
                addOrder(newOrder);
                setOrderId(newId);
                setSubmitted(true);
                window.scrollTo(0, 0);
            };

            if (submitted) {
                return (

                                    <p>Sri Sai Towers, Second Floor: B5</p>
                                    <p>Omkar Street, Gandhi Puram</p>
                                    <p className="text-[10px] text-gray-500 italic">Beside Vijatha Grand, Beside S Car Wash</p>

                                    <div className="space-y-4">

                                                            placeholder="E.g., Kanchi Silk, Red Velvet" 
                                                        />

                                                <div className="mt-4">
                                                    <label className="block text-[10px] text-gray-500 font-bold mb-2 uppercase tracking-wider">Reference Design Photos (Optional)</label>

                                                            <div key={imgIdx} className="relative w-16 h-16 border rounded bg-white overflow-hidden group">
                                                                <img src={img} className="w-full h-full object-cover" />
                                                                <button
                                                                    type="button"
                                                                    onClick={() => handleRemoveItemImage(idx, imgIdx)}
                                                                    className="absolute top-0 right-0 bg-red-600 text-white w-5 h-5 rounded-bl flex items-center justify-center hover:bg-red-700 transition"

                                                                >
                                                                    <i className="fa-solid fa-times text-[10px]"></i>
                                                                </button>
                                                            </div>
                                                        ))}
                                                        <label className="w-16 h-16 border-2 border-dashed border-gray-200 hover:border-maroon-700 transition cursor-pointer bg-white flex flex-col items-center justify-center">
                                                            <i className="fa-solid fa-plus text-gray-400 text-xs mb-1"></i>
                                                            <span className="text-[9px] text-gray-400 font-bold uppercase text-center">Add Photo</span>
                                                            <input
                                                                type="file"
                                                                accept="image/*"
                                                                multiple
                                                                onChange={(e) => handleItemImageUpload(idx, e)}
                                                                className="hidden"
                                                            />
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="mb-6 mt-6">
                                        <label className={labelStyle}>{t.form.measurements}</label>
                                        <textarea name="measurements" value={formData.measurements} onChange={handleChange} rows="3" className={inputStyle} placeholder="E.g., Chest: 36, Shoulder: 14, Sleeves: 10, Neck depth: 8..."></textarea>
                                    </div>

                                    <div className="grid grid-cols-1 gap-6 mb-6">
                                        <label className="p-5 border-2 border-dashed border-gray-200 rounded text-center bg-gray-50 hover:border-maroon-700 transition cursor-pointer block relative">
                                            <input 
                                                type="file" 
                                                accept="image/*,application/pdf" 
                                                onChange={handleMeasurementUpload} 
                                                className="hidden" 
                                            />
                                            {measurementSheet ? (
                                                <div className="flex flex-col items-center justify-center">
                                                    <i className="fa-solid fa-file-circle-check text-3xl text-green-500 mb-2"></i>
                                                    <span className="text-xs text-green-600 font-semibold truncate max-w-[200px]" title={measurementFileName}>
                                                        {measurementFileName || "Measurement Card Uploaded"}

                                                    <i className="fa-solid fa-file-invoice text-3xl text-gray-400 mb-2"></i>

                                        <p>Alternatively, you can skip this form and securely drop your measurement sheet or reference patterns directly on <a href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, t.waMeasureMsg)} className="font-bold underline" target="_blank" rel="noreferrer">WhatsApp line</a>.</p>

                                        <label className={labelStyle}>{t.form.instructions}</label>
                                        <textarea name="instructions" value={formData.instructions} onChange={handleChange} rows="2" className={inputStyle} placeholder="Deep neck design, border placement patterns, maggam work preferences..."></textarea>

                                <div className="pt-4">
                                    <Button type="submit" className="w-full py-4 text-base font-bold tracking-widest">{t.form.submit}</Button>
                                </div>

                </div>
            );
        };

        const CustomerPortalView = ({ t, customerOrder }) => {
            if (!customerOrder) return null;

            const finalAmount = (Number(customerOrder.amount) || 0) - (Number(customerOrder.discount) || 0);
            const balanceDue = finalAmount - (Number(customerOrder.amountPaid) || 0);

            const getProgressPercent = (status) => {
                const stages = { 'Received': 15, 'Fabric Received': 40, 'Stitching In Progress': 70, 'Ready': 100, 'Completed & Delivered': 100 };
                return stages[status] || 0;
            };

            return (
                <div className="py-16 bg-cream min-h-screen font-sans">
                    <div className="max-w-3xl mx-auto px-4">
                        <div className="bg-white rounded-lg shadow-xl border border-gold-500/20 overflow-hidden slide-animate">
                            
                            {/* Header Banner */}
                            <div className="bg-maroon-800 text-white p-8 text-center border-b border-gold-500">
                                <span className="text-gold-400 text-xs uppercase tracking-widest font-bold block mb-1">Live Tracking Workspace</span>
                                <h2 className="text-3xl font-serif font-bold text-white">Order: {customerOrder.id}</h2>
                                <p className="text-xs text-maroon-100 mt-2">Welcome back, {customerOrder.name}. Find your real-time stitching and balance details below.</p>
                            </div>

                            <div className="p-8 space-y-8">
                                {/* Production Stage Status bar */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Production Stage Status</h3>
                                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded border">
                                        <span className="text-xs font-bold text-gray-500">Live Status:</span>
                                        <span className="text-xs bg-gold-400 text-maroon-950 font-extrabold px-3 py-1 rounded-full">{customerOrder.status}</span>
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[10px] uppercase font-bold text-gray-400">
                                            <span>Received</span>
                                            <span>In Progress</span>
                                            <span>Ready</span>
                                        </div>
                                        <div className="w-full bg-gray-200 h-3 rounded-full overflow-hidden">
                                            <div 
                                                className="bg-maroon-700 h-full transition-all duration-1000" 
                                                style={{ width: `${getProgressPercent(customerOrder.status)}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Stitching Items and specifications summary */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Garments & Specs</h3>
                                    <div className="space-y-3">
                                        {(customerOrder.items || []).map((item, idx) => (
                                            <div key={idx} className="p-4 bg-cream rounded border border-maroon-100/20 space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-maroon-900">Item #{idx+1}: {item.dressType}</span>
                                                    <span className="text-xs italic text-gray-500">Fabric: {item.fabricDetails}</span>
                                                </div>
                                                
                                                {/* Display image gallery uploads */}
                                                {item.images && item.images.length > 0 && (
                                                    <div className="pt-2">
                                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-1.5">Attached design configurations:</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {item.images.map((img, imgIdx) => (
                                                                <a key={imgIdx} href={img} target="_blank" rel="noreferrer" className="block relative w-12 h-12 border rounded overflow-hidden shadow-sm">
                                                                    <img src={img} className="w-full h-full object-cover" />
                                                                </a>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {customerOrder.measurements && (
                                        <div className="p-4 bg-white border rounded text-xs leading-relaxed text-gray-700">
                                            <strong className="text-maroon-800 uppercase text-[10px] tracking-wider block mb-1">Your Registered Measurements:</strong>
                                            {customerOrder.measurements}
                                        </div>
                                    )}
                                </div>

                                {/* Live Bill Invoice */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Billing Breakdown</h3>
                                    <div className="bg-cream p-6 rounded-lg border border-maroon-100/50 space-y-3">
                                        <div className="flex justify-between text-xs text-gray-600 font-semibold">
                                            <span>Subtotal Stitching Charges:</span>
                                            <span>₹{customerOrder.amount || 0}</span>
                                        </div>
                                        <div className="flex justify-between text-xs text-green-600 font-semibold">
                                            <span>Discount Applied:</span>
                                            <span>-₹{customerOrder.discount || 0}</span>
                                        </div>
                                        <div className="flex justify-between text-xs text-gray-600 font-semibold border-b pb-3">
                                            <span>Paid Advance:</span>
                                            <span>₹{customerOrder.amountPaid || 0}</span>
                                        </div>
                                        <div className="flex justify-between items-center pt-2">
                                            <span className="text-sm font-bold text-maroon-900 uppercase">Remaining Balance Due:</span>
                                            <span className="text-2xl font-mono font-extrabold text-red-600">₹{balanceDue}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Security and Protection Note */}
                                <div className="bg-amber-50 border border-amber-200 rounded p-4 text-xs text-amber-800 leading-relaxed flex items-start gap-2.5">
                                    <i className="fa-solid fa-shield-halved text-amber-600 mt-0.5"></i>
                                    <p>
                                        <strong>Access Security Protection Policy:</strong> For design protection and customer safety, order attributes and passcodes are strictly write-protected. If you need any immediate customizations or would like to upload additional fabrics, connect directly with our studio via phone or WhatsApp.
                                    </p>
                                </div>

                                <div className="text-center pt-4">
                                    <a 
                                        href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, `Hello! Checking in regarding my custom order ID ${customerOrder.id}. My remaining balance shows as ₹${balanceDue}.`)} 
                                        target="_blank" 
                                        rel="noreferrer" 
                                        className="inline-flex items-center gap-2 bg-[#25D366] text-white px-6 py-3 rounded font-bold text-xs uppercase tracking-wider hover:bg-[#128C7E] transition shadow-md"
                                    >
                                        <i className="fa-brands fa-whatsapp text-lg"></i> Consult Tailor on WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboardView = ({ t, orders, updateOrderStatus, onUpdateOrderDetails, galleryItems, onAddGalleryItem, onAddOrder, onDeleteOrder, adminPasscode, onUpdatePasscode, cloudStatus }) => {
            const statusOptions = ['Received', 'Fabric Received', 'Stitching In Progress', 'Ready', 'Completed & Delivered'];

            const [activeOwnerTab, setActiveOwnerTab] = useState('manualOrder'); 
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            const [deleteConfirmation, setDeleteConfirmation] = useState({ show: false, targetId: null, targetType: '' });
            const [newPasscode, setNewPasscode] = useState('');
            const [confirmPasscode, setConfirmPasscode] = useState('');

            const [newDesign, setNewDesign] = useState({
                cat: 'Blouses',
                title: '',
                imgUrl: '',
                imageFile: ''
            });

            const [manualOrder, setManualOrder] = useState({
                name: '',
                phone: '',
                whatsapp: '',
                measurements: '',
                instructions: '',
                dueDate: '',
                amount: '',
                discount: '',
                amountPaid: '',
                address: 'Manual Walk-In Client / Hand Delivered'
            });

            const [manualItems, setManualItems] = useState([{ dressType: 'Blouses', fabricDetails: '', images: [] }]);

            const triggerNotification = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => {
                    setNotification({ show: false, message: '', type: 'success' });
                }, 4000);
            };

            const handleManualItemChange = (index, field, value) => {
                const updated = [...manualItems];
                updated[index][field] = value;
                setManualItems(updated);
            };

            const handleManualItemImageUpload = (index, e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const updated = [...manualItems];
                if (!updated[index].images) {
                    updated[index].images = [];
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updated[index].images.push(reader.result);
                        setManualItems([...updated]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleRemoveManualItemImage = (itemIndex, imageIndex) => {
                const updated = [...manualItems];
                updated[itemIndex].images.splice(imageIndex, 1);
                setManualItems(updated);
            };

            const addManualItemRow = () => {
                setManualItems([...manualItems, { dressType: 'Blouses', fabricDetails: '', images: [] }]);
            };

            const removeManualItemRow = (index) => {
                if (manualItems.length > 1) {
                    setManualItems(manualItems.filter((_, idx) => idx !== index));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewDesign({ ...newDesign, imageFile: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleUploadDesign = (e) => {
                e.preventDefault();
                const imageToUpload = newDesign.imageFile || newDesign.imgUrl || 'https://placehold.co/400x500/8c151a/fdfbf7?text=Design';
                
                const item = {
                    id: 'gal-' + Date.now(),
                    cat: newDesign.cat,
                    title: newDesign.title || `${newDesign.cat} Design`,
                    img: imageToUpload
                };

                onAddGalleryItem(item);
                setNewDesign({ cat: 'Blouses', title: '', imgUrl: '', imageFile: '' });
                triggerNotification("Custom design successfully added to gallery!");
            };

            const handleManualOrderSubmit = (e) => {
                e.preventDefault();
                const newId = 'ORD-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                
                const finalOrder = {
                    id: newId,
                    name: manualOrder.name,
                    phone: manualOrder.phone,
                    whatsapp: manualOrder.whatsapp || manualOrder.phone,
                    items: manualItems,
                    measurements: manualOrder.measurements,
                    instructions: manualOrder.instructions,
                    dueDate: manualOrder.dueDate,
                    amount: Number(manualOrder.amount) || 0,
                    discount: Number(manualOrder.discount) || 0,
                    amountPaid: Number(manualOrder.amountPaid) || 0,
                    address: manualOrder.address,
                    status: 'Received',
                    date: new Date().toISOString().split('T')[0]
                };

                onAddOrder(finalOrder);
                setManualOrder({
                    name: '', phone: '', whatsapp: '', measurements: '',
                    instructions: '', dueDate: '', amount: '', discount: '', amountPaid: '', address: 'Manual Walk-In Client / Hand Delivered'
                });
                setManualItems([{ dressType: 'Blouses', fabricDetails: '' }]);
                triggerNotification(`Order ${newId} created successfully!`);
            };

            const handleOwnerFileUpload = (orderId, fieldName, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    onUpdateOrderDetails(orderId, { [fieldName]: reader.result });
                    triggerNotification("Attachment updated successfully!");
                };
                reader.readAsDataURL(file);
            };

            const handleUpdatePasscode = (e) => {
                e.preventDefault();
                if (newPasscode.length < 4) {
                    triggerNotification("Secret passcode must be at least 4 characters long.", "error");
                    return;
                }
                if (newPasscode !== confirmPasscode) {
                    triggerNotification("Confirm passcode does not match!", "error");
                    return;
                }
                onUpdatePasscode(newPasscode);
                setNewPasscode('');
                setConfirmPasscode('');
                triggerNotification("Secret owner passcode updated successfully!");
            };

            const getDueDateBadge = (dueDateStr) => {
                if (!dueDateStr) return <span className="text-[9px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-bold uppercase">No Date</span>;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const due = new Date(dueDateStr);
                due.setHours(0, 0, 0, 0);
                
                const diffTime = due - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 0) {
                    return <span className="text-[9px] bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold uppercase tracking-wider animate-pulse">Overdue</span>;
                } else if (diffDays <= 2) {
                    return <span className="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold uppercase tracking-wider">Urgent</span>;
                } else {
                    return <span className="text-[9px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold uppercase tracking-wider">On Track</span>;
                }
            };

            return (
                <div className="py-12 bg-gray-100 min-h-screen">
                    <div className="max-w-7xl mx-auto px-4">
                        
                        {notification.show && (
                            <div className={`fixed top-24 right-6 z-50 p-4 rounded shadow-xl flex items-center gap-3 border transition-all duration-300 transform translate-y-0 ${
                                notification.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'
                            }`}>
                                <i className={`fa-solid ${notification.type === 'success' ? 'fa-circle-check text-emerald-500' : 'fa-circle-xmark text-red-500'} text-2xl`}></i>
                                <p className="font-semibold text-xs uppercase tracking-wider">{notification.message}</p>
                            </div>
                        )}

                        {deleteConfirmation.show && (
                            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 modal-animate">
                                <div className="bg-white rounded p-6 max-w-sm w-full border-t-4 border-red-600">
                                    <h3 className="text-base font-serif font-bold text-red-700 mb-2">Confirm Delete Action</h3>
                                    <p className="text-xs text-gray-400 mb-6 leading-relaxed">Are you absolutely sure you want to delete this order? This cannot be undone.</p>
                                    <div className="flex justify-end gap-3">
                                        <button 
                                            onClick={() => setDeleteConfirmation({ show: false, targetId: null, targetType: '' })}
                                            className="px-4 py-2 bg-gray-100 rounded text-gray-600 text-xs uppercase font-bold hover:bg-gray-200 transition"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            onClick={() => {
                                                onDeleteOrder(deleteConfirmation.targetId);
                                                triggerNotification("Order trace deleted.", "error");
                                                setDeleteConfirmation({ show: false, targetId: null, targetType: '' });
                                            }}
                                            className="px-4 py-2 bg-red-600 rounded text-white text-xs uppercase font-bold hover:bg-red-700 transition"
                                        >
                                            Confirm Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="bg-maroon-800 rounded-t p-6 text-white flex flex-col sm:flex-row justify-between items-center shadow-md gap-4 border-b border-gold-500/20">
                            <h2 className="text-2xl font-serif font-bold tracking-wide">
                                <i className="fa-solid fa-crown text-gold-400 mr-2"></i> Owner Command Center
                            </h2>
                            <span className="bg-maroon-900 border border-gold-500/20 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest text-gold-400">
                                {cloudStatus === 'connected' ? 'Cloud Sync Active' : 'Local Sandbox Mode'}
                            </span>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-6 font-sans">
                            {/* Controls Container (Left Column) */}
                            <div className="bg-white rounded shadow p-6 border border-maroon-50 lg:col-span-5 flex flex-col h-fit">
                                <div className="flex border-b border-gray-200 mb-6 flex-wrap">
                                    <button 
                                        onClick={() => setActiveOwnerTab('manualOrder')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'manualOrder' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <i className="fa-solid fa-plus-circle mr-1"></i> Walk-In Order
                                    </button>
                                    <button 
                                        onClick={() => setActiveOwnerTab('uploadGallery')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'uploadGallery' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <i className="fa-solid fa-cloud-upload mr-1"></i> Portfolio
                                    </button>
                                    <button 
                                        onClick={() => setActiveOwnerTab('settings')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'settings' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-400 hover:text-gray-600'
                                        }`}
                                    >
                                        <i className="fa-solid fa-key mr-1"></i> Passcode
                                    </button>
                                </div>

                                {activeOwnerTab === 'manualOrder' && (
                                    <form onSubmit={handleManualOrderSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[9px] font-bold text-gray-700 uppercase mb-1">Customer Name *</label>
                                                <input 
                                                    type="text" 
                                                    value={manualOrder.name}
                                                    onChange={(e) => setManualOrder({...manualOrder, name: e.target.value})}
                                                    placeholder="Client Name"
                                                    className="w-full p-2.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] font-bold text-gray-700 uppercase mb-1">Mobile Number *</label>
                                                <input 
                                                    type="tel" 
                                                    value={manualOrder.phone}
                                                    onChange={(e) => setManualOrder({...manualOrder, phone: e.target.value})}
                                                    placeholder="E.g., 9948698878"
                                                    className="w-full p-2.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-cream p-3 rounded border border-maroon-100/40 space-y-3">
                                            <div className="flex justify-between items-center">
                                                <label className="text-[10px] font-extrabold text-maroon-800 uppercase tracking-wider">Garments & Fabrics *</label>
                                                <button 
                                                    type="button" 
                                                    onClick={addManualItemRow} 
                                                    className="text-[10px] font-bold text-maroon-700 hover:underline"
                                                >
                                                    + Add Garment Item
                                                </button>
                                            </div>
                                            {manualItems.map((mItem, idx) => (
                                                <div key={idx} className="bg-white p-2.5 rounded border border-gray-100 relative space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[9px] font-bold text-gray-400">Garment #{idx+1}</span>
                                                        {manualItems.length > 1 && (
                                                            <button 
                                                                type="button" 
                                                                onClick={() => removeManualItemRow(idx)} 
                                                                className="text-red-500 hover:text-red-700 text-[10px] font-bold uppercase"
                                                            >
                                                                Remove
                                                            </button>
                                                        )}
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <select 
                                                            value={mItem.dressType} 
                                                            onChange={(e) => handleManualItemChange(idx, 'dressType', e.target.value)}
                                                            className="w-full p-1.5 border rounded text-xs bg-white focus:ring-1 focus:ring-maroon-500 outline-none"
                                                            required
                                                        >
                                                            {t.categories.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                                            <option value="Other">Other Custom</option>
                                                        </select>
                                                        <input 
                                                            type="text" 
                                                            value={mItem.fabricDetails}
                                                            onChange={(e) => handleManualItemChange(idx, 'fabricDetails', e.target.value)}
                                                            placeholder="Fabric texture"
                                                            className="w-full p-1.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                            required
                                                        />
                                                    </div>

                                                    <div className="mt-2">
                                                        <label className="block text-[9px] text-gray-500 font-bold mb-1 uppercase tracking-wider">Design References (Optional)</label>
                                                        <div className="flex flex-wrap gap-1.5 items-center">
                                                            {(mItem.images || []).map((img, imgIdx) => (
                                                                <div key={imgIdx} className="relative w-10 h-10 border rounded bg-gray-50 overflow-hidden group">
                                                                    <img src={img} className="w-full h-full object-cover" />
                                                                    <button
                                                                        type="button"
                                                                        onClick={() => handleRemoveManualItemImage(idx, imgIdx)}
                                                                        className="absolute top-0 right-0 bg-red-600 text-white w-4 h-4 rounded-bl flex items-center justify-center hover:bg-red-700 transition"
                                                                    >
                                                                        <i className="fa-solid fa-times text-[8px]"></i>
                                                                    </button>
                                                                </div>
                                                            ))}
                                                            <label className="w-10 h-10 border-2 border-dashed border-gray-200 rounded flex flex-col items-center justify-center hover:border-maroon-700 transition cursor-pointer bg-gray-50">
                                                                <i className="fa-solid fa-plus text-gray-400 text-[10px]"></i>
                                                                <input
                                                                    type="file"
                                                                    accept="image/*"
                                                                    multiple
                                                                    onChange={(e) => handleManualItemImageUpload(idx, e)}
                                                                    className="hidden"
                                                                />
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            <div>
                                                <label className="block text-[9px] font-bold text-gray-700 uppercase mb-1">Due Delivery Target Date *</label>
                                                <input 
                                                    type="date" 
                                                    value={manualOrder.dueDate}
                                                    onChange={(e) => setManualOrder({...manualOrder, dueDate: e.target.value})}
                                                    className="w-full p-2 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-maroon-50/50 p-3 rounded border border-maroon-100 space-y-3">
                                            <div className="grid grid-cols-3 gap-2">
                                                <div>
                                                    <label className="block text-[9px] font-bold text-maroon-800 uppercase mb-0.5">Total Cost (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.amount}
                                                        onChange={(e) => setManualOrder({...manualOrder, amount: e.target.value})}
                                                        placeholder="Charges"
                                                        className="w-full p-1.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-maroon-800 uppercase mb-0.5">Discount (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.discount}
                                                        onChange={(e) => setManualOrder({...manualOrder, discount: e.target.value})}
                                                        placeholder="Discount"
                                                        className="w-full p-1.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] font-bold text-maroon-800 uppercase mb-0.5">Paid Advance (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.amountPaid}
                                                        onChange={(e) => setManualOrder({...manualOrder, amountPaid: e.target.value})}
                                                        placeholder="Advance"
                                                        className="w-full p-1.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                    />
                                                </div>
                                            </div>
                                            <div className="text-right pt-2 border-t border-maroon-100/50 flex justify-between text-[10px] font-bold uppercase tracking-wider">
                                                <span className="text-gray-500">Net: ₹{(Number(manualOrder.amount) || 0) - (Number(manualOrder.discount) || 0)}</span>
                                                <span className="text-maroon-950">
                                                    Remaining Balance: <span className="font-mono text-red-600">₹{(Number(manualOrder.amount) || 0) - (Number(manualOrder.discount) || 0) - (Number(manualOrder.amountPaid) || 0)}</span>
                                                </span>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-[9px] font-bold text-gray-700 uppercase mb-1">Measurement Specifications</label>
                                            <textarea 
                                                value={manualOrder.measurements}
                                                onChange={(e) => setManualOrder({...manualOrder, measurements: e.target.value})}
                                                placeholder="Chest: 34, Waist: 28, Sleeves: 8..."
                                                rows="2"
                                                className="w-full p-2 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                            ></textarea>
                                        </div>

                                        <div>
                                            <label className="block text-[9px] font-bold text-gray-700 uppercase mb-1">Special Design Notes</label>
                                            <textarea 
                                                value={manualOrder.instructions}
                                                onChange={(e) => setManualOrder({...manualOrder, instructions: e.target.value})}
                                                placeholder="Deep round neck, light pearls on sleeves..."
                                                rows="2"
                                                className="w-full p-2 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                            ></textarea>
                                        </div>

                                        <Button type="submit" variant="primary" className="w-full text-xs tracking-widest font-bold py-3 mt-2">
                                            <i className="fa-solid fa-plus-circle mr-1"></i> Register Order
                                        </Button>
                                    </form>
                                )}

                                {activeOwnerTab === 'uploadGallery' && (
                                    <form onSubmit={handleUploadDesign} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 uppercase mb-1">Select Portfolio Category</label>
                                            <select 
                                                value={newDesign.cat} 
                                                onChange={(e) => setNewDesign({...newDesign, cat: e.target.value})}
                                                className="w-full p-2.5 border rounded bg-white text-xs"
                                            >
                                                {t.categories.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 uppercase mb-1">Design Reference Title</label>
                                            <input 
                                                type="text" 
                                                value={newDesign.title}
                                                onChange={(e) => setNewDesign({...newDesign, title: e.target.value})}
                                                placeholder="E.g., Silk Saree Blouse with Maggam Work"
                                                className="w-full p-2.5 border rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none"
                                                required
                                            />
                                        </div>
                                        
                                        <div className="bg-cream p-4 rounded border border-maroon-100/40">
                                            <label className="block text-xs font-bold text-maroon-800 uppercase mb-1">Select Portfolio File</label>
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                onChange={handleFileChange}
                                                className="w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-[10px] file:font-bold file:uppercase file:bg-maroon-50 file:text-maroon-700 hover:file:bg-maroon-100 cursor-pointer"
                                            />
                                            {newDesign.imageFile && (
                                                <div className="mt-2 text-center">
                                                    <span className="text-[9px] text-green-600 block mb-1">Image Loaded Successful!</span>
                                                    <img src={newDesign.imageFile} className="h-20 mx-auto rounded border" />
                                                </div>
                                            )}
                                        </div>

                                        <div className="text-center text-xs text-gray-400 font-bold uppercase py-1">OR</div>

                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 uppercase mb-1">Paste Raw Image Link (URL)</label>
                                            <input 
                                                type="url" 
                                                value={newDesign.imgUrl}
                                                onChange={(e) => setNewDesign({...newDesign, imgUrl: e.target.value})}
                                                placeholder="Https://example.com/dress.jpg"
                                                className="w-full p-2.5 border rounded text-xs"
                                                disabled={!!newDesign.imageFile}
                                            />
                                        </div>

                                        <Button type="submit" variant="secondary" className="w-full text-xs font-bold py-3">
                                            <i className="fa-solid fa-cloud-upload-alt mr-2"></i> Add Design to Gallery
                                        </Button>
                                    </form>
                                )}

                                {activeOwnerTab === 'settings' && (
                                    <form onSubmit={handleUpdatePasscode} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 uppercase mb-1">New Owner Passcode</label>
                                            <input 
                                                type="password" 
                                                value={newPasscode}
                                                onChange={(e) => setNewPasscode(e.target.value)}
                                                placeholder="Enter code"
                                                className="w-full p-2.5 border rounded tracking-widest font-mono text-center text-lg"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-700 uppercase mb-1">Confirm New Passcode</label>
                                            <input 
                                                type="password" 
                                                value={confirmPasscode}
                                                onChange={(e) => setConfirmPasscode(e.target.value)}
                                                placeholder="Confirm code"
                                                className="w-full p-2.5 border rounded tracking-widest font-mono text-center text-lg"
                                                required
                                            />
                                        </div>
                                        <Button type="submit" variant="primary" className="w-full py-3 text-xs font-bold">
                                            <i className="fa-solid fa-save mr-2"></i> Save Passcode
                                        </Button>
                                    </form>
                                )}
                            </div>

                            {/* Active Orders List log (Right Column) */}
                            <div className="bg-white rounded shadow p-6 border border-maroon-50 lg:col-span-7">
                                <h3 className="text-lg font-serif font-bold text-maroon-800 mb-4 pb-2 border-b flex justify-between items-center flex-wrap gap-2">
                                    <span><i className="fa-solid fa-clipboard-list mr-2 text-gold-500"></i> Production Ledger</span>
                                    <span className="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded font-mono font-bold">Active Orders: {orders.length}</span>
                                </h3>
                                
                                <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2">
                                    {orders.map(order => {
                                        const finalAmount = (Number(order.amount) || 0) - (Number(order.discount) || 0);
                                        const balanceDue = finalAmount - (Number(order.amountPaid) || 0);
                                        
                                        const itemsList = order.items || [{ dressType: order.dressType || 'Custom Wear', fabricDetails: order.fabricDetails || 'No Fabric details' }];
                                        const itemsDescription = itemsList.map((it, i) => `${i+1}. ${it.dressType} (${it.fabricDetails})`).join(', ');

                                        return (
                                            <div key={order.id} className="p-4 rounded border border-gray-100 hover:border-maroon-100 transition bg-gray-50 flex flex-col md:flex-row justify-between gap-4">
                                                <div className="space-y-2 flex-grow">
                                                    <div className="flex flex-wrap items-center gap-2">
                                                        <span className="font-mono font-bold text-xs text-maroon-700">{order.id}</span>
                                                        <span className="text-[10px] bg-maroon-100 text-maroon-800 font-bold px-2 py-0.5 rounded uppercase tracking-wider">{itemsList.length} Item(s)</span>
                                                        {getDueDateBadge(order.dueDate)}
                                                    </div>
                                                    
                                                    <h4 className="font-bold text-gray-800 text-base leading-none">{order.name}</h4>
                                                    <p className="text-xs text-gray-500"><i className="fa-solid fa-phone mr-1"></i> {order.phone}</p>
                                                    
                                                    <div className="bg-cream border border-maroon-100/20 p-2.5 rounded space-y-2 text-xs">
                                                        <strong className="text-maroon-800 text-[10px] uppercase tracking-wider block mb-1">Garments List:</strong>
                                                        {itemsList.map((item, idx) => (
                                                            <div key={idx} className="border-b border-maroon-100/10 pb-2 last:border-b-0 last:pb-0 space-y-1">
                                                                <div className="flex justify-between items-center text-gray-700">
                                                                    <span className="font-semibold">{idx+1}. {item.dressType}</span>
                                                                    <span className="italic text-gray-500">Fabric: {item.fabricDetails || 'N/A'}</span>
                                                                </div>
                                                                {item.images && item.images.length > 0 && (
                                                                    <div className="flex flex-wrap gap-1.5 mt-1">
                                                                        {item.images.map((img, imgIdx) => (
                                                                            <a key={imgIdx} href={img} target="_blank" rel="noreferrer" className="block relative w-12 h-12 border rounded overflow-hidden shadow-sm hover:scale-105 transition" title="View Reference Image">
                                                                                <img src={img} className="w-full h-full object-cover" />
                                                                            </a>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>

                                                    {order.measurements && (
                                                        <div className="text-[11px] bg-white p-2 rounded border border-gray-200">
                                                            <strong className="text-maroon-800 uppercase text-[9px] tracking-wider block mb-1">Measurements:</strong> {order.measurements}
                                                        </div>
                                                    )}

                                                    <div className="flex flex-wrap gap-2 pt-1">
                                                        {order.measurementSheet && (

        const Footer = ({ t, openLoginModal, isAdmin, isCustomer, logOutUser, triggerInstall }) => (

                        </div>
                        <p className="text-xs text-maroon-300 max-w-xs font-sans mt-1 leading-relaxed">Artisanal ladies custom tailoring, bridal blouses, and couture fittings since 2011.</p>
                    </div>
                    <div className="flex flex-col items-center md:items-end space-y-4">
                        <div className="flex space-x-4">
                            <a href="#" className="w-9 h-9 rounded bg-maroon-900 border border-gold-500/10 flex items-center justify-center hover:bg-gold-500 hover:text-maroon-950 transition"><i className="fa-brands fa-instagram text-sm"></i></a>
                            <a href="#" className="w-9 h-9 rounded bg-maroon-900 border border-gold-500/10 flex items-center justify-center hover:bg-gold-500 hover:text-maroon-950 transition"><i className="fa-brands fa-facebook-f text-sm"></i></a>
                            <a href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, t.whatsappFloater.msg)} target="_blank" rel="noreferrer" className="w-9 h-9 rounded bg-maroon-900 border border-gold-500/10 flex items-center justify-center hover:bg-[#25D366] hover:text-white transition"><i className="fa-brands fa-whatsapp text-sm"></i></a>
                        </div>
                        
                        <div className="text-xs text-maroon-400 flex flex-col items-center md:items-end gap-2">
                            <button onClick={triggerInstall} className="hover:underline text-gold-400 text-[10px] uppercase font-bold tracking-widest">
                                <i className="fa-solid fa-mobile-screen mr-1"></i> Download / Install App
                            </button>
                            {isAdmin || isCustomer ? (
                                <button onClick={logOutUser} className="hover:underline text-red-400 text-[10px] uppercase font-bold tracking-widest"><i className="fa-solid fa-sign-out-alt mr-1"></i> Exit Active Portal Session</button>
                            ) : (
                                <button onClick={openLoginModal} className="hover:underline hover:text-white text-[10px] uppercase font-bold tracking-widest"><i className="fa-solid fa-lock mr-1 text-gold-500"></i> Client & Owner Portal Access</button>

                        </div>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 mt-8 pt-8 border-t border-maroon-900/60 text-center text-[10px] text-maroon-400 uppercase tracking-widest font-semibold">
