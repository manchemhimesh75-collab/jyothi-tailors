        const FloatingWhatsApp = ({ msg }) => (
            <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`} target="_blank" rel="noreferrer" 
               className="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:bg-[#128C7E] transition transform hover:scale-110 group">
                <i className="fa-brands fa-whatsapp text-3xl"></i>
                <span className="absolute right-16 bg-white text-gray-800 text-xs px-3 py-2 rounded-lg shadow-lg opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-100 pointer-events-none">
                    Need Help? Chat with us!
                </span>
            </a>
        );

        const App = () => {
            const [currentView, setView] = useState('home');
            
            // Shared State initialized with custom offline values
            const [orders, setOrders] = useState(initialOrders);
            const [galleryItems, setGalleryItems] = useState(defaultGallery);

            // Owner Authentication Mode states
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState('');
            const [loginError, setLoginError] = useState(false);

            // Dynamically initialized passcode state with browser-specific memory fallback
            const [adminPasscode, setAdminPasscode] = useState(() => {
                return localStorage.getItem('jyothi_tailor_passcode') || '1234';
            });

            // Initialize database connections safely
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);

            const t = translations['en'];

            useEffect(() => {
                if (typeof window.FirebaseSDK === 'undefined') return;
                const { initializeApp, getFirestore, getAuth, signInAnonymously, signInWithCustomToken, onSnapshot, collection, query, doc, getDoc } = window.FirebaseSDK;
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                
                try {
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const firestoreDb = getFirestore(app);
                        const auth = getAuth(app);
                        setDb(firestoreDb);

                        const initCloudAuth = async () => {
                            let credential;
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                credential = await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                credential = await signInAnonymously(auth);
                            }
                            setUser(credential.user);

                            // Sync Passcode configurations securely from the backend if available
                            const configRef = doc(firestoreDb, 'artifacts', appId, 'public', 'data', 'config', 'settings');
                            const configSnap = await getDoc(configRef);
                            if (configSnap.exists() && configSnap.data().passcode) {
                                setAdminPasscode(configSnap.data().passcode);
                                localStorage.setItem('jyothi_tailor_passcode', configSnap.data().passcode);
                            }
                        };

                        initCloudAuth();

                        // Sync Gallery Collection in real-time
                        const galleryRef = collection(firestoreDb, 'artifacts', appId, 'public', 'data', 'gallery');
                        const unsubGallery = onSnapshot(query(galleryRef), (snapshot) => {
                            const cloudItems = [];
                            snapshot.forEach(doc => cloudItems.push({ id: doc.id, ...doc.data() }));
                            if (cloudItems.length > 0) {
                                setGalleryItems(cloudItems);
                            }
                        }, (err) => console.log("Gallery sync failed, fallback active:", err));

                        // Sync Orders Collection in real-time
                        const ordersRef = collection(firestoreDb, 'artifacts', appId, 'public', 'data', 'orders');
                        const unsubOrders = onSnapshot(query(ordersRef), (snapshot) => {
                            const cloudOrders = [];
                            snapshot.forEach(doc => cloudOrders.push({ id: doc.id, ...doc.data() }));
                            if (cloudOrders.length > 0) {
                                setOrders(cloudOrders);
                            }
                        }, (err) => console.log("Orders sync failed, fallback active:", err));

                        return () => {
                            unsubGallery();
                            unsubOrders();
                        };
                    }
                } catch (e) {
                    console.warn("Firebase Init bypassed or failed. Staying in local memory mode.", e);
                }
            }, []);

            // Handle Owner Actions
            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (passcodeInput === adminPasscode) {
                    setIsAdmin(true);
                    setLoginError(false);
                    setShowLoginModal(false);
                    setView('admin'); // Instantly go to admin panel on login
                    setPasscodeInput('');
                } else {
                    setLoginError(true);
                }
            };

            const logOutAdmin = () => {
                setIsAdmin(false);
                setView('home');
            };

            // Custom secure Passcode setting update logic
            const updateAdminPasscode = async (newCode) => {
                setAdminPasscode(newCode);
                localStorage.setItem('jyothi_tailor_passcode', newCode);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'settings'), { passcode: newCode }, { merge: true });
                    } catch (e) {
                        console.error("Cloud config save failed:", e);
                    }
                }
            };

            // Order management modifications
            const addOrder = async (order) => {
                const updatedOrders = [order, ...orders];
                setOrders(updatedOrders);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), order);
                    } catch (e) {
                        console.error("Cloud save failed:", e);
                    }
                }
            };

            const updateOrderStatus = async (id, newStatus) => {
                const updated = orders.map(o => o.id === id ? { ...o, status: newStatus } : o);
                setOrders(updated);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, updateDoc } = window.FirebaseSDK;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), { status: newStatus });
                    } catch (e) {
                        console.error("Cloud status update failed:", e);
                    }
                }
            };

            const deleteOrder = async (id) => {
                const updated = orders.filter(o => o.id !== id);
                setOrders(updated);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, deleteDoc } = window.FirebaseSDK;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                    } catch (e) {
                        console.error("Cloud deletion failed:", e);
                    }
                }
            };

            // Gallery management modifications
            const addGalleryItem = async (item) => {
                const updatedGallery = [item, ...galleryItems];
                setGalleryItems(updatedGallery);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', item.id), item);
                    } catch (e) {
                        console.error("Cloud gallery save failed:", e);
                    }
                }
            };

            const deleteGalleryItem = async (id) => {
                const updatedGallery = galleryItems.filter(item => item.id !== id);
                setGalleryItems(updatedGallery);

                if (db && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jyothi-ladies-tailor';
                    try {
                        const { doc, deleteDoc } = window.FirebaseSDK;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', id));
                    } catch (e) {
                        console.error("Cloud gallery deletion failed:", e);
                    }
                }
            };

            // Scroll helper
            useEffect(() => { window.scrollTo(0, 0); }, [currentView]);

            const renderView = () => {
                switch(currentView) {
                    case 'home': return <HomeView t={t} setView={setView} />;
                    case 'services': return <ServicesView t={t} setView={setView} />;
                    case 'gallery': return <GalleryView t={t} galleryItems={galleryItems} isAdmin={isAdmin} onDeleteGalleryItem={deleteGalleryItem} />;
                    case 'order': return <OrderFormView t={t} addOrder={addOrder} />;
                    case 'contact': return <ContactView t={t} />;
                    case 'admin': 
                        return isAdmin ? (
                            <AdminDashboardView 
                                t={t} 
                                orders={orders} 
                                updateOrderStatus={updateOrderStatus} 
                                galleryItems={galleryItems} 
                                onAddGalleryItem={addGalleryItem}
                                onAddOrder={addOrder}
                                onDeleteOrder={deleteOrder}
                                adminPasscode={adminPasscode}
                                onUpdatePasscode={updateAdminPasscode}
                            />
                        ) : (
                            <HomeView t={t} setView={setView} />
                        );
                    default: return <HomeView t={t} setView={setView} />;
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Navbar 
                        currentView={currentView} 
                        setView={setView} 
                        t={t} 
                        isAdmin={isAdmin} 
                        logOutAdmin={logOutAdmin} 
                        openLoginModal={() => setShowLoginModal(true)} 
                    />
                    
                    <main className="flex-grow">
                        {renderView()}
                    </main>

                    <Footer 
                        t={t} 
                        openLoginModal={() => setShowLoginModal(true)} 
                        isAdmin={isAdmin} 
                        logOutAdmin={logOutAdmin} 
                    />
                    
                    <FloatingWhatsApp msg={t.whatsappFloater.msg} />

                    {/* OWNER ACCESSIBILITY LOGIN MODAL */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 modal-animate">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full border-t-8 border-maroon-700">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-serif font-bold text-maroon-800">Owner Access Portal</h3>
                                    <button onClick={() => { setShowLoginModal(false); setLoginError(false); }} className="text-gray-400 hover:text-gray-600">
                                        <i className="fa-solid fa-times"></i>
                                    </button>
                                </div>
                                <p className="text-xs text-gray-500 mb-4">Enter your secret owner passcode to modify orders and upload gallery photos.</p>
                                
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 uppercase mb-2">Passcode</label>
                                        <input 
                                            type="password" 
                                            value={passcodeInput}
                                            onChange={(e) => setPasscodeInput(e.target.value)}
                                            placeholder="Enter Owner Code" 
                                            className="w-full p-3 border rounded-lg tracking-widest text-center text-lg font-bold"
                                            required
                                        />
                                        {loginError && <p className="text-xs text-red-600 font-semibold mt-2 text-center">Incorrect passcode. Try again.</p>}
                                    </div>
                                    <Button type="submit" className="w-full">Unlock Dashboard</Button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
