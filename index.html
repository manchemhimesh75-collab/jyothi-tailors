                                    Or, Complete Online Form
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-3xl mx-auto px-4">
                        <div className="bg-white rounded shadow-xl overflow-hidden border border-maroon-200">
                            <div className="bg-maroon-800 py-6 px-8 text-center border-b border-gold-500">
                                <h2 className="text-3xl font-serif font-bold text-gold-300">{t.form.title}</h2>
                                <p className="text-maroon-50 text-xs mt-2 font-sans">Commission your measurements securely. Private details are locked from public view.</p>
                            </div>
                            <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className={labelStyle}>{t.form.name} *</label>
                                        <input required type="text" name="name" value={formData.name} onChange={handleChange} className={inputStyle} placeholder="E.g., Priya Sharma" />
                                    </div>
                                    <div>
                                        <label className={labelStyle}>{t.form.phone} *</label>
                                        <input required type="tel" name="phone" value={formData.phone} onChange={handleChange} className={inputStyle} placeholder="10-digit mobile number" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className={labelStyle}>{t.form.whatsapp}</label>
                                        <input type="tel" name="whatsapp" value={formData.whatsapp} onChange={handleChange} className={inputStyle} placeholder="If different from mobile" />
                                    </div>
                                    <div>
                                        <label className={labelStyle}>{t.form.email}</label>
                                        <input type="email" name="email" value={formData.email} onChange={handleChange} className={inputStyle} placeholder="Enter email (optional)" />
                                    </div>
                                </div>
                                <div>
                                    <label className={labelStyle}>{t.form.address} *</label>
                                    <textarea required name="address" value={formData.address} onChange={handleChange} rows="2" className={inputStyle} placeholder="E.g., Gandhipuram, East Godavari"></textarea>
                                </div>
                                
                                <div className="border-t border-maroon-100 pt-6 mt-6">
                                    <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                                        <h3 className="text-lg font-serif text-maroon-700 font-semibold"><i className="fa-solid fa-basket-shopping text-gold-700 mr-1"></i> Dress & Fabric Items</h3>
                                        <button 
                                            type="button" 
                                            onClick={addItemRow}
                                            className="px-3 py-1.5 bg-maroon-50 text-maroon-700 border-2 border-maroon-200 rounded text-xs font-bold uppercase tracking-wider hover:bg-maroon-100 transition font-sans"
                                        >
                                            <i className="fa-solid fa-plus-circle mr-1"></i> Add Dress/Item
                                        </button>
                                    </div>

                                    <div className="space-y-4 font-sans">
                                        {items.map((item, idx) => (
                                            <div key={idx} className="p-4 bg-cream rounded border border-maroon-200 relative">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-xs font-bold text-maroon-800 bg-maroon-100 px-2.5 py-0.5 rounded">Item #{idx+1}</span>
                                                    {items.length > 1 && (
                                                        <button 
                                                            type="button" 
                                                            onClick={() => removeItemRow(idx)}
                                                            className="text-red-700 hover:text-red-950 text-xs uppercase font-bold"
                                                        >
                                                            <i className="fa-solid fa-trash-can mr-1 text-xs"></i> Remove
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Garment Required *</label>
                                                        <select 
                                                            required 
                                                            value={item.dressType} 
                                                            onChange={(e) => handleItemChange(idx, 'dressType', e.target.value)}
                                                            className={`${inputStyle} bg-white text-gray-900`}
                                                        >
                                                            <option value="">Select Category</option>
                                                            {t.categories.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                                            <option value="Other">Other Custom Design</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Fabric Details *</label>
                                                        <input 
                                                            required
                                                            type="text" 
                                                            value={item.fabricDetails} 
                                                            onChange={(e) => handleItemChange(idx, 'fabricDetails', e.target.value)}
                                                            className={inputStyle} 
                                                            placeholder="E.g., Kanchi Silk, Velvet" 
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Quantity *</label>
                                                        <input 
                                                            required
                                                            type="number" 
                                                            min="1"
                                                            value={item.quantity || 1} 
                                                            onChange={(e) => handleItemChange(idx, 'quantity', parseInt(e.target.value) || 1)}
                                                            className={inputStyle} 
                                                        />
                                                    </div>
                                                </div>

                                                <div className="mt-4">
                                                    <label className="block text-xs text-gray-800 font-bold mb-2 uppercase tracking-wider">Reference Design Photos (Optional)</label>
                                                    <div className="flex flex-wrap gap-2 items-center">
                                                        {(item.images || []).map((img, imgIdx) => (
                                                            <div key={imgIdx} className="relative w-16 h-16 border rounded bg-white overflow-hidden group">
                                                                <img src={img} className="w-full h-full object-cover" alt="design ref" />
                                                                <button
                                                                    type="button"
                                                                    onClick={() => handleRemoveItemImage(idx, imgIdx)}
                                                                    className="absolute top-0 right-0 bg-red-600 text-white w-5 h-5 rounded-bl flex items-center justify-center hover:bg-red-700 transition"
                                                                    title="Remove image"
                                                                >
                                                                    <i className="fa-solid fa-times text-[10px]"></i>
                                                                </button>
                                                            </div>
                                                        ))}
                                                        <label className="w-16 h-16 border-2 border-dashed border-gray-400 hover:border-maroon-700 transition cursor-pointer bg-white flex flex-col items-center justify-center">
                                                            <i className="fa-solid fa-plus text-gray-600 text-xs mb-1"></i>
                                                            <span className="text-[9px] text-gray-600 font-bold uppercase text-center leading-tight">Add Photo</span>
                                                            <input
                                                                type="file"
                                                                accept="image/*"
                                                                multiple
                                                                onChange={(e) => handleItemImageUpload(idx, e)}
                                                                className="hidden"
                                                            />
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="mb-6 mt-6">
                                        <label className={labelStyle}>{t.form.measurements}</label>
                                        <textarea name="measurements" value={formData.measurements} onChange={handleChange} rows="3" className={inputStyle} placeholder="E.g., Chest: 36, Shoulder: 14, Sleeves: 10, Neck depth: 8..."></textarea>
                                    </div>

                                    <div className="grid grid-cols-1 gap-6 mb-6">
                                        <label className="p-5 border-2 border-dashed border-maroon-200 rounded text-center bg-gray-50 hover:border-maroon-700 transition cursor-pointer block relative">
                                            <input 
                                                type="file" 
                                                accept="image/*,application/pdf" 
                                                onChange={handleMeasurementUpload} 
                                                className="hidden" 
                                            />
                                            {measurementSheet ? (
                                                <div className="flex flex-col items-center justify-center font-sans">
                                                    <i className="fa-solid fa-file-circle-check text-3xl text-green-600 mb-2"></i>
                                                    <span className="text-sm text-green-700 font-bold truncate max-w-[200px]" title={measurementFileName}>
                                                        {measurementFileName || "Measurement Card Uploaded"}
                                                    </span>
                                                </div>
                                            ) : (
                                                <div className="font-sans">
                                                    <i className="fa-solid fa-file-invoice text-3xl text-gray-500 mb-2"></i>
                                                    <p className="text-sm font-bold text-maroon-700">{t.form.uploadMeasurement}</p>
                                                    <p className="text-xs text-gray-600 mt-1 uppercase tracking-wider font-bold">PDF, Jpeg, PNG files accepted</p>
                                                </div>
                                            )}
                                        </label>
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded flex items-start text-xs text-blue-900 mb-6 border border-blue-200 font-sans">
                                        <i className="fa-solid fa-circle-info mt-1 mr-2.5 text-blue-800"></i>
                                        <p className="font-semibold">Alternatively, you can skip this form and securely drop your measurement sheet or reference patterns directly on our <a href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, t.waMeasureMsg)} className="font-bold underline text-blue-950" target="_blank" rel="noreferrer">WhatsApp line</a>.</p>
                                    </div>

                                    <div>
                                        <label className={labelStyle}>{t.form.instructions}</label>
                                        <textarea name="instructions" value={formData.instructions} onChange={handleChange} rows="2" className={inputStyle} placeholder="Deep neck design, border placement patterns, maggam work preferences..."></textarea>
                                    </div>
                                </div>

                                <div className="pt-4">
                                    <Button type="submit" disabled={isUploading} className="w-full py-4 text-base font-bold tracking-widest">
                                        {isUploading ? (
                                            <span className="flex items-center justify-center gap-2">
                                                <i className="fa-solid fa-spinner animate-spin"></i> Securing Media to Cloud...
                                            </span>
                                        ) : t.form.submit}
                                    </Button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const CustomerPortalView = ({ t, customerOrder }) => {
            if (!customerOrder) return null;

            const finalAmount = (Number(customerOrder.amount) || 0) - (Number(customerOrder.discount) || 0);
            const balanceDue = finalAmount - (Number(customerOrder.amountPaid) || 0);

            const getProgressPercent = (status) => {
                const stages = { 'Received': 15, 'Fabric Received': 40, 'Stitching In Progress': 70, 'Ready': 100, 'Completed & Delivered': 100 };
                return stages[status] || 0;
            };

            return (
                <div className="py-16 bg-cream min-h-screen font-sans">
                    <div className="max-w-3xl mx-auto px-4">
                        <div className="bg-white rounded-lg shadow-xl border border-gold-400 overflow-hidden slide-animate">
                            
                            <div className="bg-maroon-800 text-white p-8 text-center border-b border-gold-500">
                                <span className="text-gold-300 text-xs uppercase tracking-widest font-bold block mb-1">Live Tracking Workspace</span>
                                <h2 className="text-3xl font-serif font-bold text-white">Order: {customerOrder.id}</h2>
                                <p className="text-xs text-maroon-50 mt-2 font-medium">Welcome back, {customerOrder.name}. Find your real-time stitching and balance details below.</p>
                            </div>

                            <div className="p-8 space-y-8">
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Production Stage Status</h3>
                                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded border">
                                        <span className="text-xs font-bold text-gray-600">Live Status:</span>
                                        <span className="text-xs bg-gold-200 text-maroon-950 font-extrabold px-3 py-1 rounded-full border border-gold-400">{customerOrder.status}</span>
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-[10px] uppercase font-bold text-gray-500">
                                            <span>Received</span>
                                            <span>In Progress</span>
                                            <span>Ready</span>
                                        </div>
                                        <div className="w-full bg-gray-200 h-3 rounded-full overflow-hidden border border-gray-300">
                                            <div 
                                                className="bg-maroon-700 h-full transition-all duration-1000" 
                                                style={{ width: `${getProgressPercent(customerOrder.status)}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Garments & Specs</h3>
                                    <div className="space-y-3">
                                        {(customerOrder.items || []).map((item, idx) => (
                                            <div key={idx} className="p-4 bg-cream rounded border border-maroon-200 space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-xs font-bold text-maroon-900">
                                                        Item #{idx+1}: {item.dressType} {item.quantity && item.quantity > 1 ? `x${item.quantity}` : ''}
                                                    </span>
                                                    <span className="text-xs italic text-gray-700 font-semibold">Fabric: {item.fabricDetails}</span>
                                                </div>
                                                
                                                {item.images && item.images.length > 0 && (
                                                    <div className="pt-2">
                                                        <p className="text-[10px] text-gray-600 font-bold uppercase mb-1.5">Attached design configurations:</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {item.images.map((img, imgIdx) => (
                                                                <a key={imgIdx} href={img} target="_blank" rel="noreferrer" className="block relative w-12 h-12 border rounded overflow-hidden shadow-sm">
                                                                    <img src={img} className="w-full h-full object-cover" alt="thumbnail" />
                                                                </a>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {customerOrder.measurements && (
                                        <div className="p-4 bg-white border rounded text-xs leading-relaxed text-gray-800 font-semibold">
                                            <strong className="text-maroon-800 uppercase text-[10px] tracking-wider block mb-1 font-bold">Your Registered Measurements:</strong>
                                            {customerOrder.measurements}
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-maroon-800 uppercase tracking-wider border-b pb-1">Billing Breakdown</h3>
                                    <div className="bg-cream p-6 rounded-lg border border-maroon-200 space-y-3">
                                        <div className="flex justify-between text-xs text-gray-800 font-semibold">
                                            <span>Subtotal Stitching Charges:</span>
                                            <span>₹{customerOrder.amount || 0}</span>
                                        </div>
                                        <div className="flex justify-between text-xs text-green-700 font-semibold">
                                            <span>Discount Applied:</span>
                                            <span>-₹{customerOrder.discount || 0}</span>
                                        </div>
                                        <div className="flex justify-between text-xs text-gray-800 font-semibold border-b pb-3 border-maroon-200">
                                            <span>Paid Advance:</span>
                                            <span>₹{customerOrder.amountPaid || 0}</span>
                                        </div>
                                        <div className="flex justify-between items-center pt-2">
                                            <span className="text-sm font-bold text-maroon-900 uppercase">Remaining Balance Due:</span>
                                            <span className="text-2xl font-mono font-extrabold text-red-700">₹{balanceDue}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-amber-50 border border-amber-200 rounded p-4 text-xs text-amber-900 leading-relaxed flex items-start gap-2.5 font-sans">
                                    <i className="fa-solid fa-shield-halved text-amber-700 mt-0.5"></i>
                                    <p className="font-medium text-gray-800">
                                        <strong>Access Security Protection Policy:</strong> For design protection and customer safety, order attributes and passcodes are strictly write-protected. If you need any immediate customizations or would like to upload additional fabrics, connect directly with our studio via phone or WhatsApp.
                                    </p>
                                </div>

                                <div className="text-center pt-4">
                                    <a 
                                        href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, `Hello! Checking in regarding my custom order ID ${customerOrder.id}. My remaining balance shows as ₹${balanceDue}.`)} 
                                        target="_blank" 
                                        rel="noreferrer" 
                                        className="inline-flex items-center gap-2 bg-[#25D366] text-white px-6 py-3 rounded font-bold text-xs uppercase tracking-wider hover:bg-[#128C7E] transition shadow-md"
                                    >
                                        <i className="fa-brands fa-whatsapp text-lg"></i> Consult Tailor on WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboardView = ({ t, orders, updateOrderStatus, onUpdateOrderDetails, galleryItems, onAddGalleryItem, onAddOrder, onDeleteOrder, adminPasscode, onUpdatePasscode, cloudStatus }) => {
            const statusOptions = ['Received', 'Fabric Received', 'Stitching In Progress', 'Ready', 'Completed & Delivered'];

            const [activeOwnerTab, setActiveOwnerTab] = useState('manualOrder'); 
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            const [deleteConfirmation, setDeleteConfirmation] = useState({ show: false, targetId: null, targetType: '' });
            const [newPasscode, setNewPasscode] = useState('');
            const [confirmPasscode, setConfirmPasscode] = useState('');
            const [isUploading, setIsUploading] = useState(false); 

            const [newDesign, setNewDesign] = useState({
                cat: 'Blouses',
                title: '',
                imgUrl: '',
                imageFile: '',
                price: '' 
            });

            const [manualOrder, setManualOrder] = useState({
                name: '',
                phone: '',
                whatsapp: '',
                measurements: '',
                instructions: '',
                dueDate: '',
                amount: '',
                discount: '',
                amountPaid: '',
                address: 'Manual Walk-In Client / Hand Delivered'
            });

            const [manualItems, setManualItems] = useState([{ dressType: 'Blouses', fabricDetails: '', quantity: 1, images: [] }]);

            const triggerNotification = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => {
                    setNotification({ show: false, message: '', type: 'success' });
                }, 4000);
            };

            const handleManualItemChange = (index, field, value) => {
                const updated = [...manualItems];
                updated[index][field] = value;
                setManualItems(updated);
            };

            const handleManualItemImageUpload = (index, e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const updated = [...manualItems];
                if (!updated[index].images) {
                    updated[index].images = [];
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updated[index].images.push(reader.result);
                        setManualItems([...updated]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleRemoveManualItemImage = (itemIndex, imageIndex) => {
                const updated = [...manualItems];
                updated[itemIndex].images.splice(imageIndex, 1);
                setManualItems(updated);
            };

            const addManualItemRow = () => {
                setManualItems([...manualItems, { dressType: 'Blouses', fabricDetails: '', quantity: 1, images: [] }]);
            };

            const removeManualItemRow = (index) => {
                if (manualItems.length > 1) {
                    setManualItems(manualItems.filter((_, idx) => idx !== index));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewDesign({ ...newDesign, imageFile: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleUploadDesign = async (e) => {
                e.preventDefault();
                setIsUploading(true);

                try {
                    let imageToUpload = 'https://placehold.co/400x500/8c151a/fdfbf7?text=Design';
                    if (newDesign.imageFile) {
                        imageToUpload = await uploadToCloudinary(newDesign.imageFile);
                    } else if (newDesign.imgUrl) {
                        imageToUpload = newDesign.imgUrl;
                    }
                    
                    const item = {
                        id: 'gal-' + Date.now(),
                        cat: newDesign.cat,
                        title: newDesign.title || `${newDesign.cat} Design`,
                        img: imageToUpload,
                        price: newDesign.price ? Number(newDesign.price) : null 
                    };

                    await onAddGalleryItem(item);
                    setNewDesign({ cat: 'Blouses', title: '', imgUrl: '', imageFile: '', price: '' });
                    triggerNotification("Custom design successfully added to gallery with price!");
                } catch (err) {
                    triggerNotification("Gallery update failed", "error");
                } finally {
                    setIsUploading(false);
                }
            };

            const handleManualOrderSubmit = async (e) => {
                e.preventDefault();
                setIsUploading(true);

                try {
                    const uploadedItems = [];
                    for (let mItem of manualItems) {
                        const uploadedImages = [];
                        if (mItem.images && mItem.images.length > 0) {
                            for (let img of mItem.images) {
                                const cloudUrl = await uploadToCloudinary(img);
                                uploadedImages.push(cloudUrl);
                            }
                        }
                        uploadedItems.push({
                            ...mItem,
                            images: uploadedImages
                        });
                    }

                    const newId = 'ORD-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                    
                    const finalOrder = {
                        id: newId,
                        name: manualOrder.name,
                        phone: manualOrder.phone,
                        whatsapp: manualOrder.whatsapp || manualOrder.phone,
                        items: uploadedItems,
                        measurements: manualOrder.measurements,
                        instructions: manualOrder.instructions,
                        dueDate: manualOrder.dueDate,
                        amount: Number(manualOrder.amount) || 0,
                        discount: Number(manualOrder.discount) || 0,
                        amountPaid: Number(manualOrder.amountPaid) || 0,
                        address: manualOrder.address,
                        status: 'Received',
                        date: new Date().toISOString().split('T')[0]
                    };

                    await onAddOrder(finalOrder);
                    setManualOrder({
                        name: '', phone: '', whatsapp: '', measurements: '',
                        instructions: '', dueDate: '', amount: '', discount: '', amountPaid: '', address: 'Manual Walk-In Client / Hand Delivered'
                    });
                    setManualItems([{ dressType: 'Blouses', fabricDetails: '', quantity: 1, images: [] }]);
                    triggerNotification(`Order ${newId} created successfully!`);
                } catch (err) {
                    triggerNotification("Failed to create walk-in ledger", "error");
                } finally {
                    setIsUploading(false);
                }
            };

            const handleOwnerFileUpload = async (orderId, fieldName, file) => {
                if (!file) return;
                setIsUploading(true);
                
                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        try {
                            const cloudUrl = await uploadToCloudinary(reader.result);
                            await onUpdateOrderDetails(orderId, { [fieldName]: cloudUrl });
                            triggerNotification("Attachment updated successfully!");
                        } catch (err) {
                            triggerNotification("Media upload failure", "error");
                        } finally {
                            setIsUploading(false);
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    setIsUploading(false);
                }
            };

            const handleUpdatePasscode = (e) => {
                e.preventDefault();
                if (newPasscode.length < 4) {
                    triggerNotification("Secret passcode must be at least 4 characters long.", "error");
                    return;
                }
                if (newPasscode !== confirmPasscode) {
                    triggerNotification("Confirm passcode does not match!", "error");
                    return;
                }
                onUpdatePasscode(newPasscode);
                setNewPasscode('');
                setConfirmPasscode('');
                triggerNotification("Secret owner passcode updated successfully!");
            };

            const getDueDateBadge = (dueDateStr) => {
                if (!dueDateStr) return <span className="text-[10px] bg-gray-200 text-gray-700 px-2 py-0.5 rounded font-bold uppercase border">No Date</span>;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const due = new Date(dueDateStr);
                due.setHours(0, 0, 0, 0);
                
                const diffTime = due - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 0) {
                    return <span className="text-[10px] bg-red-100 text-red-800 px-2 py-0.5 rounded font-bold uppercase tracking-wider animate-pulse border border-red-200">Overdue</span>;
                } else if (diffDays <= 2) {
                    return <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold uppercase tracking-wider border border-amber-200">Urgent</span>;
                } else {
                    return <span className="text-[10px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-bold uppercase tracking-wider border border-emerald-200">On Track</span>;
                }
            };

            return (
                <div className="py-12 bg-gray-100 min-h-screen">
                    <div className="max-w-7xl mx-auto px-4">
                        
                        {notification.show && (
                            <div className={`fixed top-24 right-6 z-50 p-4 rounded shadow-xl flex items-center gap-3 border transition-all duration-300 transform translate-y-0 ${
                                notification.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'
                            }`}>
                                <i className={`fa-solid ${notification.type === 'success' ? 'fa-circle-check text-emerald-600' : 'fa-circle-xmark text-red-600'} text-2xl`}></i>
                                <p className="font-bold text-xs uppercase tracking-wider">{notification.message}</p>
                            </div>
                        )}

                        {deleteConfirmation.show && (
                            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 modal-animate">
                                <div className="bg-white rounded p-6 max-w-sm w-full border-t-4 border-red-600 shadow-2xl">
                                    <h3 className="text-base font-serif font-bold text-red-700 mb-2">Confirm Delete Action</h3>
                                    <p className="text-xs text-gray-700 font-bold mb-6 leading-relaxed">Are you absolutely sure you want to delete this order? This cannot be undone.</p>
                                    <div className="flex justify-end gap-3">
                                        <button 
                                            onClick={() => setDeleteConfirmation({ show: false, targetId: null, targetType: '' })}
                                            className="px-4 py-2 bg-gray-100 rounded border text-gray-700 text-xs uppercase font-bold hover:bg-gray-200 transition"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            onClick={() => {
                                                onDeleteOrder(deleteConfirmation.targetId);
                                                triggerNotification("Order trace deleted.", "error");
                                                setDeleteConfirmation({ show: false, targetId: null, targetType: '' });
                                            }}
                                            className="px-4 py-2 bg-red-600 rounded text-white text-xs uppercase font-bold hover:bg-red-700 transition"
                                        >
                                            Confirm Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="bg-maroon-800 rounded-t p-6 text-white flex flex-col sm:flex-row justify-between items-center shadow-md gap-4 border-b border-gold-500">
                            <h2 className="text-2xl font-serif font-bold tracking-wide text-white">
                                <i className="fa-solid fa-crown text-gold-300 mr-2"></i> Owner Command Center
                            </h2>
                            <span className="bg-maroon-900 border border-gold-400 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest text-gold-300">
                                {cloudStatus === 'connected' ? 'Cloud Sync Active' : 'Local Sandbox Mode'}
                            </span>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-6 font-sans">
                            <div className="bg-white rounded shadow p-6 border border-maroon-100 lg:col-span-5 flex flex-col h-fit">
                                <div className="flex border-b border-gray-200 mb-6 flex-wrap">
                                    <button 
                                        onClick={() => setActiveOwnerTab('manualOrder')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'manualOrder' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-500 hover:text-gray-700'
                                        }`}
                                    >
                                        <i className="fa-solid fa-plus-circle mr-1"></i> Walk-In Order
                                    </button>
                                    <button 
                                        onClick={() => setActiveOwnerTab('uploadGallery')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'uploadGallery' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-500 hover:text-gray-700'
                                        }`}
                                    >
                                        <i className="fa-solid fa-cloud-upload mr-1"></i> Portfolio
                                    </button>
                                    <button 
                                        onClick={() => setActiveOwnerTab('settings')}
                                        className={`flex-1 pb-3 text-center text-xs font-bold uppercase tracking-wider transition-all border-b-2 min-w-[80px] ${
                                            activeOwnerTab === 'settings' ? 'border-maroon-700 text-maroon-700 font-extrabold' : 'border-transparent text-gray-500 hover:text-gray-700'
                                        }`}
                                    >
                                        <i className="fa-solid fa-key mr-1"></i> Passcode
                                    </button>
                                </div>

                                {activeOwnerTab === 'manualOrder' && (
                                    <form onSubmit={handleManualOrderSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Customer Name *</label>
                                                <input 
                                                    type="text" 
                                                    value={manualOrder.name}
                                                    onChange={(e) => setManualOrder({...manualOrder, name: e.target.value})}
                                                    placeholder="Client Name"
                                                    className="w-full p-2.5 border-2 border-gray-300 rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none text-gray-900 font-semibold"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Mobile Number *</label>
                                                <input 
                                                    type="tel" 
                                                    value={manualOrder.phone}
                                                    onChange={(e) => setManualOrder({...manualOrder, phone: e.target.value})}
                                                    placeholder="E.g., 9948698878"
                                                    className="w-full p-2.5 border-2 border-gray-300 rounded text-xs focus:ring-1 focus:ring-maroon-500 outline-none text-gray-900 font-semibold"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-cream p-3 rounded border border-maroon-200 space-y-3">
                                            <div className="flex justify-between items-center">
                                                <label className="text-xs font-extrabold text-maroon-800 uppercase tracking-wider">Garments & Fabrics *</label>
                                                <button 
                                                    type="button" 
                                                    onClick={addManualItemRow} 
                                                    className="text-xs font-bold text-maroon-700 hover:underline bg-white px-2 py-1 rounded border animate-pulse"
                                                >
                                                    + Add Item Row
                                                </button>
                                            </div>
                                            {manualItems.map((mItem, idx) => (
                                                <div key={idx} className="bg-white p-2.5 rounded border border-gray-200 relative space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-xs font-bold text-gray-500">Garment #{idx+1}</span>
                                                        {manualItems.length > 1 && (
                                                            <button 
                                                                type="button" 
                                                                onClick={removeManualItemRow(idx)} 
                                                                className="text-red-600 hover:text-red-800 text-[10px] font-bold uppercase"
                                                            >
                                                                Remove
                                                            </button>
                                                        )}
                                                    </div>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <select 
                                                            value={mItem.dressType} 
                                                            onChange={(e) => handleManualItemChange(idx, 'dressType', e.target.value)}
                                                            className="w-full p-1.5 border rounded text-xs bg-white text-gray-900 font-semibold"
                                                            required
                                                        >
                                                            {t.categories.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                                            <option value="Other">Other Custom</option>
                                                        </select>
                                                        <input 
                                                            type="text" 
                                                            value={mItem.fabricDetails}
                                                            onChange={(e) => handleManualItemChange(idx, 'fabricDetails', e.target.value)}
                                                            placeholder="Fabric"
                                                            className="w-full p-1.5 border rounded text-xs text-gray-900 font-semibold"
                                                            required
                                                        />
                                                        <input 
                                                            type="number" 
                                                            min="1"
                                                            value={mItem.quantity || 1}
                                                            onChange={(e) => handleManualItemChange(idx, 'quantity', parseInt(e.target.value) || 1)}
                                                            placeholder="Qty"
                                                            className="w-full p-1.5 border rounded text-xs text-gray-900 font-bold"
                                                            required
                                                        />
                                                    </div>

                                                    <div className="mt-2">
                                                        <label className="block text-[10px] text-gray-700 font-bold mb-1 uppercase tracking-wider">Design References (Optional)</label>
                                                        <div className="flex flex-wrap gap-1.5 items-center">
                                                            {(mItem.images || []).map((img, imgIdx) => (
                                                                <div key={imgIdx} className="relative w-10 h-10 border rounded bg-gray-50 overflow-hidden group">
                                                                    <img src={img} className="w-full h-full object-cover" alt="manual design" />
                                                                    <button
                                                                        type="button"
                                                                        onClick={() => handleRemoveManualItemImage(idx, imgIdx)}
                                                                        className="absolute top-0 right-0 bg-red-600 text-white w-4 h-4 rounded-bl flex items-center justify-center hover:bg-red-700 transition"
                                                                    >
                                                                        <i className="fa-solid fa-times text-[8px]"></i>
                                                                    </button>
                                                                </div>
                                                            ))}
                                                            <label className="w-10 h-10 border-2 border-dashed border-gray-300 rounded flex flex-col items-center justify-center hover:border-maroon-700 transition cursor-pointer bg-gray-50">
                                                                <i className="fa-solid fa-plus text-gray-500 text-[10px]"></i>
                                                                <input
                                                                    type="file"
                                                                    accept="image/*"
                                                                    multiple
                                                                    onChange={(e) => handleManualItemImageUpload(idx, e)}
                                                                    className="hidden"
                                                                />
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Due Delivery Target Date *</label>
                                                <input 
                                                    type="date" 
                                                    value={manualOrder.dueDate}
                                                    onChange={(e) => setManualOrder({...manualOrder, dueDate: e.target.value})}
                                                    className="w-full p-2 border-2 border-gray-300 rounded text-xs text-gray-900 font-bold"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-maroon-50/50 p-3 rounded border border-maroon-200 space-y-3">
                                            <div className="grid grid-cols-3 gap-2">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-maroon-800 uppercase mb-0.5">Total Cost (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.amount}
                                                        onChange={(e) => setManualOrder({...manualOrder, amount: e.target.value})}
                                                        placeholder="Charges"
                                                        className="w-full p-1.5 border rounded text-xs text-gray-900 font-bold"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-maroon-800 uppercase mb-0.5">Discount (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.discount}
                                                        onChange={(e) => setManualOrder({...manualOrder, discount: e.target.value})}
                                                        placeholder="Discount"
                                                        className="w-full p-1.5 border rounded text-xs text-gray-900 font-bold"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-maroon-800 uppercase mb-0.5">Paid Advance (₹)</label>
                                                    <input 
                                                        type="number" 
                                                        value={manualOrder.amountPaid}
                                                        onChange={(e) => setManualOrder({...manualOrder, amountPaid: e.target.value})}
                                                        placeholder="Advance"
                                                        className="w-full p-1.5 border rounded text-xs text-gray-900 font-bold"
                                                    />
                                                </div>
                                            </div>
                                            <div className="text-right pt-2 border-t border-maroon-200 flex justify-between text-xs font-bold uppercase tracking-wider">
                                                <span className="text-gray-800 font-sans">Net: ₹{(Number(manualOrder.amount) || 0) - (Number(manualOrder.discount) || 0)}</span>
                                                <span className="text-maroon-950 font-sans">
                                                    Due: <span className="font-mono text-red-700">₹{(Number(manualOrder.amount) || 0) - (Number(manualOrder.discount) || 0) - (Number(manualOrder.amountPaid) || 0)}</span>
                                                </span>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Measurement Specifications</label>
                                            <textarea 
                                                value={manualOrder.measurements}
                                                onChange={(e) => setManualOrder({...manualOrder, measurements: e.target.value})}
                                                placeholder="Chest: 34, Waist: 28, Sleeves: 8..."
                                                rows="2"
                                                className="w-full p-2 border rounded text-xs text-gray-900 font-bold"
                                            ></textarea>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Special Design Notes</label>
                                            <textarea 
                                                value={manualOrder.instructions}
                                                onChange={(e) => setManualOrder({...manualOrder, instructions: e.target.value})}
                                                placeholder="Deep round neck, light pearls on sleeves..."
                                                rows="2"
                                                className="w-full p-2 border rounded text-xs text-gray-900 font-bold"
                                            ></textarea>
                                        </div>

                                        <Button type="submit" disabled={isUploading} variant="primary" className="w-full text-xs tracking-widest font-bold py-3 mt-2">
                                            {isUploading ? (
                                                <span className="flex items-center justify-center gap-2">
                                                    <i className="fa-solid fa-spinner animate-spin"></i> Saving Order...
                                                </span>
                                            ) : (
                                                <>
                                                    <i className="fa-solid fa-plus-circle mr-1"></i> Register Order
                                                </>
                                            )}
                                        </Button>
                                    </form>
                                )}

                                {activeOwnerTab === 'uploadGallery' && (
                                    <form onSubmit={handleUploadDesign} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Select Portfolio Category</label>
                                            <select 
                                                value={newDesign.cat} 
                                                onChange={(e) => setNewDesign({...newDesign, cat: e.target.value})}
                                                className="w-full p-2.5 border rounded bg-white text-xs text-gray-900 font-bold"
                                            >
                                                {t.categories.map((cat, i) => <option key={i} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Design Reference Title</label>
                                            <input 
                                                type="text" 
                                                value={newDesign.title}
                                                onChange={(e) => setNewDesign({...newDesign, title: e.target.value})}
                                                placeholder="E.g., Silk Saree Blouse with Maggam Work"
                                                className="w-full p-2.5 border rounded text-xs text-gray-900 font-bold outline-none focus:ring-1 focus:ring-maroon-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Design Price (₹)</label>
                                            <input 
                                                type="number" 
                                                value={newDesign.price}
                                                onChange={(e) => setNewDesign({...newDesign, price: e.target.value})}
                                                placeholder="E.g., 3500 (Leave blank if variable)"
                                                className="w-full p-2.5 border rounded text-xs text-gray-900 font-bold outline-none focus:ring-1 focus:ring-maroon-500"
                                            />
                                        </div>
                                        
                                        <div className="bg-cream p-4 rounded border border-maroon-200">
                                            <label className="block text-xs font-bold text-maroon-800 uppercase mb-1">Select Portfolio File</label>
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                onChange={handleFileChange}
                                                className="w-full text-xs text-gray-700 file:mr-4 file:py-1.5 file:px-3 file:rounded file:border file:text-[10px] file:font-bold file:uppercase file:bg-maroon-50 file:text-maroon-700 hover:file:bg-maroon-100 cursor-pointer"
                                            />
                                            {newDesign.imageFile && (
                                                <div className="mt-2 text-center">
                                                    <span className="text-[10px] text-green-700 font-bold block mb-1">Image Loaded Successful!</span>
                                                    <img src={newDesign.imageFile} className="h-20 mx-auto rounded border border-maroon-200" alt="uploaded ref" />
                                                </div>
                                            )}
                                        </div>

                                        <div className="text-center text-xs text-gray-505 font-bold uppercase py-1">OR</div>

                                        <div>
                                            <label className="block text-xs font-bold text-gray-800 uppercase mb-1">Paste Raw Image Link (URL)</label>
                                            <input 
                                                type="url" 
                                                value={newDesign.imgUrl}
                                                onChange={(e) => setNewDesign({...newDesign, imgUrl: e.target.value})}
                                                placeholder="Https://example.com/dress.jpg"
                                                className="w-full p-2.5 border rounded text-xs text-gray-900 font-bold"
                                                disabled={!!newDesign.imageFile}
