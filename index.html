                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Registered Phone Number</label>
                                <input type="tel" value={searchPhone} onChange={e=>setSearchPhone(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-accent-500/10 focus:border-accent-500 outline-none font-semibold text-slate-800" placeholder="Type 10-digit lookup mobile" maxLength="10" required />
                                {selectedCustomer && (
                                    <p className="text-xs font-bold text-emerald-600 mt-2.5 flex items-center gap-1.5"><i className="fa-solid fa-circle-check"></i> Connected to existing Sizing Profile: {selectedCustomer.name}</p>
                                )}
                                {!selectedCustomer && searchPhone.length >= 10 && (
                                    <p className="text-xs font-bold text-amber-600 mt-2.5 flex items-center gap-1.5"><i className="fa-solid fa-circle-info"></i> No matching profile found. Appending to guest register.</p>
                                )}
                            </div>
                        </div>

                        {/* Garment details block */}
                        <div className="glass-card rounded-[32px] p-6 shadow-sm">
                            <h3 className="text-lg font-bold font-serif text-slate-800 mb-4"><i className="fa-solid fa-scissors text-accent-500 mr-2"></i> Custom Fitting Selection</h3>
                            
                            <div className="space-y-5">
                                {items.map((item, idx) => (
                                    <div key={idx} className="bg-slate-50/50 p-5 rounded-2xl border border-slate-200/60 relative">
                                        {items.length > 1 && (
                                            <button type="button" onClick={() => removeItem(idx)} className="absolute top-4 right-4 text-slate-400 hover:text-rose-600">
                                                <i className="fa-solid fa-circle-xmark"></i>
                                            </button>
                                        )}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Custom Garment</label>
                                                <select value={item.category} onChange={e => updateItem(idx, 'category', e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm font-semibold text-slate-800">
                                                    {ITEM_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Quantity</label>
                                                    <input type="number" min="1" value={item.quantity} onChange={e => updateItem(idx, 'quantity', e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm font-semibold text-slate-800" required />
                                                </div>
                                                <div className="flex-1">
                                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Pricing (₹)</label>
                                                    <input type="number" min="0" value={item.price} onChange={e => updateItem(idx, 'price', e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm font-semibold text-slate-800" required />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mb-4">
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Specific Custom Styling parameters</label>
                                            <textarea value={item.description} onChange={e => updateItem(idx, 'description', e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 text-sm resize-none h-20 text-slate-800" placeholder="Collar cuts, piping specifications, embroidery thread configurations..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Custom Look Reference Pattern</label>
                                            <div className="flex items-center gap-4 bg-white p-3 rounded-2xl border border-slate-200/40">
                                                {item.images.length > 0 && <img src={item.images[0]} alt="Uploaded Sketch" className="w-12 h-16 rounded-xl object-cover border border-slate-200 shadow-sm" />}
                                                <input type="file" accept="image/*" onChange={(e) => handleImageUpload(idx, e)} className="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 cursor-pointer text-slate-400 font-semibold" />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <Button type="button" variant="outline" onClick={addItem} className="w-full mt-4 border-dashed py-4" icon="fa-plus">Add Another Sizing Layout</Button>
                        </div>

                        {/* Timing details block */}
                        <div className="glass-card rounded-[32px] p-6 shadow-sm">
                            <h3 className="text-lg font-bold font-serif text-slate-800 mb-4"><i className="fa-solid fa-calendar-alt text-accent-500 mr-2"></i> Scheduling & Advance Billing</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Target Delivery Date</label>
                                    <input type="date" value={expectedDate} onChange={e=>setExpectedDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none text-sm font-semibold text-slate-800" required />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Advance Deposit (₹)</label>
                                    <input type="number" min="0" value={amountPaid} onChange={e=>setAmountPaid(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none text-sm font-semibold text-slate-800" />
                                </div>
                            </div>
                            
                            <div className="bg-brand-900 text-white p-6 rounded-[24px] flex justify-between items-center border border-white/10 shadow-luxury mt-6">
                                <div>
                                    <p className="text-[10px] text-brand-100/60 font-bold uppercase tracking-widest">Total Sizing Commission Cost</p>
                                    <p className="text-3xl font-bold font-serif">₹{totalAmount}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] text-brand-100/60 font-bold uppercase tracking-widest">Balance Unpaid</p>
                                    <p className="text-2xl font-bold text-accent-500">₹{totalAmount - (parseFloat(amountPaid) || 0)}</p>
                                </div>
                            </div>
                        </div>

                        <Button type="submit" className="w-full py-4 text-lg" icon="fa-circle-check">Finalize Stitching Contract</Button>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [user, setUser] = useState(null); 
            const [orders, setOrders] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [toast, setToast] = useState(null);
            
            const [showWelcomeModal, setShowWelcomeModal] = useState(false);
            const [welcomeStep, setWelcomeStep] = useState(1); 
            const [welcomePhone, setWelcomePhone] = useState('');
            const [welcomeFilter, setWelcomeFilter] = useState('');

            const [firebaseReady, setFirebaseReady] = useState(false);
            const [isLiveMode, setIsLiveMode] = useState(false);

            const showToast = (message, type = 'info') => setToast({ message, type });

            const seedDatabaseIfEmpty = async (db, appId) => {
                const { getDocs, collection, doc, setDoc } = window.FirebaseSDK;
                
                const customersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'customers'));
                if (customersSnap.empty) {
                    for (const c of initialCustomers) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', c.id), c);
                    }
                }
                
                const ordersSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'orders'));
                if (ordersSnap.empty) {
                    for (const o of initialOrders) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', o.id), o);
                    }
                }

                const gallerySnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'gallery'));
                if (gallerySnap.empty) {
                    for (const g of initialGallery) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', g.id), g);
                    }
                }
            };

            // Initialize connection to Firebase or fallback locally
            useEffect(() => {
                const initializeFirebase = async () => {
                    const hasLocalConfig = MY_FIREBASE_CONFIG && typeof MY_FIREBASE_CONFIG === 'object';
                    
                    if (hasLocalConfig && window.FirebaseSDK) {
                        try {
                            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, getFirestore } = window.FirebaseSDK;
                            
                            const app = initializeApp(MY_FIREBASE_CONFIG);
                            const db = getFirestore(app);
                            const auth = getAuth(app);
                            
                            window.firebaseAppInstance = app;
                            window.firebaseDbInstance = db;
                            window.firebaseAuthInstance = auth;

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }

                            setIsLiveMode(true);
                            setFirebaseReady(true);
                            showToast("Connected to secure live atelier database.", "success");
                        } catch (err) {
                            console.error("Firebase connection error:", err);
                            setupFallbackData();
                        }
                    } else {
                        setupFallbackData();
                    }
                };

                const setupFallbackData = () => {
                    const localOrders = localStorage.getItem('ja_orders');
                    const localCustomers = localStorage.getItem('ja_customers');
                    const localGallery = localStorage.getItem('ja_gallery');
                    
                    if (localOrders && localCustomers) {
                        setOrders(JSON.parse(localOrders));
                        setCustomers(JSON.parse(localCustomers));
                    } else {
                        setOrders(initialOrders);
                        setCustomers(initialCustomers);
                        localStorage.setItem('ja_orders', JSON.stringify(initialOrders));
                        localStorage.setItem('ja_customers', JSON.stringify(initialCustomers));
                    }

                    if (localGallery) {
                        setGallery(JSON.parse(localGallery));
                    } else {
                        setGallery(initialGallery);
                        localStorage.setItem('ja_gallery', JSON.stringify(initialGallery));
                    }
                    
                    const savedUser = localStorage.getItem('ja_user');
                    if (savedUser) {
                        const parsed = JSON.parse(savedUser);
                        setUser(parsed);
                        setView(parsed.role === 'admin' ? 'ownerDash' : 'clientDash');
                    }
                    setFirebaseReady(true);
                };

                const hasSeenPopup = sessionStorage.getItem('seen_welcome_popup');
                if (!hasSeenPopup) {
                    setShowWelcomeModal(true);
                    sessionStorage.setItem('seen_welcome_popup', 'true');
                }

                if (window.FirebaseSDK) {
                    initializeFirebase();
                } else {
                    window.addEventListener('FirebaseSDKReady', initializeFirebase);
                }

                return () => {
                    window.removeEventListener('FirebaseSDKReady', initializeFirebase);
                };
            }, []);

            // Setup Snapshot Subscriptions
            useEffect(() => {
                if (!isLiveMode || !firebaseReady) return;
                
                const db = window.firebaseDbInstance;
                const appId = 'jyothi-tailors';
                const { onSnapshot, collection, query } = window.FirebaseSDK;

                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const customersRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                const galleryRef = collection(db, 'artifacts', appId, 'public', 'data', 'gallery');

                seedDatabaseIfEmpty(db, appId).catch(err => console.error("Database seeding issue:", err));

                const unsubOrders = onSnapshot(query(ordersRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setOrders(list);
                }, (err) => console.error(err));

                const unsubCustomers = onSnapshot(query(customersRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setCustomers(list);
                }, (err) => console.error(err));

                const unsubGallery = onSnapshot(query(galleryRef), (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                    setGallery(list);
                }, (err) => console.error(err));

                return () => {
                    unsubOrders();
                    unsubCustomers();
                    unsubGallery();
                };
            }, [isLiveMode, firebaseReady]);

            const addCustomer = async (customer) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', customer.id), customer);
                } else {
                    const updated = [...customers, customer];
                    setCustomers(updated);
                    localStorage.setItem('ja_customers', JSON.stringify(updated));
                }
            };

            const updateCustomer = async (customer) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', customer.id), customer);
                } else {
                    const updated = customers.map(c => c.id === customer.id ? customer : c);
                    setCustomers(updated);
                    localStorage.setItem('ja_customers', JSON.stringify(updated));
                }
                showToast('Client records updated in sync.', 'success');
            };

            const deleteCustomer = async (id) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', id));
                } else {
                    const updated = customers.filter(c => c.id !== id);
                    setCustomers(updated);
                    localStorage.setItem('ja_customers', JSON.stringify(updated));
                }
                showToast('Client profile archived.', 'success');
            };
            
            const addOrder = async (order) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), order);
                } else {
                    const updated = [order, ...orders];
                    setOrders(updated);
                    localStorage.setItem('ja_orders', JSON.stringify(updated));
                }
            };

            const addGalleryItem = async (item) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', item.id), item);
                } else {
                    const updated = [item, ...gallery];
                    setGallery(updated);
                    localStorage.setItem('ja_gallery', JSON.stringify(updated));
                }
            };
            
            const deleteGalleryItem = async (id) => {
                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, deleteDoc } = window.FirebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', id));
                } else {
                    const updated = gallery.filter(item => item.id !== id);
                    setGallery(updated);
                    localStorage.setItem('ja_gallery', JSON.stringify(updated));
                }
                showToast('Discarded lookbook reference layout.', 'success');
            };
            
            const updateOrderStatus = async (orderId, newStatus) => {
                const targetOrder = orders.find(o => o.id === orderId);
                if (!targetOrder) return;

                const updatedData = { ...targetOrder, status: newStatus };
                if (newStatus === 'Delivered') updatedData.deliveryDate = new Date().toISOString();

                if (isLiveMode) {
                    const db = window.firebaseDbInstance;
                    const auth = window.firebaseAuthInstance;
                    if (!auth.currentUser) return;
                    const appId = 'jyothi-tailors';
                    const { doc, setDoc } = window.FirebaseSDK;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId), updatedData);
                } else {
                    const updated = orders.map(o => o.id === orderId ? updatedData : o);
                    setOrders(updated);
                    localStorage.setItem('ja_orders', JSON.stringify(updated));
                }
                showToast(`Status updated to ${newStatus}`, 'success');
            };

            const handleLogin = (role, phone) => {
                const userData = { role, phone };
                setUser(userData);
                localStorage.setItem('ja_user', JSON.stringify(userData));
                setView(role === 'admin' ? 'ownerDash' : 'clientDash');
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('ja_user');
                setView('login');
            };

            const handleWelcomeSelect = (category) => {
                setWelcomeFilter(category);
                if (!user) {
                    setWelcomeStep(2);
                } else {
                    setShowWelcomeModal(false);
                    setView('clientDash');
                }
            };

            const handleWelcomePhoneSubmit = (e) => {
                e.preventDefault();
                if (welcomePhone.length < 10) {
                    showToast("Please enter a valid 10-digit number.", "error");
                    return;
                }
                setShowWelcomeModal(false);
                handleLogin('client', welcomePhone);
            };

            if (!firebaseReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center text-brand-900 bg-stone-50 font-serif">
                        <div className="w-16 h-16 bg-brand-900 text-accent-500 rounded-3xl flex items-center justify-center text-2xl font-bold shadow-luxury animate-bounce mb-6 border border-accent-500/20">J</div>
                        <h2 className="text-lg font-bold tracking-widest text-slate-700 uppercase">Jyothi Atelier</h2>
                        <p className="text-xs text-slate-400 mt-2 font-sans font-semibold tracking-wider"><i className="fa-solid fa-circle-notch fa-spin mr-1.5"></i> Syncing live premium metrics...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative bg-stone-50/50">
                    
                    {/* Atelier Luxury Nav Bar */}
                    {view !== 'login' && (
                        <header className="bg-white/85 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200/50 shadow-sm">
                            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-9 h-9 bg-brand-900 text-accent-500 rounded-xl flex items-center justify-center font-serif font-bold border border-accent-500/10">J</div>
                                    <span className="font-serif font-bold text-slate-800 tracking-wide text-lg">{SHOP_NAME}</span>
                                </div>
                                {user?.role === 'admin' && (
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-brand-700 bg-brand-50 border border-brand-100/50 px-3 py-1.5 rounded-lg">Owner Authorization</span>
                                )}
                            </div>
                        </header>
                    )}

                    {/* View Router */}
                    <main className="flex-1">
                        {view === 'login' && (
                            <LoginView 
                                onLogin={handleLogin} 
                                showToast={showToast} 
                            />
                        )}
                        {view === 'clientDash' && (
                            <ClientDashboard 
                                phone={user?.phone} 
                                orders={orders} 
                                gallery={gallery} 
                                logout={handleLogout} 
                                initialCategoryFilter={welcomeFilter}
                                onClearInitialFilter={() => setWelcomeFilter('')}
                            />
                        )}
                        {view === 'ownerDash' && (
                            <OwnerDashboard 
                                orders={orders} 
                                customers={customers} 
                                gallery={gallery} 
                                setView={setView} 
                                updateOrderStatus={updateOrderStatus} 
                                logout={handleLogout} 
                                showToast={showToast} 
                                addGalleryItem={addGalleryItem} 
                                deleteGalleryItem={deleteGalleryItem} 
                                updateCustomer={updateCustomer}
                                deleteCustomer={deleteCustomer}
                                isLive={isLiveMode} 
                            />
                        )}
                        {view === 'newCustomer' && <NewCustomerForm setView={setView} addCustomer={addCustomer} showToast={showToast} />}
                        {view === 'newOrder' && <NewOrderForm setView={setView} addOrder={addOrder} customers={customers} showToast={showToast} />}
                    </main>

                    {/* Welcome Startup Popup */}
                    {showWelcomeModal && (
                        <div className="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-white rounded-[36px] p-6 md:p-10 w-full max-w-2xl shadow-luxury relative text-center border border-slate-200/50 animate-slide-up overflow-hidden">
                                
                                <div className="absolute top-0 right-0 w-24 h-24 bg-accent-500/10 rounded-full blur-3xl"></div>
                                <div className="absolute bottom-0 left-0 w-32 h-32 bg-brand-500/10 rounded-full blur-3xl"></div>

                                <button 
                                    onClick={() => setShowWelcomeModal(false)} 
                                    className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center transition-colors border border-slate-200/30"
                                >
                                    <i className="fa-solid fa-times"></i>
                                </button>

                                <div className="w-16 h-16 bg-brand-50 text-brand-900 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-brand-100/40 shadow-inner">
                                    <i className="fa-solid fa-gem text-accent-600 text-xl"></i>
                                </div>

                                <h2 className="text-3xl md:text-4xl font-bold font-serif text-slate-800 tracking-tight">Jyothi Atelier Tailoring</h2>
                                
                                {welcomeStep === 1 ? (
                                    <div className="animate-fade-in">
                                        <p className="text-xs md:text-sm text-slate-500 mt-2 max-w-md mx-auto leading-relaxed">
                                            Handcrafted bridal embroidery, zardosi zari works, and bespoke luxury tailoring designed exclusively to your measurements. Choose a collection lookbook to explore:
                                        </p>

                                        {/* Options Grid */}
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
                                            {/* Option 1: Maggam Work */}
                                            <div 
                                                onClick={() => handleWelcomeSelect('Maggam Works')}
                                                className="bg-brand-50/50 hover:bg-brand-100/40 p-6 rounded-2xl border border-brand-100 cursor-pointer group transition-all text-center flex flex-col items-center justify-center shadow-sm hover:shadow-luxury hover:-translate-y-1 duration-300"
                                            >
                                                <div className="w-12 h-12 bg-accent-100 text-accent-700 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                                    <i className="fa-solid fa-crown text-lg"></i>
                                                </div>
                                                <h4 className="font-serif font-bold text-slate-800 text-sm">Maggam Work</h4>
                                                <p className="text-[10px] text-slate-500 mt-1 leading-normal">Bridal zardosi handwork & heavy stone patterns</p>
                                            </div>

                                            {/* Option 2: Machine Work */}
                                            <div 
                                                onClick={() => handleWelcomeSelect('Machine Works')}
                                                className="bg-accent-50/50 hover:bg-accent-100/50 p-6 rounded-2xl border border-accent-100/40 cursor-pointer group transition-all text-center flex flex-col items-center justify-center shadow-sm hover:shadow-luxury hover:-translate-y-1 duration-300"
                                            >
                                                <div className="w-12 h-12 bg-amber-100 text-amber-700 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                                    <i className="fa-solid fa-laptop-code text-lg"></i>
                                                </div>
                                                <h4 className="font-serif font-bold text-slate-800 text-sm">Computer Works</h4>
                                                <p className="text-[10px] text-slate-500 mt-1 leading-normal">High-fidelity geometric machine embroidery designs</p>
                                            </div>

                                            {/* Option 3: Stitching */}
                                            <div 
                                                onClick={() => handleWelcomeSelect('Stitching Works')}
                                                className="bg-emerald-50/40 hover:bg-emerald-50/80 p-6 rounded-2xl border border-emerald-100/30 cursor-pointer group transition-all text-center flex flex-col items-center justify-center shadow-sm hover:shadow-luxury hover:-translate-y-1 duration-300"
                                            >
                                                <div className="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                                                    <i className="fa-solid fa-scissors text-lg"></i>
                                                </div>
                                                <h4 className="font-serif font-bold text-slate-800 text-sm">Fine Stitching</h4>
                                                <p className="text-[10px] text-slate-500 mt-1 leading-normal">Boutique blouses, customized curves & kurtis styling</p>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-fade-in max-w-sm mx-auto mt-6">
                                        <div className="mb-4">
                                            <span className="text-xs font-bold text-brand-700 bg-brand-50 px-4 py-1.5 rounded-full border border-brand-100/50">
                                                Reviewing {welcomeFilter} Catalog
                                            </span>
                                        </div>
                                        <p className="text-xs text-slate-500 mb-6 leading-relaxed font-medium">
                                            Please link your registered mobile index so we can retrieve your design preferences and customized measurements.
                                        </p>
                                        <form onSubmit={handleWelcomePhoneSubmit} className="space-y-4">
                                            <div className="relative">
                                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">+91</span>
                                                <input 
                                                    type="tel" 
                                                    autoFocus 
                                                    value={welcomePhone} 
                                                    onChange={e => setWelcomePhone(e.target.value.replace(/\D/g, ''))} 
                                                    className="w-full pl-14 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 outline-none transition-all font-semibold text-slate-800" 
                                                    placeholder="10-digit number" 
                                                    maxLength="10"
                                                    required 
                                                />
                                            </div>
                                            <div className="flex gap-2.5">
                                                <Button variant="ghost" onClick={() => setWelcomeStep(1)} className="flex-1 text-xs">
                                                    Back
                                                </Button>
                                                <Button type="submit" className="flex-[2] text-xs">
                                                    Open Custom Catalog
                                                </Button>
                                            </div>
                                        </form>
                                    </div>
                                )}

                                <div className="mt-8 pt-5 border-t border-slate-100 flex items-center justify-center gap-4 text-[10px] font-bold text-slate-400 tracking-wider uppercase">
                                    <span>Pure Silks</span> • <span>Perfect Fits</span> • <span>Atelier Live Sync</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Global Toast notifications */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
