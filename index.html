<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jyothi Atelier | Premium Bespoke Tailoring & Design</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter (Modern interface) & Playfair Display (Elegant luxury serif) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- React, ReactDOM, and Babel Standalone (Stable Versions) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf3f3',
                            100: '#fbe4e4',
                            500: '#a31f24',
                            600: '#8c151a', // Crimson Maroon
                            700: '#7b1113',
                            900: '#561416',
                            950: '#2d0607', 
                        },
                        accent: {
                            50: '#fefdf6',
                            100: '#fef7da',
                            500: '#d4af37', // Antique Gold
                            600: '#b5952f',
                            700: '#8c7324',
                        }
                    },
                    boxShadow: {
                        'apple': '0 8px 30px rgba(0, 0, 0, 0.04)',
                        'apple-hover': '0 20px 40px rgba(0, 0, 0, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fdfbf7; 
            color: #1f2937;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, h4, .font-serif { font-family: '"Playfair Display"', serif; }
        
        /* Hide scrollbars elegantly */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="antialiased selection:bg-brand-600 selection:text-white">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query
        };
        window.dispatchEvent(new Event('FirebaseSDKReady'));
    </script>

    <!-- React JSX compilation starts -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SHOP_NAME = "Jyothi Atelier";
        const OWNER_WHATSAPP = "919948698878"; // Inquiries go directly to you

        const ITEM_CATEGORIES = ['Saree Blouse', 'Lehenga', 'Kurti', 'Chudidar Set', 'Western Dress', 'Gown', 'Pant/Trouser', 'Skirt', 'Alteration', 'Maggam Work', 'Other'];
        const ORDER_STATUSES = ['Order Received', 'Processing', 'Ready', 'Delivered'];
        const GALLERY_CATEGORIES = ['Maggam Work', 'Machine Work', 'Hand Embroidery', 'Boutique Collection'];

        // Cloudinary placeholders (will default to base64 conversion if unmodified)
        const CLOUDINARY_CLOUD_NAME = "your_cloud_name";
        const CLOUDINARY_UPLOAD_PRESET = "your_unsigned_preset_name";
        const MY_FIREBASE_CONFIG = null; 

        // --- FALLBACK LOCAL STORAGE UTILS ---
        const getAdminPin = () => localStorage.getItem('adminPin') || "9887";
        const setAdminPin = (newPin) => localStorage.setItem('adminPin', newPin);

        // --- INITIAL MOCK DATA ---
        const initialOrders = [
            { id: 'ORD-101', customerName: 'Priya Sharma', customerPhone: '9876543210', items: [{ category: 'Saree Blouse', quantity: 1, images: [], description: 'Bridal neck, heavy embroidery', price: 2500 }], status: 'Processing', orderDate: '2026-06-21', expectedDeliveryDate: '2026-06-28', totalAmount: 2500, amountPaid: 1000, notes: 'Deliver before evening' },
            { id: 'ORD-102', customerName: 'Lakshmi Rao', customerPhone: '9123456789', items: [{ category: 'Lehenga', quantity: 1, images: [], description: 'Zari border styling', price: 8000 }], status: 'Ready', orderDate: '2026-06-18', expectedDeliveryDate: '2026-06-25', totalAmount: 8000, amountPaid: 4000, notes: '' }
        ];

        const initialCustomers = [
            { id: 'CUST-1', name: 'Priya Sharma', phone: '9876543210', address: 'Jubilee Hills', notes: 'Prefers boat neck' },
            { id: 'CUST-2', name: 'Lakshmi Rao', phone: '9123456789', address: 'Madhapur', notes: '' },
            { id: 'CUST-3', name: 'Anita Desai', phone: '9988776655', address: 'Banjara Hills', notes: '' }
        ];

        const initialGallery = [
            { id: 'GAL-1', category: 'Maggam Work', image: 'https://placehold.co/600x800/8c151a/ffffff?text=Bridal+Maggam', title: 'Heavy Bridal Maggam Blouse' },
            { id: 'GAL-2', category: 'Machine Work', image: 'https://placehold.co/600x800/b5952f/ffffff?text=Machine+Work', title: 'Floral Machine Embroidery' }
        ];

        const uploadImage = async (file) => {
            if (CLOUDINARY_CLOUD_NAME === "your_cloud_name") {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return data.secure_url;
        };

        const generateId = (prefix) => `${prefix}-${Math.floor(Math.random() * 90000) + 10000}`;
        const formatDate = (dateStr) => {
            if (!dateStr) return 'TBD';
            return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const getWhatsAppLink = (order) => {
            const cleanNum = order.customerPhone.replace(/\D/g, '');
            const itemsText = order.items.map(i => `- ${i.quantity}x ${i.category}`).join('%0A');
            const text = `*Order Summary - ${SHOP_NAME}*%0A%0A👤 Customer: ${order.customerName}%0A📱 Mobile: ${order.customerPhone}%0A🔖 Order ID: ${order.id}%0A%0A*Items:*%0A${itemsText}%0A%0A⏳ Status: *${order.status}*%0A📅 Expected Delivery: ${formatDate(order.expectedDeliveryDate)}%0A%0AThank you for choosing us!`;
            return `https://wa.me/${cleanNum}?text=${text}`;
        };

        const getGalleryWhatsAppLink = (item) => {
            const text = `Hi ${SHOP_NAME}, I saw this beautiful design in your app gallery and would like to know more about it!%0A%0A*Design:* ${item.title}%0A*Category:* ${item.category}%0A*ID:* ${item.id}%0A%0ACan you share the pricing and details?`;
            return `https://wa.me/${OWNER_WHATSAPP}?text=${text}`;
        };

        const Button = ({ children, variant = 'primary', className = '', icon, ...props }) => {
            const base = "relative inline-flex items-center justify-center gap-2 px-6 py-3.5 text-sm font-bold rounded-2xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                primary: "bg-brand-900 text-white shadow-lg hover:shadow-xl hover:bg-brand-950",
                secondary: "bg-accent-500 text-brand-950 hover:bg-accent-600 shadow-sm",
                outline: "border-2 border-slate-200 text-slate-700 hover:bg-slate-50 hover:border-slate-300",
                danger: "bg-red-50 text-red-600 hover:bg-red-100"
            };
            return (
                <button className={`${base} ${variants[variant]} ${className}`} {...props}>
                    {icon && <i className={`fa-solid ${icon}`}></i>}
                    {children}
                </button>
            );
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-slate-800';
            const icon = type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-info';

            return (
                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] animate-bounce">
                    <div className={`${bg} text-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 text-sm font-bold tracking-wide`}>
                        <i className={`fa-solid ${icon} text-lg`}></i>
                        {message}
                    </div>
                </div>
            );
        };

        const LoginView = ({ onLogin, showToast }) => {
            const [role, setRole] = useState('client'); 
            const [input, setInput] = useState('');
            const [step, setStep] = useState(1); // 1: Enter Phone, 2: OTP (Simulation)

            const handleSubmit = (e) => {
                e.preventDefault();
                if (role === 'admin') {
                    if (input === getAdminPin()) {
                        onLogin('admin', null);
                    } else {
                        showToast('Invalid Owner PIN! Default is 9887.', 'error');
                    }
                } else {
                    if (step === 1) {
                        if (input.replace(/\D/g, '').length >= 10) {
                            setStep(2);
                        } else {
                            showToast('Please enter a valid 10-digit mobile number.', 'error');
                        }
                    } else {
                        onLogin('client', input);
                    }
                }
            };

            return (
                <div className="min-h-[80vh] flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-md bg-white rounded-3xl p-8 shadow-apple border border-slate-100">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-brand-900 text-accent-500 rounded-2xl mx-auto flex items-center justify-center text-3xl font-serif font-bold shadow-lg mb-4">
                                J
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800">Welcome to Jyothi Atelier</h2>
                            <p className="text-sm text-slate-500 mt-1">Access your designer portal securely.</p>
                        </div>

                        <div className="flex bg-slate-100 p-1 rounded-2xl mb-6">
                            <button onClick={() => { setRole('client'); setStep(1); setInput(''); }} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${role === 'client' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>Customer Login</button>
                            <button onClick={() => { setRole('admin'); setInput(''); }} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all ${role === 'admin' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>Owner Login</button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-5">
                            {role === 'client' ? (
                                step === 1 ? (
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Mobile Number</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">+91</span>
                                            <input type="tel" autoFocus value={input} onChange={e => setInput(e.target.value)} className="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold text-slate-800" placeholder="98765 43210" required />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-fade-in">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Verification Code</label>
                                        <input type="number" autoFocus placeholder="Enter any 4 digits" className="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold text-center tracking-[0.5em]" required />
                                        <p className="text-xs text-center text-slate-400 mt-3">OTP code sent to +91 {input}. <button type="button" onClick={() => setStep(1)} className="text-brand-600 font-bold hover:underline">Change Number</button></p>
                                    </div>
                                )
                            ) : (
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Admin Security PIN</label>
                                    <input type="password" autoFocus value={input} onChange={e => setInput(e.target.value)} placeholder="••••" className="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold text-center tracking-widest" required />
                                </div>
                            )}
                            
                            <Button type="submit" className="w-full py-4 text-base mt-2">
                                {role === 'client' && step === 1 ? 'Send OTP' : 'Secure Login'}
                            </Button>
                        </form>
                    </div>
                </div>
            );
        };

        const ClientDashboard = ({ phone, orders, gallery, logout }) => {
            const [activeTab, setActiveTab] = useState('orders'); 
            const [galCategory, setGalCategory] = useState('All');

            const myOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    if (o.customerPhone.replace(/\D/g, '') !== phone.replace(/\D/g, '')) return false;
                    if (o.status === 'Delivered' && o.deliveryDate) {
                        const delDate = new Date(o.deliveryDate);
                        const diffDays = (now - delDate) / (1000 * 60 * 60 * 24);
                        if (diffDays > 7) return false;
                    }
                    return true;
                }).sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, phone]);

            const filteredGallery = useMemo(() => {
                if (!gallery) return [];
                if (galCategory === 'All') return gallery;
                return gallery.filter(g => g.category === galCategory);
            }, [gallery, galCategory]);

            const getProgressIndex = (status) => ORDER_STATUSES.indexOf(status);

            return (
                <div className="max-w-3xl mx-auto p-4 pb-24 animate-fade-in">
                    <div className="flex justify-between items-end mb-6 mt-4">
                        <div>
                            <p className="text-sm text-slate-500 font-medium mb-1">Welcome back,</p>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">{myOrders[0]?.customerName || 'Customer'}</h1>
                        </div>
                        <button onClick={logout} className="w-10 h-10 bg-white rounded-full shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors">
                            <i className="fa-solid fa-power-off"></i>
                        </button>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex bg-slate-100 p-1 rounded-xl mb-8">
                        <button onClick={() => setActiveTab('orders')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'orders' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>My Orders</button>
                        <button onClick={() => setActiveTab('gallery')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-2 ${activeTab === 'gallery' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-sparkles text-accent-500"></i> Inspiration
                        </button>
                    </div>

                    {activeTab === 'orders' && (
                        myOrders.length === 0 ? (
                            <div className="glass-card rounded-3xl p-10 text-center flex flex-col items-center">
                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-4">
                                    <i className="fa-solid fa-box-open text-4xl text-slate-300"></i>
                                </div>
                                <h3 className="text-xl font-bold text-slate-700 mb-2">No Active Orders</h3>
                                <p className="text-slate-500 text-sm max-w-xs">You don't have any recent orders. Visit our atelier to commission a new bespoke design.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {myOrders.map(order => {
                                    const progIdx = getProgressIndex(order.status);
                                    return (
                                        <div key={order.id} className="glass-card rounded-3xl overflow-hidden shadow-apple transition-transform duration-300 hover:scale-[1.01]">
                                            <div className="p-5 border-b border-slate-100 bg-white/50 flex justify-between items-center">
                                                <div>
                                                    <span className="text-xs font-bold text-brand-700 uppercase tracking-widest bg-brand-50 px-2 py-1 rounded-md">#{order.id}</span>
                                                    <p className="text-xs text-slate-500 mt-2 font-medium">Placed on {formatDate(order.orderDate)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <span className={`px-3 py-1.5 rounded-full text-xs font-bold ${order.status === 'Delivered' ? 'bg-green-100 text-green-700' : 'bg-accent-100 text-accent-700'}`}>
                                                        {order.status}
                                                    </span>
                                                </div>
                                            </div>

                                            <div className="p-6 bg-white">
                                                <div className="relative">
                                                    <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-slate-100 z-0"></div>
                                                    <div className="absolute left-4 top-2 w-0.5 bg-brand-600 z-0 transition-all duration-1000" style={{ height: `${(progIdx / (ORDER_STATUSES.length - 1)) * 100}%` }}></div>
                                                    
                                                    {ORDER_STATUSES.map((step, idx) => (
                                                        <div key={step} className="relative z-10 flex items-center gap-4 mb-6 last:mb-0">
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors duration-500 ${idx <= progIdx ? 'bg-brand-600 text-white shadow-md' : 'bg-white border-2 border-slate-200 text-slate-300'}`}>
                                                                {idx < progIdx ? <i className="fa-solid fa-check text-xs"></i> : <div className={`w-2.5 h-2.5 rounded-full ${idx === progIdx ? 'bg-white' : 'bg-transparent'}`}></div>}
                                                            </div>
                                                            <div className={idx <= progIdx ? 'text-slate-800' : 'text-slate-400'}>
                                                                <p className="text-sm font-bold">{step}</p>
                                                                {idx === 2 && progIdx <= 2 && <p className="text-xs opacity-70 mt-0.5">Expected: {formatDate(order.expectedDeliveryDate)}</p>}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="p-5 bg-slate-50/50 border-t border-slate-100">
                                                <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Garment Details</h4>
                                                <div className="space-y-3 mb-5">
                                                    {order.items.map((item, i) => (
                                                        <div key={i} className="flex gap-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                                            {item.images && item.images.length > 0 ? (
                                                                <img src={item.images[0]} className="w-16 h-16 rounded-lg object-cover" alt="design" />
                                                            ) : (
                                                                <div className="w-16 h-16 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300"><i className="fa-solid fa-shirt"></i></div>
                                                            )}
                                                            <div className="flex-1">
                                                                <div className="flex justify-between items-start">
                                                                    <p className="font-bold text-slate-800 text-sm">{item.category}</p>
                                                                    <p className="text-sm font-bold text-slate-600">x{item.quantity}</p>
                                                                </div>
                                                                <p className="text-xs text-slate-500 mt-1 line-clamp-2">{item.description}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                                    <div>
                                                        <p className="text-xs text-slate-500 font-medium">Total Amount</p>
                                                        <p className="font-bold text-slate-800">₹{order.totalAmount}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-xs text-slate-500 font-medium">Balance Due</p>
                                                        <p className="font-bold text-brand-700">₹{order.totalAmount - order.amountPaid}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    )}

                    {activeTab === 'gallery' && (
                        <div className="animate-fade-in">
                            <div className="flex gap-2 overflow-x-auto pb-4 scrollbar-hide mb-4">
                                {['All', ...GALLERY_CATEGORIES].map(cat => (
                                    <button key={cat} onClick={() => setGalCategory(cat)} className={`whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold transition-all shadow-sm ${galCategory === cat ? 'bg-brand-900 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            
                            {filteredGallery.length === 0 ? (
                                <div className="p-12 text-center text-slate-400">
                                    <i className="fa-solid fa-image text-4xl mb-3 opacity-50"></i>
                                    <p className="font-medium text-sm">No designs in this category yet.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 gap-4">
                                    {filteredGallery.map(item => (
                                        <div key={item.id} className="glass-card rounded-2xl overflow-hidden group">
                                            <div className="relative aspect-[3/4] overflow-hidden">
                                                <img src={item.image} alt={item.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">
                                                    <p className="text-white font-bold text-sm leading-tight mb-1">{item.title}</p>
                                                    <p className="text-accent-500 text-xs font-medium mb-3">{item.category}</p>
                                                    <a href={getGalleryWhatsAppLink(item)} target="_blank" rel="noreferrer" className="w-full bg-[#25D366] text-white py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 hover:bg-[#20b858] transition-colors shadow-lg">
                                                        <i className="fa-brands fa-whatsapp text-lg"></i> Enquire
                                                    </a>
                                                </div>
                                            </div>
                                            <div className="p-3 sm:hidden">
                                                <p className="font-bold text-slate-800 text-sm truncate">{item.title}</p>
                                                <p className="text-xs text-slate-500">{item.category}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const OwnerDashboard = ({ orders, customers, setView, updateOrderStatus, logout, showToast }) => {
            const activeOrders = orders.filter(o => o.status !== 'Delivered');
            const todayOrders = orders.filter(o => new Date(o.orderDate).toDateString() === new Date().toDateString());
            
            const [filter, setFilter] = useState('All');
            const [search, setSearch] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [pinData, setPinData] = useState({ current: '', newPin: '' });

            const handlePinChange = (e) => {
                e.preventDefault();
                if (pinData.current !== getAdminPin()) {
                    showToast('Current security PIN is incorrect!', 'error');
                    return;
                }
                if (pinData.newPin.length < 4) {
                    showToast('PIN must be at least 4 digits!', 'error');
                    return;
                }
                setAdminPin(pinData.newPin);
                showToast('Security PIN updated successfully.', 'success');
                setShowSettings(false);
                setPinData({ current: '', newPin: '' });
            };

            const filteredOrders = useMemo(() => {
                let list = orders;
                if (filter !== 'All') list = list.filter(o => o.status === filter);
                if (search) {
                    const q = search.toLowerCase();
                    list = list.filter(o => o.customerName.toLowerCase().includes(q) || o.customerPhone.includes(q) || o.id.toLowerCase().includes(q));
                }
                return list.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, filter, search]);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 animate-fade-in pb-24">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Atelier Manager</h1>
                            <p className="text-slate-500 font-medium">Bespoke operational and order dashboard.</p>
                        </div>
                        <div className="flex flex-wrap gap-2.5">
                            <button onClick={() => setShowSettings(true)} className="w-11 h-11 bg-white rounded-xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-500 hover:text-brand-600 hover:border-brand-100 transition-all" title="Settings">
                                <i className="fa-solid fa-cog"></i>
                            </button>
                            <button onClick={() => setView('galleryManager')} className="px-4 py-2.5 bg-brand-50 text-brand-700 hover:bg-brand-100 border border-brand-200 rounded-xl text-xs font-bold flex items-center gap-2 transition-all">
                                <i className="fa-solid fa-images"></i> Manage Gallery
                            </button>
                            <Button onClick={() => setView('newCustomer')} variant="outline" className="text-xs px-4 py-2.5 rounded-xl border-slate-200" icon="fa-user-plus">New Customer</Button>
                            <Button onClick={() => setView('newOrder')} variant="primary" className="text-xs px-4 py-2.5 rounded-xl" icon="fa-plus">New Order</Button>
                            <button onClick={logout} className="w-11 h-11 bg-white rounded-xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-400 hover:text-red-500 transition-all">
                                <i className="fa-solid fa-sign-out-alt"></i>
                            </button>
                        </div>
                    </div>

                    {/* Quick Stats Grid */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 animate-fade-in">
                        {[
                            { label: 'Active Orders', val: activeOrders.length, icon: 'fa-scissors', bg: 'bg-rose-50', color: 'text-rose-600' },
                            { label: 'Today\'s Orders', val: todayOrders.length, icon: 'fa-calendar-day', bg: 'bg-blue-50', color: 'text-blue-600' },
                            { label: 'Pending Delivery', val: activeOrders.filter(o=>o.status==='Ready').length, icon: 'fa-truck-fast', bg: 'bg-amber-50', color: 'text-amber-600' },
                            { label: 'Registered Clients', val: customers.length, icon: 'fa-users', bg: 'bg-emerald-50', color: 'text-emerald-600' }
                        ].map((s, i) => (
                            <div key={i} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 transition-transform hover:-translate-y-1">
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${s.bg} ${s.color}`}>
                                    <i className={`fa-solid ${s.icon} text-lg`}></i>
                                </div>
                                <div>
                                    <p className="text-2xl font-bold text-slate-800 leading-none mb-1">{s.val}</p>
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{s.label}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Filters and Search Bar */}
                    <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                        <div className="relative flex-1 max-w-md">
                            <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search client name, mobile or Order ID..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm font-medium shadow-sm transition-all" />
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
                            {['All', ...ORDER_STATUSES].map(s => (
                                <button key={s} onClick={() => setFilter(s)} className={`whitespace-nowrap px-4 py-2.5 rounded-xl text-xs font-bold transition-all shadow-sm ${filter === s ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Orders Datatable Container */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider font-bold">
                                        <th className="p-5 font-semibold">Order Context</th>
                                        <th className="p-5 font-semibold">Stitched Items</th>
                                        <th className="p-5 font-semibold">Value details</th>
                                        <th className="p-5 font-semibold">Live State</th>
                                        <th className="p-5 text-center font-semibold">Share</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {filteredOrders.map(order => (
                                        <tr key={order.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="p-5">
                                                <p className="font-bold text-slate-800">{order.customerName}</p>
                                                <p className="text-xs text-slate-400 mb-1">{order.customerPhone}</p>
                                                <span className="text-[10px] bg-slate-100 text-slate-600 px-2.5 py-1 rounded font-mono font-bold">{order.id}</span>
                                            </td>
                                            <td className="p-5">
                                                <div className="space-y-1">
                                                    {order.items.map((it, i) => (
                                                        <p key={i} className="text-xs text-slate-600 font-medium">
                                                            <span className="font-bold text-brand-600">{it.quantity}x</span> {it.category}
                                                        </p>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="p-5 font-bold text-slate-800">
                                                <p>₹{order.totalAmount}</p>
                                                <p className="text-xs font-bold text-emerald-600">Paid: ₹{order.amountPaid}</p>
                                            </td>
                                            <td className="p-5">
                                                <select 
                                                    value={order.status} 
                                                    onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                                    className={`text-xs font-bold rounded-xl px-3 py-2 outline-none cursor-pointer appearance-none ${
                                                        order.status === 'Delivered' ? 'bg-green-100 text-green-700' :
                                                        order.status === 'Ready' ? 'bg-amber-100 text-amber-700' :
                                                        'bg-brand-50 text-brand-700'
                                                    }`}
                                                >
                                                    {ORDER_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </td>
                                            <td className="p-5 text-center">
                                                <a href={getWhatsAppLink(order)} target="_blank" rel="noreferrer" className="w-9 h-9 inline-flex items-center justify-center bg-[#25D366]/10 text-[#25D366] rounded-xl hover:bg-[#25D366] hover:text-white transition-all shadow-sm">
                                                    <i className="fa-brands fa-whatsapp text-lg"></i>
                                                </a>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        {filteredOrders.length === 0 && (
                            <div className="p-12 text-center text-slate-400">
                                <i className="fa-solid fa-folder-open text-4xl mb-3 opacity-40"></i>
                                <p className="font-medium text-sm">No orders matching your filters were found.</p>
                            </div>
                        )}
                    </div>

                    {/* Change Owner PIN Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-apple animate-slide-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-slate-800"><i className="fa-solid fa-lock text-brand-600 mr-2"></i>Change Admin PIN</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-red-500 transition-all"><i className="fa-solid fa-times text-xl"></i></button>
                                </div>
                                <form onSubmit={handlePinChange} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Current Admin PIN</label>
                                        <input type="password" required value={pinData.current} onChange={e=>setPinData({...pinData, current: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold text-center tracking-widest" placeholder="••••" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">New Admin PIN</label>
                                        <input type="password" required value={pinData.newPin} onChange={e=>setPinData({...pinData, newPin: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold text-center tracking-widest" placeholder="••••" />
                                    </div>
                                    <Button type="submit" className="w-full py-4 mt-2">Update Security PIN</Button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const OwnerGalleryManager = ({ gallery, setGallery, setView, showToast }) => {
            const [newItem, setNewItem] = useState({ title: '', category: GALLERY_CATEGORIES[0], image: null });
            const [isUploading, setIsUploading] = useState(false);

            const handleImageChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                try {
                    const url = await uploadImage(file);
                    setNewItem({ ...newItem, image: url });
                } catch(err) {
                    showToast('Failed to upload image', 'error');
                }
                setIsUploading(false);
            };

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newItem.image) {
                    showToast('Please upload an image first.', 'error');
                    return;
                }
                const newGalItem = { ...newItem, id: generateId('GAL') };
                setGallery([newGalItem, ...gallery]);
                setNewItem({ title: '', category: GALLERY_CATEGORIES[0], image: null });
                showToast('Design added to Gallery', 'success');
            };

            const handleDelete = (id) => {
                // Completely safe custom confirmation alternative to preserve standard behavior 
                const confirmDelete = window.confirm("Are you sure you want to delete this design from your gallery?");
                if (confirmDelete) {
                    setGallery(gallery.filter(g => g.id !== id));
                    showToast('Design removed', 'success');
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 animate-fade-in pb-24">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('owner')} className="w-10 h-10 bg-white rounded-full shadow-sm border border-slate-200 flex items-center justify-center text-slate-600 hover:text-brand-600">
                                <i className="fa-solid fa-arrow-left"></i>
                            </button>
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Gallery Manager</h1>
                                <p className="text-slate-500 font-medium">Manage inspiration designs for clients.</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="md:col-span-1">
                            <div className="bg-white p-6 rounded-3xl shadow-apple border border-slate-100 sticky top-8">
                                <h3 className="text-lg font-bold text-slate-800 mb-4">Add New Design</h3>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Design Title</label>
                                        <input type="text" required value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} placeholder="e.g. Peacock Maggam Work" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Category</label>
                                        <select value={newItem.category} onChange={e => setNewItem({...newItem, category: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm">
                                            {GALLERY_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Photo</label>
                                        <div className="relative border-2 border-dashed border-slate-300 rounded-xl p-4 text-center hover:bg-slate-50 transition-colors">
                                            {isUploading ? (
                                                <p className="text-sm text-slate-500"><i className="fa-solid fa-spinner fa-spin mr-2"></i>Uploading...</p>
                                            ) : newItem.image ? (
                                                <div>
                                                    <img src={newItem.image} className="h-32 mx-auto rounded-lg object-cover mb-2" alt="Preview"/>
                                                    <button type="button" onClick={() => setNewItem({...newItem, image: null})} className="text-xs text-red-500 font-bold">Remove</button>
                                                </div>
                                            ) : (
                                                <>
                                                    <i className="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 mb-2"></i>
                                                    <p className="text-xs text-slate-500">Tap to upload photo</p>
                                                    <input type="file" accept="image/*" onChange={handleImageChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <Button type="submit" disabled={!newItem.image || isUploading} className="w-full py-3 mt-4">Add to Gallery</Button>
                                </form>
                            </div>
                        </div>

                        <div className="md:col-span-2">
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {gallery.map(item => (
                                    <div key={item.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 group">
                                        <div className="aspect-square bg-slate-100 relative">
                                            <img src={item.image} alt={item.title} className="w-full h-full object-cover" />
                                            <button onClick={() => handleDelete(item.id)} className="absolute top-2 right-2 w-8 h-8 bg-white/90 rounded-full text-red-500 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm flex items-center justify-center hover:bg-red-500 hover:text-white">
                                                <i className="fa-solid fa-trash text-xs"></i>
                                            </button>
                                        </div>
                                        <div className="p-3">
                                            <p className="font-bold text-slate-800 text-sm truncate">{item.title}</p>
                                            <p className="text-xs text-slate-500">{item.category}</p>
                                        </div>
                                    </div>
                                ))}
                                {gallery.length === 0 && (
                                    <div className="col-span-full p-12 text-center text-slate-400 bg-white rounded-3xl border border-slate-100 border-dashed">
                                        <i className="fa-solid fa-images text-4xl mb-3 opacity-50"></i>
                                        <p className="font-medium">Gallery is empty.</p>
                                        <p className="text-sm mt-1">Add photos to inspire your clients.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const WalkInCustomerForm = ({ setView, addCustomer, showToast }) => {
            const [data, setData] = useState({ name: '', phone: '', address: '', notes: '' });

            const handleSubmit = (e) => {
                e.preventDefault();
                addCustomer({ ...data, id: generateId('CUST'), createdAt: new Date().toISOString() });
                showToast('Customer profile saved successfully.', 'success');
                setView('owner');
            };

            return (
                <div className="max-w-2xl mx-auto p-4 md:p-8 animate-fade-in">
                    <button onClick={() => setView('owner')} className="text-sm font-bold text-slate-500 hover:text-brand-700 mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-arrow-left"></i> Back to Overview
                    </button>
                    <div className="bg-white rounded-3xl p-8 border border-slate-100 shadow-apple">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6">Add Walk-in Client</h2>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div className="grid md:grid-cols-2 gap-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Customer Name *</label>
                                    <input required value={data.name} onChange={e=>setData({...data, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold" placeholder="Priya Sharma" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Mobile Number *</label>
                                    <input required type="tel" value={data.phone} onChange={e=>setData({...data, phone: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold" placeholder="9876543210" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Home Address</label>
                                <textarea value={data.address} onChange={e=>setData({...data, address: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold" rows="2" placeholder="Street, landmark, city"></textarea>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Atelier Profile Notes / Standard Measurements</label>
                                <textarea value={data.notes} onChange={e=>setData({...data, notes: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-bold" rows="2" placeholder="e.g. standard sizing, blouse variations"></textarea>
                            </div>
                            <Button type="submit" className="w-full mt-4 py-4">Save Client Profile</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const OrderCreationForm = ({ setView, addOrder, customers, showToast }) => {
            const [searchPhone, setSearchPhone] = useState('');
            const [selectedCust, setSelectedCust] = useState(null);
            const [custData, setCustData] = useState({ name: '', phone: '' });
            const [items, setItems] = useState([{ id: Date.now(), category: ITEM_CATEGORIES[0], quantity: 1, price: 0, description: '', images: [] }]);
            const [payment, setPayment] = useState({ totalAmount: 0, amountPaid: 0 });
            const [expDate, setExpDate] = useState('');
            const [isUploading, setIsUploading] = useState(false);

            useEffect(() => {
                if (searchPhone.length >= 10) {
                    const found = customers.find(c => c.phone.includes(searchPhone));
                    if (found) {
                        setSelectedCust(found);
                        setCustData({ name: found.name, phone: found.phone });
                    } else {
                        setSelectedCust(null);
                        setCustData({ ...custData, phone: searchPhone });
                    }
                }
            }, [searchPhone]);

            useEffect(() => {
                const total = items.reduce((sum, item) => sum + (Number(item.price) * item.quantity), 0);
                setPayment(prev => ({ ...prev, totalAmount: total }));
            }, [items]);

            const handleImageUpload = async (index, file) => {
                if (!file) return;
                setIsUploading(true);
                try {
                    const url = await uploadImage(file);
                    const newItems = [...items];
                    newItems[index].images.push(url);
                    setItems(newItems);
                } catch (e) {
                    showToast("Failed to upload image preview.", "error");
                }
                setIsUploading(false);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newOrder = {
                    id: generateId('ORD'),
                    customerName: custData.name,
                    customerPhone: custData.phone,
                    items,
                    status: 'Order Received',
                    orderDate: new Date().toISOString(),
                    expectedDeliveryDate: expDate || new Date(Date.now() + 7*24*60*60*1000).toISOString(),
                    totalAmount: payment.totalAmount,
                    amountPaid: payment.amountPaid,
                    notes: ''
                };
                addOrder(newOrder);
                showToast(`Bespoke commission ${newOrder.id} generated!`, 'success');
                setView('owner');
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 animate-fade-in pb-24">
                     <button onClick={() => setView('owner')} className="text-sm font-bold text-slate-500 hover:text-brand-700 mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-arrow-left"></i> Back to Overview
                    </button>
                    <h2 className="text-3xl font-bold text-slate-800 mb-8">Create Bespoke Order</h2>
                    
                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-apple">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-user-circle text-brand-600"></i> Client Reference</h3>
                            <div className="grid md:grid-cols-2 gap-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Search Mobile *</label>
                                    <input required type="tel" value={searchPhone} onChange={e=>setSearchPhone(e.target.value)} placeholder="Type 10-digit number" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium" />
                                    {selectedCust && <p className="text-xs text-green-600 mt-1.5 font-bold"><i className="fa-solid fa-circle-check"></i> Connected to Registered Client Profile</p>}
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Client Full Name *</label>
                                    <input required value={custData.name} onChange={e=>setCustData({...custData, name: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium" />
                                </div>
                            </div>
                        </div>

                        <div className="space-y-4">
                            {items.map((item, index) => (
                                <div key={item.id} className="bg-white rounded-3xl p-6 border border-slate-100 shadow-apple relative overflow-hidden animate-slide-up">
                                    {items.length > 1 && (
                                        <button type="button" onClick={() => setItems(items.filter((_, i) => i !== index))} className="absolute top-4 right-4 w-8 h-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center hover:bg-red-100 transition-colors">
                                            <i className="fa-solid fa-times"></i>
                                        </button>
                                    )}
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Garment #{index + 1}</h3>
                                    <div className="grid md:grid-cols-3 gap-5 mb-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Category *</label>
                                            <select value={item.category} onChange={e => { const n=[...items]; n[index].category=e.target.value; setItems(n); }} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium">
                                                {ITEM_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Qty *</label>
                                            <input type="number" min="1" value={item.quantity} onChange={e => { const n=[...items]; n[index].quantity=Number(e.target.value); setItems(n); }} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Unit Stitching Price (₹)</label>
                                            <input type="number" min="0" value={item.price} onChange={e => { const n=[...items]; n[index].price=Number(e.target.value); setItems(n); }} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium" />
                                        </div>
                                    </div>
                                    <div className="mb-4">
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Stitching Notes / Alteration Dimensions</label>
                                        <textarea value={item.description} onChange={e => { const n=[...items]; n[index].description=e.target.value; setItems(n); }} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium" rows="2" placeholder="Neck patterns, fit specifications, sleeves..."></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Design Reference / Measurement Swatches</label>
                                        <div className="flex flex-wrap gap-3 items-center">
                                            {item.images.map((img, i) => (
                                                <div key={i} className="relative w-16 h-16 rounded-xl overflow-hidden group">
                                                    <img src={img} className="w-full h-full object-cover" alt="design" />
                                                    <div onClick={() => { const n=[...items]; n[index].images=n[index].images.filter((_,j)=>j!==i); setItems(n); }} className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer text-white transition-opacity"><i className="fa-solid fa-trash"></i></div>
                                                </div>
                                            ))}
                                            <label className="w-16 h-16 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:border-brand-500 hover:bg-brand-50 transition-colors text-slate-400">
                                                {isUploading ? <i className="fa-solid fa-spinner fa-spin text-brand-500"></i> : <i className="fa-solid fa-plus"></i>}
                                                <input type="file" accept="image/*" className="hidden" onChange={e => handleImageUpload(index, e.target.files[0])} disabled={isUploading} />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            <button type="button" onClick={() => setItems([...items, { id: Date.now(), category: ITEM_CATEGORIES[0], quantity: 1, price: 0, description: '', images: [] }])} className="w-full py-4 border-2 border-dashed border-brand-300 text-brand-700 font-bold rounded-3xl hover:bg-brand-50 transition-colors">
                                + Stitched Item Category
                            </button>
                        </div>

                        <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-apple">
                            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fa-solid fa-wallet text-accent-500"></i> Balance Sheet</h3>
                            <div className="grid md:grid-cols-3 gap-5 items-end">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Target Delivery Date *</label>
                                    <input required type="date" value={expDate} onChange={e=>setExpDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Consolidated Amount (₹)</label>
                                    <input type="number" readOnly value={payment.totalAmount} className="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm font-bold text-slate-800" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Advance Settled (₹)</label>
                                    <input type="number" min="0" value={payment.amountPaid} onChange={e=>setPayment({...payment, amountPaid: Number(e.target.value)})} className="w-full px-4 py-3 bg-green-50 border border-green-200 rounded-xl outline-none text-sm font-bold text-green-700 focus:ring-2 focus:ring-green-500" />
                                </div>
                            </div>
                            <Button type="submit" className="w-full mt-6 py-4 text-base">Generate Bespoke Commission</Button>
                        </div>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [userRole, setUserRole] = useState('guest');
            const [currentUser, setCurrentUser] = useState(null); 
            const [toast, setToast] = useState(null);

            // Local App States with automatic persistence settings
            const [orders, setOrders] = useState(() => {
                const stored = localStorage.getItem('jyothi_orders');
                return stored ? JSON.parse(stored) : initialOrders;
            });
            const [customers, setCustomers] = useState(() => {
                const stored = localStorage.getItem('jyothi_customers');
                return stored ? JSON.parse(stored) : initialCustomers;
            });
            const [gallery, setGallery] = useState(() => {
                const stored = localStorage.getItem('jyothi_gallery');
                return stored ? JSON.parse(stored) : initialGallery;
            });

            const [dbSetupComplete, setDbSetupComplete] = useState(false);

            const showToast = (message, type = 'info') => setToast({ message, type });

            // Persist locally automatically
            useEffect(() => {
                localStorage.setItem('jyothi_orders', JSON.stringify(orders));
            }, [orders]);

            useEffect(() => {
                localStorage.setItem('jyothi_customers', JSON.stringify(customers));
            }, [customers]);

            useEffect(() => {
                localStorage.setItem('jyothi_gallery', JSON.stringify(gallery));
            }, [gallery]);

            // Optional live synchronization using standard structural rules
            useEffect(() => {
                const initFirebase = async () => {
                    if (!MY_FIREBASE_CONFIG) return; 
                    try {
                        const app = window.FirebaseSDK.initializeApp(MY_FIREBASE_CONFIG);
                        const auth = window.FirebaseSDK.getAuth(app);
                        const db = window.FirebaseSDK.getFirestore(app);
                        const appId = 'jyothi-tailor-premium-app';

                        await window.FirebaseSDK.signInAnonymously(auth);
                        
                        window.FirebaseSDK.onAuthStateChanged(auth, (user) => {
                            if (!user) return;
                            setDbSetupComplete(true);

                            // Sync order updates cleanly
                            const ordersRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                            window.FirebaseSDK.onSnapshot(ordersRef, (snapshot) => {
                                const fbOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                if (fbOrders.length > 0) setOrders(fbOrders);
                            });

                            // Sync clients updates cleanly
                            const customersRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                            window.FirebaseSDK.onSnapshot(customersRef, (snapshot) => {
                                const fbCusts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                if (fbCusts.length > 0) setCustomers(fbCusts);
                            });

                            // Sync gallery collections cleanly
                            const galleryRef = window.FirebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'gallery');
                            window.FirebaseSDK.onSnapshot(galleryRef, (snapshot) => {
                                const fbGal = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                                if (fbGal.length > 0) setGallery(fbGal);
                            });
                        });
                    } catch (e) {
                        console.log("Firebase config not defined. Utilizing localized storage states.", e);
                    }
                };
                initFirebase();
            }, []);

            const syncToDb = async (collectionName, docId, data) => {
                if (!dbSetupComplete || !MY_FIREBASE_CONFIG) return;
                try {
                    const db = window.FirebaseSDK.getFirestore();
                    const appId = 'jyothi-tailor-premium-app';
                    const docRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
                    await window.FirebaseSDK.setDoc(docRef, data, { merge: true });
                } catch(e) { console.error("Cloud syncing database error: ", e); }
            };

            const handleLogin = (role, id) => {
                setUserRole(role);
                setCurrentUser(id);
                setView(role === 'admin' ? 'owner' : 'client');
                showToast(`Successfully signed in.`, 'success');
            };

            const handleLogout = () => {
                setUserRole('guest');
                setCurrentUser(null);
                setView('login');
            };

            const addOrder = (newOrder) => {
                setOrders(prev => [newOrder, ...prev]);
                syncToDb('orders', newOrder.id, newOrder);
            };

            const addCustomer = (newCust) => {
                setCustomers(prev => [newCust, ...prev]);
                syncToDb('customers', newCust.id, newCust);
            };

            const updateOrderStatus = (id, status) => {
                const updatedOrders = orders.map(o => o.id === id ? { ...o, status, deliveryDate: status === 'Delivered' ? new Date().toISOString() : o.deliveryDate } : o);
                setOrders(updatedOrders);
                const orderToUpdate = updatedOrders.find(o => o.id === id);
                if (orderToUpdate) {
                    syncToDb('orders', id, orderToUpdate);
                    showToast(`Order marked as ${status}`, 'success');
                }
            };

            return (
                <div className="min-h-screen relative overflow-hidden flex flex-col">
                    {/* Atmospheric luxury backdrop design */}
                    <div className="fixed inset-0 z-[-1] bg-pattern">
                        <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-brand-100/30 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-0 left-0 w-[500px] h-[500px] bg-accent-100/30 rounded-full blur-3xl"></div>
                    </div>

                    {/* Desktop/Mobile header logo container */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-brand-900 text-accent-500 rounded-xl flex items-center justify-center font-serif font-bold text-xl shadow-md">J</div>
                                <span className="font-serif font-bold text-brand-900 text-xl tracking-tight">{SHOP_NAME}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                {userRole === 'admin' && <span className="text-xs font-bold text-brand-700 bg-brand-50 px-3 py-1.5 rounded-full border border-brand-100">Atelier Owner</span>}
                                {userRole === 'client' && <span className="text-xs font-bold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">{currentUser}</span>}
                            </div>
                        </div>
                    </nav>

                    {/* Routing logic containers */}
                    <main className="flex-1 relative z-10">
                        {view === 'login' && <LoginView onLogin={handleLogin} showToast={showToast} />}
                        {view === 'client' && <ClientDashboard phone={currentUser} orders={orders} gallery={gallery} logout={handleLogout} />}
                        {view === 'owner' && <OwnerDashboard orders={orders} customers={customers} setView={setView} updateOrderStatus={updateOrderStatus} logout={handleLogout} showToast={showToast} />}
                        {view === 'galleryManager' && <OwnerGalleryManager gallery={gallery} setGallery={setGallery} setView={setView} showToast={showToast} />}
                        {view === 'newOrder' && <OrderCreationForm setView={setView} addOrder={addOrder} customers={customers} showToast={showToast} />}
                        {view === 'newCustomer' && <WalkInCustomerForm setView={setView} addCustomer={addCustomer} showToast={showToast} />}
                    </main>

                    {/* Custom alerts toast notifications */}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
