<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jyothi Atelier | Premium Bespoke Tailoring</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter (Sleek sans-serif) & Playfair Display (Luxury serif) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fcf8f8',
                            100: '#f8efee',
                            500: '#a31f24', // Pure Crimson
                            600: '#8c151a', // Rich Royal Burgundy
                            900: '#561416', // Deep Atelier Red
                            950: '#2d0607', // Dark Wine
                        },
                        accent: {
                            50: '#fefdf6',
                            100: '#fdfbe2',
                            500: '#d4af37', // Champagne Gold
                            600: '#b5952f', // Antique Brass
                            700: '#8f7422', // Dark Gold
                        }
                    },
                    boxShadow: {
                        'luxury': '0 20px 40px -15px rgba(86, 20, 22, 0.08), 0 15px 25px -10px rgba(212, 175, 55, 0.04)',
                        'gold-glow': '0 0 15px rgba(212, 175, 55, 0.25)',
                        'burgundy-glow': '0 0 15px rgba(140, 21, 26, 0.15)',
                    },
                    animation: {
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'shimmer': 'shimmer 2s infinite linear',
                        'pulse-gold': 'pulseGold 2s infinite',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(24px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        pulseGold: {
                            '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(212, 175, 55, 0.4)' },
                            '50%': { transform: 'scale(1.05)', boxShadow: '0 0 15px 4px rgba(212, 175, 55, 0.2)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FAF9F6; /* Luxury Warm Off-White */
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        /* Premium custom scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #FAF9F6; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #b5952f; }
        
        /* Luxury Soft Glassmorphic Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.15); /* Soft Golden Border */
        }

        /* Gold gradient background effects */
        .gold-gradient {
            background: linear-gradient(135deg, #FAF9F6 0%, #FFFDF0 50%, #FAF9F6 100%);
        }
        
        /* Shimmer Loading State Effect */
        .shimmer-bg {
            background: linear-gradient(90deg, #f3f3f3 25%, #e6e6e6 50%, #f3f3f3 75%);
            background-size: 200% 100%;
        }

        /* Prevent system iOS default zoom issues */
        input, select, textarea {
            font-size: 16px !important;
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>

    <!-- Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query, addDoc, getDocs
        };
        window.dispatchEvent(new Event('FirebaseSDKReady'));
    </script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        const SHOP_NAME = "Jyothi Atelier";
        const SHOP_PHONE = "919948698878"; // Shop WhatsApp number
        
        // Dynamic Admin PIN getter/setter
        const getAdminPin = () => localStorage.getItem('adminPin') || "2498";
        const setAdminPin = (newPin) => localStorage.setItem('adminPin', newPin);
        
        const CLOUDINARY_CLOUD_NAME = "denl3jaft"; 
        const CLOUDINARY_UPLOAD_PRESET = "ml_default";

        // Live Cloud Sync Configuration (using jyothi-tailors App credentials)
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC0qsco6OLLAJnzxDqXR6OFjQLmtx8_ngA",
            authDomain: "jyothi-tailors.firebaseapp.com",
            projectId: "jyothi-tailors",
            storageBucket: "jyothi-tailors.firebasestorage.app",
            messagingSenderId: "768098264466",
            appId: "1:768098264466:web:9ed8ff328547eacf6b4d4b"
        };

        const initialOrders = [
            { id: 'ORD-101', customerName: 'Priya Sharma', customerPhone: '9876543210', items: [{ category: 'Saree Blouse', quantity: 1, images: [], description: 'Banarasi Silk, Deep neck', price: 1500 }], status: 'Processing', orderDate: '2026-06-20', expectedDeliveryDate: '2026-06-25', totalAmount: 1500, amountPaid: 500, notes: 'Urgent delivery' },
            { id: 'ORD-102', customerName: 'Lakshmi R', customerPhone: '9123456789', items: [{ category: 'Lehenga', quantity: 1, images: [], description: 'Heavy Net', price: 4500 }], status: 'Ready', orderDate: '2026-06-15', expectedDeliveryDate: '2026-06-22', totalAmount: 4500, amountPaid: 4500, notes: '' },
            { id: 'ORD-103', customerName: 'Anita Desai', customerPhone: '9988776655', items: [{ category: 'Kurti', quantity: 2, images: [], description: 'Cotton daily wear', price: 1200 }], status: 'Delivered', orderDate: '2026-06-01', deliveryDate: '2026-06-10', expectedDeliveryDate: '2026-06-10', totalAmount: 1200, amountPaid: 1200, notes: '' }
        ];

        const initialCustomers = [
            { id: 'CUST-1', name: 'Priya Sharma', phone: '9876543210', address: 'Sri Sai Towers', notes: 'Prefers deep neck' },
            { id: 'CUST-2', name: 'Lakshmi R', phone: '9123456789', address: 'Omkar Street', notes: '' },
            { id: 'CUST-3', name: 'Anita Desai', phone: '9988776655', address: 'Banjara Hills', notes: '' }
        ];

        const ITEM_CATEGORIES = ['Saree Blouse', 'Lehenga', 'Kurti', 'Chudidar Set', 'Western Dress', 'Gown', 'Pant/Trouser', 'Skirt', 'Alteration', 'Maggam Work', 'Other'];
        const ORDER_STATUSES = ['Order Received', 'Processing', 'Ready', 'Delivered'];
        const GALLERY_CATEGORIES = ['Maggam Works', 'Machine Works', 'Stitching Works', 'Bridal Blouses', 'Lehengas', 'Western', 'Other'];

        const initialGallery = [
            { id: 'GAL-1', imageUrl: 'https://images.unsplash.com/photo-1610030469983-98e550d6193c?auto=format&fit=crop&w=600&q=80', category: 'Maggam Works', title: 'Bridal Maggam Blouse', description: 'Intricate zardosi and stone work on pure silk for wedding.' },
            { id: 'GAL-2', imageUrl: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=600&q=80', category: 'Machine Works', title: 'Floral Embroidery', description: 'Computerized machine embroidery with vibrant threadwork on cotton silk.' },
            { id: 'GAL-3', imageUrl: 'https://images.unsplash.com/photo-1583391733958-d25e07fac04f?auto=format&fit=crop&w=600&q=80', category: 'Lehengas', title: 'Pastel Net Lehenga', description: 'Elegant reception wear lehenga with subtle glitter and heavy borders.' },
            { id: 'GAL-4', imageUrl: 'https://images.unsplash.com/photo-1605763240000-7e93b172d754?auto=format&fit=crop&w=600&q=80', category: 'Maggam Works', title: 'Peacock Motif Backneck', description: 'Heavy authentic maggam work featuring traditional peacock designs.' }
        ];

        // --- UTILS ---
        const generateId = (prefix) => `${prefix}-${Math.floor(Math.random() * 90000) + 10000}`;
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        
        const uploadImage = async (file) => {
            if (CLOUDINARY_CLOUD_NAME === "your_cloud_name" || !CLOUDINARY_CLOUD_NAME) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    return data.secure_url;
                }
                throw new Error("No URL returned");
            } catch (err) {
                console.warn("Cloudinary upload failed, falling back to offline Base64 logic", err);
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
        };

        const getWhatsAppLink = (order) => {
            let cleanNum = order.customerPhone.replace(/\D/g, '');
            if (cleanNum.length === 10) cleanNum = '91' + cleanNum;
            const itemsText = order.items.map(i => `▫️ ${i.category} (x${i.quantity})`).join('%0A');
            const text = `*Order Summary - ${SHOP_NAME}*%0A%0A👤 Customer: ${order.customerName}%0A📱 Mobile: ${order.customerPhone}%0A🔖 Order ID: ${order.id}%0A%0A*Items:*%0A${itemsText}%0A%0A⏳ Status: *${order.status}*%0A📅 Expected Delivery: ${formatDate(order.expectedDeliveryDate)}%0A%0AThank you for choosing us!`;
            return `https://wa.me/${cleanNum}?text=${text}`;
        };

        const getGalleryInquiryLink = (item) => {
            const text = `Hi ${SHOP_NAME}, I saw this beautiful design in your gallery and would like to know more!%0A%0A*Design:* ${item.title}%0A*Category:* ${item.category}%0A*Ref ID:* ${item.id}%0A%0AIs it possible to customize this for my measurements?`;
            return `https://wa.me/${SHOP_PHONE}?text=${text}`;
        };

        // --- COMMON CORE UI COMPONENTS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-700' : 'bg-brand-900';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

            return (
                <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[110] animate-slide-up w-[90%] max-w-sm">
                    <div className={`${bg} text-white px-5 py-3 rounded-2xl shadow-luxury flex items-center gap-3 text-sm font-medium border border-white/10`}>
                        <i className={`fa-solid ${icon} text-lg shrink-0`}></i>
                        <span className="leading-snug">{message}</span>
                    </div>
                </div>
            );
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', type = 'button', disabled = false, icon }) => {
            const base = "relative inline-flex items-center justify-center gap-2.5 px-6 py-3.5 text-sm font-semibold rounded-2xl transition-all duration-300 active:scale-95 disabled:opacity-50 disabled:pointer-events-none overflow-hidden select-none touch-manipulation";
            const variants = {
                primary: "bg-brand-900 text-white shadow-luxury hover:bg-brand-950 hover:shadow-burgundy-glow border border-brand-900",
                secondary: "bg-accent-500 text-brand-950 shadow-luxury hover:bg-accent-600 hover:shadow-gold-glow border border-accent-500",
                outline: "bg-transparent border-2 border-brand-900 text-brand-900 hover:bg-brand-50/50",
                ghost: "bg-transparent text-slate-600 hover:bg-slate-100",
                danger: "bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-100"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {icon && <i className={`fa-solid ${icon} text-base`}></i>}
                    <span className="relative z-10">{children}</span>
                </button>
            );
        };

        const SkeletonLoader = ({ count = 3 }) => (
            <div className="space-y-4 w-full">
                {Array.from({ length: count }).map((_, i) => (
                    <div key={i} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm animate-pulse space-y-3">
                        <div className="h-4 bg-slate-200 rounded-md w-1/4"></div>
                        <div className="h-6 bg-slate-200 rounded-md w-3/4"></div>
                        <div className="h-4 bg-slate-200 rounded-md w-1/2"></div>
                    </div>
                ))}
            </div>
        );

        const LoginView = ({ onLogin, showToast }) => {
            const [role, setRole] = useState('client'); 
            const [phoneInput, setPhoneInput] = useState('');
            const [adminPinInput, setAdminPinInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [secretCounter, setSecretCounter] = useState(0);

            // Secret multi-tap signature to activate the hidden staff portal
            const handleSecretLogoTrigger = () => {
                const count = secretCounter + 1;
                setSecretCounter(count);
                if (count >= 5) {
                    setRole('admin');
                    showToast("Staff Access Mode Activated.", "success");
                    setSecretCounter(0);
                } else {
                    // Micro-feedback so only the owner knows they are counting down
                    showToast(`Acquiring secure connection...`, "info");
                }
            };

            const handleClientLogin = (e) => {
                e.preventDefault();
                if (phoneInput.length < 10) {
                    showToast("Please enter a valid 10-digit mobile number", "error");
                    return;
                }
                setLoading(true);
                setTimeout(() => {
                    onLogin('client', phoneInput);
                    setLoading(false);
                }, 400);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPinInput === getAdminPin()) {
                    onLogin('admin', null);
                } else {
                    showToast("Invalid security PIN.", "error");
                }
            };

            return (
                <div className="min-h-[85vh] flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-md glass-card rounded-[32px] p-8 md:p-10 shadow-luxury animate-slide-up relative overflow-hidden">
                        
                        {/* Decorative Premium Glow Background elements */}
                        <div className="absolute top-0 right-0 w-32 h-32 bg-accent-500/10 rounded-full blur-3xl"></div>
                        <div className="absolute -bottom-10 -left-10 w-40 h-40 bg-brand-500/10 rounded-full blur-3xl"></div>

                        <div className="text-center mb-8 relative">
                            {/* Tap 5 times to reveal hidden owner access */}
                            <div 
                                onClick={handleSecretLogoTrigger}
                                className="w-20 h-20 bg-brand-900 text-accent-500 rounded-3xl mx-auto flex items-center justify-center text-4xl font-serif font-bold shadow-luxury mb-4 border border-accent-500/30 cursor-pointer select-none active:scale-95 transition-transform"
                                title="Atelier Emblem"
                            >
                                J
                            </div>
                            <h2 className="text-3xl font-serif font-bold text-slate-800 tracking-tight">Atelier Portal</h2>
                            <p className="text-sm text-slate-500 mt-2 font-medium">Bespoke fitting and portfolio tracking system.</p>
                        </div>

                        {role === 'client' ? (
                            <form onSubmit={handleClientLogin} className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Registered Mobile</label>
                                    <div className="relative">
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">+91</span>
                                        <input 
                                            type="tel" 
                                            autoFocus 
                                            value={phoneInput} 
                                            onChange={e => setPhoneInput(e.target.value.replace(/\D/g, ''))} 
                                            className="w-full pl-14 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-accent-500 focus:ring-4 focus:ring-accent-500/10 outline-none transition-all font-semibold text-slate-800" 
                                            placeholder="Enter 10-digit number" 
                                            maxLength="10"
                                            required 
                                        />
                                    </div>
                                </div>

                                <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-2">
                                    {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : "View Sizing & Booking"}
                                </Button>
                            </form>
                        ) : (
                            <div className="space-y-6 animate-fade-in">
                                {/* Stark security guardrail notice */}
                                <div className="bg-rose-50 border border-rose-200/40 rounded-2xl p-4 text-center">
                                    <div className="w-10 h-10 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-2.5">
                                        <i className="fa-solid fa-shield-halved text-base"></i>
                                    </div>
                                    <h4 className="text-xs font-bold text-rose-800 uppercase tracking-widest">Restricted Space</h4>
                                    <p className="text-[11px] text-rose-600/90 mt-1 leading-normal font-medium">Jyothi Atelier Authorized Personnel Only. Clients are strictly prohibited from this section.</p>
                                    <button 
                                        type="button" 
                                        onClick={() => setRole('client')} 
                                        className="mt-2.5 text-[11px] font-bold text-slate-500 underline hover:text-slate-700 block mx-auto"
                                    >
                                        Go back to Customer Space
                                    </button>
                                </div>

                                <form onSubmit={handleAdminLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Owner PIN Code</label>
                                        <input 
                                            type="password" 
                                            autoFocus 
                                            value={adminPinInput} 
                                            onChange={e => setAdminPinInput(e.target.value)} 
                                            placeholder="••••" 
                                            className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all font-bold text-center tracking-[1em] text-2xl text-slate-800" 
                                            required 
                                        />
                                    </div>
                                    <Button type="submit" className="w-full py-4 text-base mt-2">
                                        Secure Staff Authorization
                                    </Button>
                                </form>
                            </div>
                        )}
                        <p className="text-[11px] text-center text-slate-400 mt-6 leading-relaxed select-none">
                            No OTP required. Instant secure entry for registered accounts
                            <span 
                                onClick={() => { setRole('admin'); showToast("Terminal configuration primed.", "success"); }} 
                                className="cursor-default text-transparent ml-1"
                            >
                                •
                            </span>
                        </p>
                    </div>
                </div>
            );
        };

        const ClientDashboard = ({ phone, orders, gallery, logout, initialCategoryFilter, onClearInitialFilter }) => {
            const [activeTab, setActiveTab] = useState('orders'); // 'orders' or 'gallery'
            const [galleryFilter, setGalleryFilter] = useState('All');
            const [selectedImage, setSelectedImage] = useState(null);

            useEffect(() => {
                if (initialCategoryFilter) {
                    setActiveTab('gallery');
                    setGalleryFilter(initialCategoryFilter);
                    if (onClearInitialFilter) onClearInitialFilter();
                }
            }, [initialCategoryFilter]);

            const myOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    const cleanPhone = o.customerPhone.replace(/\D/g, '');
                    const cleanTarget = phone.replace(/\D/g, '');
                    if (!cleanPhone.includes(cleanTarget) && !cleanTarget.includes(cleanPhone)) return false;
                    
                    if (o.status === 'Delivered' && o.deliveryDate) {
                        const delDate = new Date(o.deliveryDate);
                        const diffHours = (now - delDate) / (1000 * 60 * 60);
                        if (diffHours > 24) return false; 
                    }
                    return true;
                }).sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, phone]);

            const filteredGallery = useMemo(() => {
                if (galleryFilter === 'All') return gallery;
                return gallery.filter(item => item.category === galleryFilter);
            }, [gallery, galleryFilter]);

            const getProgressIndex = (status) => ORDER_STATUSES.indexOf(status);

            return (
                <div className="max-w-4xl mx-auto p-4 pb-24 animate-fade-in">
                    <div className="flex justify-between items-end mb-8 mt-4">
                        <div>
                            <p className="text-xs text-brand-600 font-bold uppercase tracking-widest mb-1">Premium Client</p>
                            <h1 className="text-3xl font-serif font-bold text-slate-800 tracking-tight">
                                {myOrders[0]?.customerName || 'Loyal Guest'}
                            </h1>
                            <p className="text-xs text-slate-400 font-semibold mt-1">Sizing Phone: +91 {phone}</p>
                        </div>
                        <button onClick={logout} className="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-200/60 flex items-center justify-center text-slate-400 hover:text-rose-600 hover:border-rose-100 transition-all duration-300" title="Sign out session">
                            <i className="fa-solid fa-power-off text-lg"></i>
                        </button>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex bg-slate-200/60 rounded-2xl p-1 mb-8 max-w-sm border border-slate-300/30">
                        <button onClick={() => setActiveTab('orders')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'orders' ? 'bg-white shadow-md text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-box-open text-xs"></i> Booking status
                        </button>
                        <button onClick={() => setActiveTab('gallery')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'gallery' ? 'bg-white shadow-md text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-gem text-xs"></i> Style Gallery
                        </button>
                    </div>

                    {activeTab === 'orders' ? (
                        myOrders.length === 0 ? (
                            <div className="glass-card rounded-[32px] p-12 text-center flex flex-col items-center shadow-luxury">
                                <div className="w-24 h-24 bg-brand-50 text-brand-900 rounded-full flex items-center justify-center mb-6 border border-brand-100/50">
                                    <i className="fa-solid fa-scissors text-3xl"></i>
                                </div>
                                <h3 className="text-xl font-bold text-slate-700 mb-2 font-serif">No Current Commissions</h3>
                                <p className="text-slate-500 text-sm max-w-sm leading-relaxed mb-6">No pending stitching layouts exist for this mobile number right now. Explore our bespoke lookbook to schedule a custom tailoring appointment.</p>
                                <Button onClick={() => setActiveTab('gallery')} variant="primary">Explore Premium Lookbook</Button>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-slide-up">
                                {myOrders.map(order => {
                                    const progIdx = getProgressIndex(order.status);
                                    return (
                                        <div key={order.id} className="glass-card rounded-[32px] overflow-hidden shadow-luxury">
                                            {/* Header */}
                                            <div className="p-6 border-b border-slate-100 bg-white/60 flex flex-wrap justify-between items-center gap-4">
                                                <div>
                                                    <span className="text-xs font-bold text-brand-700 uppercase tracking-widest bg-brand-50 px-3 py-1.5 rounded-lg border border-brand-100/40">#{order.id}</span>
                                                    <p className="text-xs text-slate-400 mt-2.5 font-medium"><i className="fa-regular fa-calendar-alt mr-1"></i> Commissioned on {formatDate(order.orderDate)}</p>
                                                </div>
                                                <div>
                                                    <span className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider ${order.status === 'Delivered' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-amber-50 text-amber-700 border border-amber-100'}`}>
                                                        {order.status}
                                                    </span>
                                                </div>
                                            </div>

                                            {/* Step Tracker */}
                                            <div className="p-6 md:p-8 bg-white border-b border-slate-50">
                                                <div className="relative">
                                                    <div className="absolute left-5 top-2.5 bottom-2.5 w-0.5 bg-slate-100 z-0"></div>
                                                    <div className="absolute left-5 top-2.5 w-0.5 bg-brand-500 z-0 transition-all duration-1000" style={{ height: `${(progIdx / (ORDER_STATUSES.length - 1)) * 100}%` }}></div>
                                                    
                                                    {ORDER_STATUSES.map((step, idx) => {
                                                        const isCompleted = idx < progIdx;
                                                        const isCurrent = idx === progIdx;
                                                        return (
                                                            <div key={step} className="relative z-10 flex items-center gap-5 mb-8 last:mb-0">
                                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all duration-500 ${isCompleted || isCurrent ? 'bg-brand-600 text-white shadow-burgundy-glow' : 'bg-white border-2 border-slate-200 text-slate-300'}`}>
                                                                    {isCompleted ? <i className="fa-solid fa-check text-xs"></i> : <div className={`w-3 h-3 rounded-full ${isCurrent ? 'bg-accent-500 animate-pulse' : 'bg-transparent'}`}></div>}
                                                                </div>
                                                                <div className={isCompleted || isCurrent ? 'text-slate-800' : 'text-slate-400'}>
                                                                    <p className="text-sm font-bold uppercase tracking-wider">{step}</p>
                                                                    {idx === 2 && progIdx <= 2 && <p className="text-xs font-medium text-brand-600 mt-0.5"><i className="fa-regular fa-clock"></i> Targeted completion: {formatDate(order.expectedDeliveryDate)}</p>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            {/* Details section */}
                                            <div className="p-6 bg-slate-50/50">
                                                <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Measurement Layout Specifications</h4>
                                                <div className="space-y-4 mb-6">
                                                    {order.items.map((item, i) => (
                                                        <div key={i} className="flex gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                                            {item.images && item.images.length > 0 ? (
                                                                <img src={item.images[0]} className="w-16 h-20 rounded-xl object-cover shadow-sm ring-1 ring-slate-100" alt="stitching sketch" />
                                                            ) : (
                                                                <div className="w-16 h-20 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 border border-slate-100"><i className="fa-solid fa-shirt text-lg"></i></div>
                                                            )}
                                                            <div className="flex-1 min-w-0">
                                                                <div className="flex justify-between items-start">
                                                                    <p className="font-bold text-slate-800 text-sm truncate">{item.category}</p>
                                                                    <p className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">Qty: {item.quantity}</p>
                                                                </div>
                                                                <p className="text-xs text-slate-500 mt-1.5 leading-relaxed italic">{item.description || 'Custom tailored measurements applied.'}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="grid grid-cols-2 gap-4 bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Total Bill</p>
                                                        <p className="text-lg font-bold text-slate-800">₹{order.totalAmount}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Balance Unpaid</p>
                                                        <p className="text-lg font-bold text-brand-600">₹{order.totalAmount - order.amountPaid}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    ) : (
                        <div className="animate-fade-in">
                            <div className="flex gap-2 overflow-x-auto pb-4 scrollbar-hide mb-6 -mx-4 px-4">
                                {['All', ...GALLERY_CATEGORIES].map(cat => (
                                    <button 
                                        key={cat} 
                                        onClick={() => setGalleryFilter(cat)}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-xs font-bold transition-all border shrink-0 ${galleryFilter === cat ? 'bg-brand-900 text-white border-brand-900 shadow-burgundy-glow' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {filteredGallery.length === 0 ? (
                                <div className="text-center py-16 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                    <i className="fa-regular fa-images text-4xl text-slate-200 mb-3"></i>
                                    <p className="text-slate-500 font-medium">No lookbook layouts currently posted under this selection.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 md:gap-6">
                                    {filteredGallery.map(item => (
                                        <div 
                                            key={item.id} 
                                            onClick={() => setSelectedImage(item)}
                                            className="group relative bg-slate-100 rounded-3xl overflow-hidden aspect-[4/5] cursor-pointer shadow-sm hover:shadow-luxury transition-all duration-300"
                                        >
                                            <img src={item.imageUrl} alt={item.title} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-brand-950/90 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                                                <span className="text-[9px] font-bold tracking-widest text-accent-500 uppercase">{item.category}</span>
                                                <h4 className="text-white font-serif font-bold text-sm leading-tight mt-1">{item.title}</h4>
                                                <p className="text-white/80 text-[10px] mt-1.5"><i className="fa-brands fa-whatsapp"></i> Tap to customize</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Gallery Image Info/Inquiry Modal */}
                            {selectedImage && (
                                <div className="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center p-4 z-[100] animate-fade-in" onClick={() => setSelectedImage(null)}>
                                    <div className="bg-white rounded-[32px] overflow-hidden w-full max-w-md shadow-luxury relative" onClick={e => e.stopPropagation()}>
                                        <button onClick={() => setSelectedImage(null)} className="absolute top-4 right-4 w-10 h-10 bg-black/40 hover:bg-black/60 text-white rounded-full flex items-center justify-center backdrop-blur-md transition-colors z-10 border border-white/20">
                                            <i className="fa-solid fa-times"></i>
                                        </button>
                                        <div className="w-full h-80 bg-slate-100 relative">
                                            <img src={selectedImage.imageUrl} alt={selectedImage.title} className="w-full h-full object-cover" />
                                            <div className="absolute top-4 left-4 bg-brand-900/90 backdrop-blur-md text-white text-xs font-bold px-4 py-1.5 rounded-xl border border-white/10">
                                                {selectedImage.category}
                                            </div>
                                        </div>
                                        <div className="p-6">
                                            <h3 className="text-2xl font-bold font-serif text-slate-800 mb-2">{selectedImage.title}</h3>
                                            <p className="text-sm text-slate-500 mb-8 leading-relaxed">{selectedImage.description}</p>
                                            
                                            <a href={getGalleryInquiryLink(selectedImage)} target="_blank" rel="noopener noreferrer" className="block w-full">
                                                <Button type="button" className="w-full py-4 bg-[#25D366] hover:bg-[#1ebd5b] text-white border-none shadow-gold-glow" icon="fa-brands fa-whatsapp text-lg">
                                                    Ask About Customizations
                                                </Button>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const OwnerDashboard = ({ 
            orders, 
            customers, 
            gallery, 
            setView, 
            updateOrderStatus, 
            logout, 
            showToast, 
            addGalleryItem, 
            deleteGalleryItem, 
            updateCustomer,
            deleteCustomer,
            isLive 
        }) => {
            const [activeTab, setActiveTab] = useState('overview'); // 'overview', 'clients', 'gallery'
            const activeOrders = orders.filter(o => o.status !== 'Delivered');
            const todayOrders = orders.filter(o => new Date(o.orderDate).toDateString() === new Date().toDateString());
            
            const [filter, setFilter] = useState('All');
            const [search, setSearch] = useState('');
            const [clientSearch, setClientSearch] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [pinData, setPinData] = useState({ current: '', newPin: '' });

            const [editingClient, setEditingClient] = useState(null);
            const [deleteConfirmation, setDeleteConfirmation] = useState(null); 

            // Gallery form state
            const [galForm, setGalForm] = useState({ title: '', category: GALLERY_CATEGORIES[0], description: '', imageFile: null, imageUrlPreview: null });
            const [isUploading, setIsUploading] = useState(false);

            const handlePinChange = (e) => {
                e.preventDefault();
                if (pinData.current !== getAdminPin()) {
                    showToast('Current PIN is incorrect.', 'error');
                    return;
                }
                if (pinData.newPin.length < 4) {
                    showToast('New PIN must be at least 4 characters.', 'error');
                    return;
                }
                setAdminPin(pinData.newPin);
                showToast('Owner PIN updated successfully.', 'success');
                setShowSettings(false);
                setPinData({ current: '', newPin: '' });
            };

            const handleGalleryUpload = async (e) => {
                e.preventDefault();
                if (!galForm.imageFile) {
                    showToast('Please select an image first.', 'error');
                    return;
                }
                setIsUploading(true);
                try {
                    const url = await uploadImage(galForm.imageFile);
                    const newItem = {
                        id: generateId('GAL'),
                        title: galForm.title,
                        category: galForm.category,
                        description: galForm.description,
                        imageUrl: url
                    };
                    await addGalleryItem(newItem);
                    showToast('Design added to portfolio!', 'success');
                    setGalForm({ title: '', category: GALLERY_CATEGORIES[0], description: '', imageFile: null, imageUrlPreview: null });
                } catch (err) {
                    showToast('Failed to upload image.', 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setGalForm({ ...galForm, imageFile: file, imageUrlPreview: URL.createObjectURL(file) });
                }
            };

            const handleUpdateClientSubmit = async (e) => {
                e.preventDefault();
                if (editingClient.phone.length < 10) {
                    showToast('Invalid phone number length.', 'error');
                    return;
                }
                await updateCustomer(editingClient);
                setEditingClient(null);
            };

            const filteredOrders = useMemo(() => {
                let filtered = orders;
                const now = new Date();
                
                filtered = filtered.filter(o => {
                    if (o.status === 'Delivered' && o.deliveryDate) {
                        const delDate = new Date(o.deliveryDate);
                        const diffHours = (now - delDate) / (1000 * 60 * 60);
                        return diffHours <= 24; 
                    }
                    return true;
                });

                if (filter !== 'All') filtered = filtered.filter(o => o.status === filter);
                if (search) {
                    const q = search.toLowerCase();
                    filtered = filtered.filter(o => o.customerName.toLowerCase().includes(q) || o.customerPhone.includes(q) || o.id.toLowerCase().includes(q));
                }
                return filtered.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, filter, search]);

            const filteredClients = useMemo(() => {
                if (!clientSearch) return customers;
                const q = clientSearch.toLowerCase();
                return customers.filter(c => 
                    c.name.toLowerCase().includes(q) || 
                    c.phone.includes(q) || 
                    (c.address && c.address.toLowerCase().includes(q)) || 
                    (c.notes && c.notes.toLowerCase().includes(q))
                );
            }, [customers, clientSearch]);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 animate-fade-in pb-24">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <span className="text-xs font-bold text-accent-600 tracking-widest uppercase block mb-1">Workspace Manager</span>
                            <h1 className="text-3xl font-serif font-bold text-slate-800 tracking-tight">Atelier Admin Overview</h1>
                            
                            <div className="mt-2 flex items-center gap-2 bg-white/60 border border-slate-200/50 rounded-lg px-2.5 py-1 w-max">
                                <span className={`inline-block w-2.5 h-2.5 rounded-full ${isLive ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></span>
                                <span className="text-[10px] font-bold tracking-wider text-slate-500 uppercase">
                                    {isLive ? 'Online Real-time Sync Active' : 'Offline Backup Local Mode'}
                                </span>
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-2 md:gap-3 w-full md:w-auto">
                            <button onClick={() => setShowSettings(true)} className="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-500 hover:text-brand-600 transition-colors" title="Security Settings"><i className="fa-solid fa-cog"></i></button>
                            <Button onClick={() => setView('newCustomer')} variant="secondary" icon="fa-user-plus" className="flex-1 md:flex-initial text-xs">Add Client</Button>
                            <Button onClick={() => setView('newOrder')} variant="primary" icon="fa-plus" className="flex-1 md:flex-initial text-xs">New Order</Button>
                            <button onClick={logout} className="w-12 h-12 bg-white rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-400 hover:text-rose-600"><i className="fa-solid fa-sign-out-alt"></i></button>
                        </div>
                    </div>

                    {/* Command Tabs */}
                    <div className="flex bg-slate-200/50 rounded-2xl p-1 mb-8 max-w-lg border border-slate-200">
                        <button onClick={() => setActiveTab('overview')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'overview' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-chart-pie"></i> Orders Overview
                        </button>
                        <button onClick={() => setActiveTab('clients')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'clients' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-users"></i> Client Records
                        </button>
                        <button onClick={() => setActiveTab('gallery')} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'gallery' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-images"></i> Manage Portfolio
                        </button>
                    </div>

                    {activeTab === 'overview' && (
                        <div className="animate-fade-in">
                            {/* Stat Highlights */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                {[
                                    { label: 'Active Tasks', val: activeOrders.length, icon: 'fa-scissors', color: 'text-brand-600', bg: 'bg-brand-50 border-brand-100/50' },
                                    { label: 'Registered Today', val: todayOrders.length, icon: 'fa-calendar-day', color: 'text-blue-600', bg: 'bg-blue-50 border-blue-100/50' },
                                    { label: 'Completed Ready', val: activeOrders.filter(o=>o.status==='Ready').length, icon: 'fa-truck', color: 'text-amber-600', bg: 'bg-amber-50 border-amber-100/50' },
                                    { label: 'Clients Managed', val: customers.length, icon: 'fa-users', color: 'text-emerald-600', bg: 'bg-emerald-50 border-emerald-100/50' }
                                ].map((stat, i) => (
                                    <div key={i} className={`bg-white p-5 rounded-3xl shadow-sm border ${stat.bg} flex items-center gap-4 transition-transform hover:-translate-y-1`}>
                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${stat.color} bg-white shadow-sm shrink-0`}>
                                            <i className={`fa-solid ${stat.icon} text-lg`}></i>
                                        </div>
                                        <div>
                                            <p className="text-2xl font-bold text-slate-800 leading-tight">{stat.val}</p>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{stat.label}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Search Filters */}
                            <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                                <div className="relative flex-1 max-w-md">
                                    <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search Sizing ID, Name, Phone..." className="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-sm font-medium shadow-sm" />
                                </div>
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 md:mx-0 md:px-0">
                                    {['All', ...ORDER_STATUSES].map(s => (
                                        <button key={s} onClick={() => setFilter(s)} className={`whitespace-nowrap px-4 py-2.5 rounded-xl text-xs font-bold transition-colors shadow-sm shrink-0 ${filter === s ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Orders Grid */}
                            <div className="space-y-4">
                                {filteredOrders.length === 0 ? (
                                    <div className="bg-white p-12 rounded-3xl text-center border border-slate-100 shadow-sm">
                                        <p className="text-slate-500 font-medium">No order data matched your parameters.</p>
                                    </div>
                                ) : (
                                    filteredOrders.map(order => (
                                        <div key={order.id} className="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="text-xs font-bold text-brand-700 bg-brand-50 px-2.5 py-1 rounded-lg border border-brand-100/50">{order.id}</span>
                                                    <span className="text-xs text-slate-400 font-medium"><i className="fa-regular fa-clock mr-1"></i> {formatDate(order.orderDate)}</span>
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-800">{order.customerName}</h3>
                                                <p className="text-xs font-semibold text-slate-500 mt-1"><i className="fa-solid fa-phone text-[10px] mr-1"></i> {order.customerPhone}</p>
                                                
                                                <div className="mt-4 flex flex-wrap gap-2">
                                                    {order.items.map((item, idx) => (
                                                        <span key={idx} className="text-xs font-semibold bg-slate-50 text-slate-600 px-3 py-1.5 rounded-xl border border-slate-200/50">
                                                            {item.quantity}x {item.category}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col md:items-end w-full md:w-auto gap-4 pt-4 md:pt-0 border-t md:border-t-0 border-slate-100">
                                                <div className="flex justify-between w-full md:w-auto md:justify-end items-center gap-6">
                                                    <div className="text-left md:text-right">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Total / Balance Unpaid</p>
                                                        <p className="font-bold text-slate-800 text-lg">₹{order.totalAmount} <span className="text-brand-600 text-sm">/ ₹{order.totalAmount - order.amountPaid}</span></p>
                                                    </div>
                                                    <a href={getWhatsAppLink(order)} target="_blank" rel="noopener noreferrer" className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center hover:bg-emerald-100 transition-all duration-300 shadow-sm border border-emerald-100/50" title="Dispatch status alert">
                                                        <i className="fa-brands fa-whatsapp text-2xl"></i>
                                                    </a>
                                                </div>
                                                
                                                <div className="w-full relative">
                                                    <select 
                                                        value={order.status} 
                                                        onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                                        className={`w-full md:w-52 text-xs font-bold px-4 py-3 rounded-2xl outline-none border cursor-pointer select-none
                                                            ${order.status === 'Delivered' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-slate-50 border-slate-200 text-slate-700 focus:border-brand-500'}`}
                                                    >
                                                        {ORDER_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'clients' && (
                        <div className="animate-fade-in space-y-6">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <div>
                                    <h2 className="text-xl font-bold text-slate-800">Client Directory ({customers.length})</h2>
                                    <p className="text-xs text-slate-500 mt-1 font-medium">Configure customization measurements and metrics profiles.</p>
                                </div>
                                <div className="relative w-full md:w-80">
                                    <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input 
                                        type="text" 
                                        value={clientSearch} 
                                        onChange={e => setClientSearch(e.target.value)} 
                                        placeholder="Search by Name, Sizing, Location..."

                setView('ownerDash');

                        </form>
                    </div>
                </div>
            );

        const NewOrderForm = ({ setView, addOrder, customers, showToast }) => {
            const [searchPhone, setSearchPhone] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            
            const [items, setItems] = useState([{ category: ITEM_CATEGORIES[0], quantity: 1, description: '', price: 0, images: [] }]);
            const [expectedDate, setExpectedDate] = useState('');
            const [amountPaid, setAmountPaid] = useState(0);
            const [notes, setNotes] = useState('');

            useEffect(() => {
                if (searchPhone.length >= 10) {
                    const found = customers.find(c => c.phone.includes(searchPhone));
                    if (found) setSelectedCustomer(found);
                    else setSelectedCustomer(null);
                } else {
                    setSelectedCustomer(null);
                }
            }, [searchPhone, customers]);

            const addItem = () => setItems([...items, { category: ITEM_CATEGORIES[0], quantity: 1, description: '', price: 0, images: [] }]);
            
            const updateItem = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            const removeItem = (index) => {
                if (items.length === 1) return;
                const newItems = [...items];
                newItems.splice(index, 1);
                setItems(newItems);
            };

            const handleImageUpload = async (index, e) => {
                const file = e.target.files[0];
                if (!file) return;
                showToast('Uploading reference lookbook sketch pattern...', 'info');
                try {
                    const url = await uploadImage(file);
                    const newItems = [...items];
                    newItems[index].images = [url];
                    setItems(newItems);
                    showToast('Design layout mapped successfully.', 'success');
                } catch (err) {
                    showToast('Failed to parse uploaded design.', 'error');
                }
            };

            const totalAmount = items.reduce((sum, item) => sum + (parseFloat(item.price) || 0) * (parseInt(item.quantity) || 1), 0);

                e.preventDefault();
                if (!selectedCustomer && searchPhone.length < 10) {
                    showToast('Please provide a valid 10-digit mobile number for the client.', 'error');
                    return;

                if (!expectedDate) {
                    showToast('Please select expected layout completion date.', 'error');
                    return;

                const custName = selectedCustomer ? selectedCustomer.name : 'Guest Customer';

                const newOrder = {
                    id: generateId('ORD'),
                    customerName: custName,
                    customerPhone: searchPhone,
                    items: items,
                    status: 'Order Received',
                    orderDate: new Date().toISOString().split('T')[0],
                    expectedDeliveryDate: expectedDate,
                    totalAmount,
                    amountPaid: parseFloat(amountPaid) || 0,
                    notes

                await addOrder(newOrder);
                showToast('Commission initialized successfully.', 'success');
                setView('ownerDash');
