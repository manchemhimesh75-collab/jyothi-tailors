<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jyothi Atelier | Premium Tailoring</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons (Reliable CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Inter (Apple-like) & Playfair -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf3f3',
                            100: '#fbe4e4',
                            500: '#a31f24',
                            600: '#8c151a',
                            900: '#561416',
                            950: '#2d0607', 
                        },
                        accent: {
                            100: '#fef7da',
                            500: '#d4af37', 
                            600: '#b5952f',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Very light slate */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide Scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f8fafc;
        }

        /* Apple-like soft shadows */
        .shadow-apple {
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        /* Smooth inputs */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .page-transition-enter { opacity: 0; transform: translateY(10px); }
        .page-transition-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>

    <!-- Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, RecaptchaVerifier, signInWithPhoneNumber,
            getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, query, addDoc, getDocs
        };
        window.dispatchEvent(new Event('FirebaseSDKReady'));
    </script>

    <script type="text/babel" data-type="module" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURATION ---
        const SHOP_NAME = "Jyothi Atelier";
        const SHOP_PHONE = "919948698878"; // Shop WhatsApp number for gallery inquiries
        
        // Dynamic Admin PIN getter/setter
        const getAdminPin = () => localStorage.getItem('adminPin') || "2498";
        const setAdminPin = (newPin) => localStorage.setItem('adminPin', newPin);
        
        // Cloudinary is strongly preferred for images over Firestore due to 1MB doc limits.
        const CLOUDINARY_CLOUD_NAME = "denl3jaft"; 
const CLOUDINARY_UPLOAD_PRESET = "ml_default";
// Paste your Firebase Config object here to activate Google Cloud Sync and SMS OTP!
const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyC0qsco6OLLAJnzxDqXR6OFjQLmtx8_ngA",
  authDomain: "jyothi-tailors.firebaseapp.com",
  projectId: "jyothi-tailors",
  storageBucket: "jyothi-tailors.firebasestorage.app",
  messagingSenderId: "768098264466",
  appId: "1:768098264466:web:9ed8ff328547eacf6b4d4b"
};
        // --- MOCK DATA FALLBACKS ---
        const initialOrders = [
            { id: 'ORD-101', customerName: 'Priya Sharma', customerPhone: '9876543210', items: [{ category: 'Saree Blouse', quantity: 1, images: [], description: 'Banarasi Silk, Deep neck', price: 1500 }], status: 'Processing', orderDate: '2026-06-20', expectedDeliveryDate: '2026-06-25', totalAmount: 1500, amountPaid: 500, notes: 'Urgent delivery' },
            { id: 'ORD-102', customerName: 'Lakshmi R', customerPhone: '9123456789', items: [{ category: 'Lehenga', quantity: 1, images: [], description: 'Heavy Net', price: 4500 }], status: 'Ready', orderDate: '2026-06-15', expectedDeliveryDate: '2026-06-22', totalAmount: 4500, amountPaid: 4500, notes: '' },
            { id: 'ORD-103', customerName: 'Anita Desai', customerPhone: '9988776655', items: [{ category: 'Kurti', quantity: 2, images: [], description: 'Cotton daily wear', price: 1200 }], status: 'Delivered', orderDate: '2026-06-01', deliveryDate: '2026-06-10', expectedDeliveryDate: '2026-06-10', totalAmount: 1200, amountPaid: 1200, notes: '' }
        ];

        const initialCustomers = [
            { id: 'CUST-1', name: 'Priya Sharma', phone: '9876543210', address: 'Sri Sai Towers', notes: 'Prefers deep neck' },
            { id: 'CUST-2', name: 'Lakshmi R', phone: '9123456789', address: 'Omkar Street', notes: '' },
            { id: 'CUST-3', name: 'Anita Desai', phone: '9988776655', address: 'Banjara Hills', notes: '' }
        ];

        const ITEM_CATEGORIES = ['Saree Blouse', 'Lehenga', 'Kurti', 'Chudidar Set', 'Western Dress', 'Gown', 'Pant/Trouser', 'Skirt', 'Alteration', 'Maggam Work', 'Other'];
        const ORDER_STATUSES = ['Order Received', 'Processing', 'Ready', 'Delivered'];
        const GALLERY_CATEGORIES = ['Maggam Works', 'Machine Works', 'Bridal Blouses', 'Lehengas', 'Western', 'Other'];

        const initialGallery = [
            { id: 'GAL-1', imageUrl: 'https://images.unsplash.com/photo-1610030469983-98e550d6193c?auto=format&fit=crop&w=600&q=80', category: 'Maggam Works', title: 'Bridal Maggam Blouse', description: 'Intricate zardosi and stone work on pure silk for wedding.' },
            { id: 'GAL-2', imageUrl: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=600&q=80', category: 'Machine Works', title: 'Floral Embroidery', description: 'Computerized machine embroidery with vibrant threadwork on cotton silk.' },
            { id: 'GAL-3', imageUrl: 'https://images.unsplash.com/photo-1583391733958-d25e07fac04f?auto=format&fit=crop&w=600&q=80', category: 'Lehengas', title: 'Pastel Net Lehenga', description: 'Elegant reception wear lehenga with subtle glitter and heavy borders.' },
            { id: 'GAL-4', imageUrl: 'https://images.unsplash.com/photo-1605763240000-7e93b172d754?auto=format&fit=crop&w=600&q=80', category: 'Maggam Works', title: 'Peacock Motif Backneck', description: 'Heavy authentic maggam work featuring traditional peacock designs.' }
        ];

        // --- UTILS ---
        const generateId = (prefix) => `${prefix}-${Math.floor(Math.random() * 90000) + 10000}`;
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        
        const uploadImage = async (file) => {
            if (CLOUDINARY_CLOUD_NAME === "your_cloud_name") {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            }
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return data.secure_url;
        };

        const getWhatsAppLink = (order) => {
            let cleanNum = order.customerPhone.replace(/\D/g, '');
            if (cleanNum.length === 10) cleanNum = '91' + cleanNum;
            const itemsText = order.items.map(i => `▫️ ${i.category} (x${i.quantity})`).join('%0A');
            const text = `*Order Summary - ${SHOP_NAME}*%0A%0A👤 Customer: ${order.customerName}%0A📱 Mobile: ${order.customerPhone}%0A🔖 Order ID: ${order.id}%0A%0A*Items:*%0A${itemsText}%0A%0A⏳ Status: *${order.status}*%0A📅 Expected Delivery: ${formatDate(order.expectedDeliveryDate)}%0A%0AThank you for choosing us!`;
            return `https://wa.me/${cleanNum}?text=${text}`;
        };

        const getGalleryInquiryLink = (item) => {
            const text = `Hi ${SHOP_NAME}, I saw this beautiful design in your gallery and would like to know more!%0A%0A*Design:* ${item.title}%0A*Category:* ${item.category}%0A*Ref ID:* ${item.id}%0A%0AIs it possible to customize this for my measurements?`;
            return `https://wa.me/${SHOP_PHONE}?text=${text}`;
        };

        // --- UI COMPONENTS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bg = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-brand-900';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

            return (
                <div className={`fixed bottom-20 left-1/2 transform -translate-x-1/2 z-[100] animate-slide-up`}>
                    <div className={`${bg} text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 text-sm font-medium tracking-wide glass-card border-none`}>
                        <i className={`fa-solid ${icon} text-lg`}></i>
                        {message}
                    </div>
                </div>
            );
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', type = 'button', disabled = false, icon }) => {
            const base = "relative inline-flex items-center justify-center gap-2 px-6 py-3 text-sm font-semibold rounded-2xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:pointer-events-none overflow-hidden group";
            const variants = {
                primary: "bg-brand-900 text-white shadow-lg hover:shadow-xl hover:bg-brand-950",
                secondary: "bg-accent-500 text-brand-950 shadow hover:bg-accent-600",
                outline: "bg-transparent border-2 border-brand-900 text-brand-900 hover:bg-brand-50",
                ghost: "bg-transparent text-slate-600 hover:bg-slate-100",
                danger: "bg-red-50 text-red-600 hover:bg-red-100"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {icon && <i className={`fa-solid ${icon}`}></i>}
                    <span className="relative z-10">{children}</span>
                </button>
            );
        };

        // --- VIEWS ---

        const LoginView = ({ onLogin, showToast, authReady, sendOTP, verifyOTP, otpSent }) => {
            const [role, setRole] = useState('client'); 
            const [phoneInput, setPhoneInput] = useState('');
            const [otpInput, setOtpInput] = useState('');
            const [adminPinInput, setAdminPinInput] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSendOTP = async (e) => {
                e.preventDefault();
                if (phoneInput.length < 10) {
                    showToast("Please enter a valid 10-digit phone number", "error");
                    return;
                }
                setLoading(true);
                try {
                    await sendOTP(phoneInput);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleVerifyOTP = async (e) => {
                e.preventDefault();
                if (otpInput.length < 6) {
                    showToast("Please enter the 6-digit code received", "error");
                    return;
                }
                setLoading(true);
                try {
                    await verifyOTP(otpInput);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPinInput === getAdminPin()) {
                    onLogin('admin', null);
                } else {
                    showToast("Invalid PIN. Default is 9887.", "error");
                }
            };

            return (
                <div className="min-h-[80vh] flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-md glass-card rounded-3xl p-8 shadow-apple animate-slide-up">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-brand-900 text-accent-500 rounded-2xl mx-auto flex items-center justify-center text-3xl font-serif font-bold shadow-lg mb-4">
                                J
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800">Welcome Back</h2>
                            <p className="text-sm text-slate-500 mt-1">Sign in to track your bespoke orders.</p>
                        </div>

                        <div className="flex bg-slate-100 rounded-xl p-1 mb-6">
                            <button onClick={() => { setRole('client'); setPhoneInput(''); }} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${role === 'client' ? 'bg-white shadow text-brand-900' : 'text-slate-500'}`}>Customer</button>
                            <button onClick={() => { setRole('admin'); setAdminPinInput(''); }} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${role === 'admin' ? 'bg-white shadow text-brand-900' : 'text-slate-500'}`}>Owner</button>
                        </div>

                        {role === 'client' ? (
                            !otpSent ? (
                                <form onSubmit={handleSendOTP} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Mobile Number</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">+91</span>
                                            <input 
                                                type="tel" 
                                                autoFocus 
                                                value={phoneInput} 
                                                onChange={e => setPhoneInput(e.target.value.replace(/\D/g, ''))} 
                                                className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all font-medium text-slate-800" 
                                                placeholder="Enter 10-digit number" 
                                                maxLength="10"
                                                required 
                                            />
                                        </div>
                                    </div>
                                    
                                    {/* Invisible Firebase Recaptcha Anchor */}
                                    <div id="recaptcha-container"></div>

                                    <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-2">
                                        {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : "Send OTP Verification"}
                                    </Button>
                                </form>
                            ) : (
                                <form onSubmit={handleVerifyOTP} className="space-y-5 animate-fade-in">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Enter OTP Sent to +91 {phoneInput}</label>
                                        <input 
                                            type="text" 
                                            autoFocus 
                                            value={otpInput}
                                            onChange={e => setOtpInput(e.target.value.replace(/\D/g, ''))}
                                            placeholder="••••••" 
                                            maxLength="6"
                                            className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all font-medium text-center tracking-[0.5em] text-xl text-slate-800" 
                                            required 
                                        />
                                    </div>
                                    <Button type="submit" disabled={loading} className="w-full py-4 text-base mt-2">
                                        {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : "Verify & Sign In"}
                                    </Button>
                                </form>
                            )
                        ) : (
                            <form onSubmit={handleAdminLogin} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Admin PIN</label>
                                    <input 
                                        type="password" 
                                        autoFocus 
                                        value={adminPinInput} 
                                        onChange={e => setAdminPinInput(e.target.value)} 
                                        placeholder="••••" 
                                        className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all font-medium text-center tracking-widest text-xl text-slate-800" 
                                        required 
                                    />
                                </div>
                                <Button type="submit" className="w-full py-4 text-base mt-2">
                                    Secure Owner Login
                                </Button>
                            </form>
                        )}
                        <p className="text-[10px] text-center text-slate-400 mt-4 leading-relaxed">
                            Secured by Google Firebase Auth. Verify live SMS to log in securely.
                        </p>
                    </div>
                </div>
            );
        };

        const ClientDashboard = ({ phone, orders, gallery, logout }) => {
            const [activeTab, setActiveTab] = useState('orders'); // 'orders' or 'gallery'
            const [galleryFilter, setGalleryFilter] = useState('All');
            const [selectedImage, setSelectedImage] = useState(null);

            const myOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    const cleanPhone = o.customerPhone.replace(/\D/g, '');
                    const cleanTarget = phone.replace(/\D/g, '');
                    if (!cleanPhone.includes(cleanTarget) && !cleanTarget.includes(cleanPhone)) return false;
                    
                    if (o.status === 'Delivered' && o.deliveryDate) {
                        const delDate = new Date(o.deliveryDate);
                        const diffDays = (now - delDate) / (1000 * 60 * 60 * 24);
                        if (diffDays > 7) return false;
                    }
                    return true;
                }).sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, phone]);

            const filteredGallery = useMemo(() => {
                if (galleryFilter === 'All') return gallery;
                return gallery.filter(item => item.category === galleryFilter);
            }, [gallery, galleryFilter]);

            const getProgressIndex = (status) => ORDER_STATUSES.indexOf(status);

            return (
                <div className="max-w-4xl mx-auto p-4 pb-24 animate-fade-in">
                    <div className="flex justify-between items-end mb-6 mt-4">
                        <div>
                            <p className="text-sm text-slate-500 font-medium mb-1">Welcome back,</p>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">{myOrders[0]?.customerName || 'Premium Client'}</h1>
                        </div>
                        <button onClick={logout} className="w-10 h-10 bg-white rounded-full shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors">
                            <i className="fa-solid fa-power-off"></i>
                        </button>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex bg-slate-100 rounded-2xl p-1 mb-8 max-w-sm">
                        <button onClick={() => setActiveTab('orders')} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'orders' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-box"></i> My Orders
                        </button>
                        <button onClick={() => setActiveTab('gallery')} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'gallery' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-gem"></i> Atelier Gallery
                        </button>
                    </div>

                    {activeTab === 'orders' ? (
                        myOrders.length === 0 ? (
                            <div className="glass-card rounded-3xl p-10 text-center flex flex-col items-center">
                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-4">
                                    <i className="fa-solid fa-box-open text-4xl text-slate-300"></i>
                                </div>
                                <h3 className="text-xl font-bold text-slate-700 mb-2">No Active Orders</h3>
                                <p className="text-slate-500 text-sm max-w-xs">You don't have any recent orders linked to this number (+91 {phone}). Visit our atelier to register custom metrics.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {myOrders.map(order => {
                                    const progIdx = getProgressIndex(order.status);
                                    return (
                                        <div key={order.id} className="glass-card rounded-3xl overflow-hidden shadow-apple transition-transform duration-300 hover:scale-[1.01]">
                                            {/* Header */}
                                            <div className="p-5 border-b border-slate-100 bg-white/50 flex justify-between items-center">
                                                <div>
                                                    <span className="text-xs font-bold text-brand-700 uppercase tracking-widest bg-brand-50 px-2 py-1 rounded-md">#{order.id}</span>
                                                    <p className="text-xs text-slate-500 mt-2 font-medium">Placed on {formatDate(order.orderDate)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <span className={`px-3 py-1.5 rounded-full text-xs font-bold ${order.status === 'Delivered' ? 'bg-green-100 text-green-700' : 'bg-accent-100 text-accent-700'}`}>
                                                        {order.status}
                                                    </span>
                                                </div>
                                            </div>

                                            {/* Progress Tracker */}
                                            <div className="p-6 bg-white">
                                                <div className="relative">
                                                    <div className="absolute left-4 top-2 bottom-2 w-0.5 bg-slate-100 z-0"></div>
                                                    <div className="absolute left-4 top-2 w-0.5 bg-brand-600 z-0 transition-all duration-1000" style={{ height: `${(progIdx / (ORDER_STATUSES.length - 1)) * 100}%` }}></div>
                                                    
                                                    {ORDER_STATUSES.map((step, idx) => (
                                                        <div key={step} className="relative z-10 flex items-center gap-4 mb-6 last:mb-0">
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors duration-500 ${idx <= progIdx ? 'bg-brand-600 text-white shadow-md' : 'bg-white border-2 border-slate-200 text-slate-300'}`}>
                                                                {idx < progIdx ? <i className="fa-solid fa-check text-xs"></i> : <div className={`w-2.5 h-2.5 rounded-full ${idx === progIdx ? 'bg-white' : 'bg-transparent'}`}></div>}
                                                            </div>
                                                            <div className={idx <= progIdx ? 'text-slate-800' : 'text-slate-400'}>
                                                                <p className="text-sm font-bold">{step}</p>
                                                                {idx === 2 && progIdx <= 2 && <p className="text-xs opacity-70 mt-0.5">Expected: {formatDate(order.expectedDeliveryDate)}</p>}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Details */}
                                            <div className="p-5 bg-slate-50/50 border-t border-slate-100">
                                                <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Garment Details</h4>
                                                <div className="space-y-3 mb-5">
                                                    {order.items.map((item, i) => (
                                                        <div key={i} className="flex gap-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                                            {item.images && item.images.length > 0 ? (
                                                                <img src={item.images[0]} className="w-16 h-16 rounded-lg object-cover" alt="design" />
                                                            ) : (
                                                                <div className="w-16 h-16 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300"><i className="fa-solid fa-shirt"></i></div>
                                                            )}
                                                            <div className="flex-1">
                                                                <div className="flex justify-between items-start">
                                                                    <p className="font-bold text-slate-800 text-sm">{item.category}</p>
                                                                    <p className="text-sm font-bold text-slate-600">x{item.quantity}</p>
                                                                </div>
                                                                <p className="text-xs text-slate-500 mt-1 line-clamp-2">{item.description}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                                    <div>
                                                        <p className="text-xs text-slate-500 font-medium">Total Amount</p>
                                                        <p className="font-bold text-slate-800">₹{order.totalAmount}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-xs text-slate-500 font-medium">Balance Due</p>
                                                        <p className="font-bold text-brand-700">₹{order.totalAmount - order.amountPaid}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    ) : (
                        <div className="animate-fade-in">
                            <div className="flex gap-2 overflow-x-auto pb-4 scrollbar-hide mb-4">
                                {['All', ...GALLERY_CATEGORIES].map(cat => (
                                    <button 
                                        key={cat} 
                                        onClick={() => setGalleryFilter(cat)}
                                        className={`whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold transition-colors border ${galleryFilter === cat ? 'bg-brand-900 text-white border-brand-900 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {filteredGallery.length === 0 ? (
                                <div className="text-center py-12 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                    <i className="fa-regular fa-images text-4xl text-slate-300 mb-3"></i>
                                    <p className="text-slate-500 font-medium">No designs loaded in this category.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {filteredGallery.map(item => (
                                        <div 
                                            key={item.id} 
                                            onClick={() => setSelectedImage(item)}
                                            className="group relative bg-slate-100 rounded-2xl overflow-hidden aspect-[4/5] cursor-pointer shadow-sm hover:shadow-md transition-all"
                                        >
                                            <img src={item.imageUrl} alt={item.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-brand-950/80 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                                                <h4 className="text-white font-bold text-sm leading-tight">{item.title}</h4>
                                                <p className="text-white/80 text-xs mt-1 truncate">{item.category}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Gallery Modal */}
                            {selectedImage && (
                                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" onClick={() => setSelectedImage(null)}>
                                    <div className="bg-white rounded-3xl overflow-hidden w-full max-w-md shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                        <button onClick={() => setSelectedImage(null)} className="absolute top-4 right-4 w-8 h-8 bg-black/50 hover:bg-black/80 text-white rounded-full flex items-center justify-center backdrop-blur-md transition-colors z-10">
                                            <i className="fa-solid fa-times"></i>
                                        </button>
                                        <div className="w-full h-80 bg-slate-100 relative">
                                            <img src={selectedImage.imageUrl} alt={selectedImage.title} className="w-full h-full object-cover" />
                                            <div className="absolute top-4 left-4 bg-brand-900/90 backdrop-blur-sm text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">
                                                {selectedImage.category}
                                            </div>
                                        </div>
                                        <div className="p-6">
                                            <h3 className="text-xl font-bold text-slate-800 mb-2">{selectedImage.title}</h3>
                                            <p className="text-sm text-slate-600 mb-6 leading-relaxed">{selectedImage.description}</p>
                                            
                                            <a href={getGalleryInquiryLink(selectedImage)} target="_blank" rel="noopener noreferrer" className="block w-full">
                                                <Button type="button" className="w-full py-3 bg-[#25D366] hover:bg-[#1ebd5b] text-white border-none shadow-lg shadow-green-500/30" icon="fa-brands fa-whatsapp text-lg">
                                                    Inquire on WhatsApp
                                                </Button>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const OwnerDashboard = ({ orders, customers, gallery, setView, updateOrderStatus, logout, showToast, addGalleryItem, deleteGalleryItem, isLive }) => {
            const [activeTab, setActiveTab] = useState('overview'); // 'overview' or 'gallery'
            const activeOrders = orders.filter(o => o.status !== 'Delivered');
            const todayOrders = orders.filter(o => new Date(o.orderDate).toDateString() === new Date().toDateString());
            const [filter, setFilter] = useState('All');
            const [search, setSearch] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [pinData, setPinData] = useState({ current: '', newPin: '' });

            // Gallery form state
            const [galForm, setGalForm] = useState({ title: '', category: GALLERY_CATEGORIES[0], description: '', imageFile: null, imageUrlPreview: null });
            const [isUploading, setIsUploading] = useState(false);

            const handlePinChange = (e) => {
                e.preventDefault();
                if (pinData.current !== getAdminPin()) {
                    showToast('Current PIN is incorrect.', 'error');
                    return;
                }
                if (pinData.newPin.length < 4) {
                    showToast('New PIN must be at least 4 characters.', 'error');
                    return;
                }
                setAdminPin(pinData.newPin);
                showToast('Owner PIN updated successfully.', 'success');
                setShowSettings(false);
                setPinData({ current: '', newPin: '' });
            };

            const handleGalleryUpload = async (e) => {
                e.preventDefault();
                if (!galForm.imageFile) {
                    showToast('Please select an image first.', 'error');
                    return;
                }
                setIsUploading(true);
                try {
                    const url = await uploadImage(galForm.imageFile);
                    const newItem = {
                        id: generateId('GAL'),
                        title: galForm.title,
                        category: galForm.category,
                        description: galForm.description,
                        imageUrl: url
                    };
                    await addGalleryItem(newItem);
                    showToast('Design added to portfolio!', 'success');
                    setGalForm({ title: '', category: GALLERY_CATEGORIES[0], description: '', imageFile: null, imageUrlPreview: null });
                } catch (err) {
                    showToast('Failed to upload image.', 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setGalForm({ ...galForm, imageFile: file, imageUrlPreview: URL.createObjectURL(file) });
                }
            };

            const filteredOrders = useMemo(() => {
                let filtered = orders;
                if (filter !== 'All') filtered = filtered.filter(o => o.status === filter);
                if (search) {
                    const q = search.toLowerCase();
                    filtered = filtered.filter(o => o.customerName.toLowerCase().includes(q) || o.customerPhone.includes(q) || o.id.toLowerCase().includes(q));
                }
                return filtered.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            }, [orders, filter, search]);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 animate-fade-in pb-24">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Owner Dashboard</h1>
                            <p className="text-slate-500 font-medium">Manage your atelier operations and portfolio.</p>
                            
                            {/* Live Sync Status indicator */}
                            <div className="mt-2 flex items-center gap-2">
                                <span className={`inline-block w-2.5 h-2.5 rounded-full ${isLive ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}`}></span>
                                <span className="text-xs font-semibold text-slate-600">
                                    {isLive ? 'Live Sync Active (Firebase Mode)' : 'Offline Local Mode'}
                                </span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(true)} className="w-10 h-10 bg-white rounded-xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-500 hover:text-brand-600 transition-colors" title="Settings"><i className="fa-solid fa-cog"></i></button>
                            <Button onClick={() => setView('newCustomer')} variant="secondary" icon="fa-user-plus" className="text-xs px-4 py-2 rounded-xl">Add Client</Button>
                            <Button onClick={() => setView('newOrder')} variant="primary" icon="fa-plus" className="text-xs px-4 py-2 rounded-xl">New Order</Button>
                            <button onClick={logout} className="w-10 h-10 bg-white rounded-xl shadow-sm border border-slate-200 flex items-center justify-center text-slate-500 hover:text-red-500"><i className="fa-solid fa-sign-out-alt"></i></button>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex bg-slate-100 rounded-2xl p-1 mb-8 max-w-md">
                        <button onClick={() => setActiveTab('overview')} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'overview' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-chart-pie"></i> Orders & Stats
                        </button>
                        <button onClick={() => setActiveTab('gallery')} className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${activeTab === 'gallery' ? 'bg-white shadow text-brand-900' : 'text-slate-500 hover:text-slate-700'}`}>
                            <i className="fa-solid fa-images"></i> Manage Portfolio
                        </button>
                    </div>

                    {activeTab === 'overview' ? (
                        <div className="animate-fade-in">
                            {/* Stats */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                {[
                                    { label: 'Active Orders', val: activeOrders.length, icon: 'fa-scissors', color: 'text-brand-600', bg: 'bg-brand-50' },
                                    { label: 'Today\'s Orders', val: todayOrders.length, icon: 'fa-calendar-day', color: 'text-blue-600', bg: 'bg-blue-50' },
                                    { label: 'Pending Delivery', val: activeOrders.filter(o=>o.status==='Ready').length, icon: 'fa-truck', color: 'text-orange-600', bg: 'bg-orange-50' },
                                    { label: 'Total Clients', val: customers.length, icon: 'fa-users', color: 'text-green-600', bg: 'bg-green-50' }
                                ].map((stat, i) => (
                                    <div key={i} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 transition-transform hover:-translate-y-1">
                                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${stat.bg} ${stat.color}`}>
                                            <i className={`fa-solid ${stat.icon} text-xl`}></i>
                                        </div>
                                        <div>
                                            <p className="text-2xl font-bold text-slate-800">{stat.val}</p>
                                            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{stat.label}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Controls */}
                            <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                                <div className="relative flex-1 max-w-md">
                                    <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                    <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ID, Name, Mobile..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm font-medium shadow-sm" />
                                </div>
                                <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                    {['All', ...ORDER_STATUSES].map(s => (
                                        <button key={s} onClick={() => setFilter(s)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition-colors shadow-sm ${filter === s ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Order List */}
                            <div className="space-y-4">
                                {filteredOrders.length === 0 ? (
                                    <div className="bg-white p-8 rounded-2xl text-center border border-slate-100 shadow-sm">
                                        <p className="text-slate-500">No orders found matching the criteria.</p>
                                    </div>
                                ) : (
                                    filteredOrders.map(order => (
                                        <div key={order.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <span className="text-xs font-bold text-brand-700 bg-brand-50 px-2 py-1 rounded-md">{order.id}</span>
                                                    <span className="text-xs text-slate-400"><i className="fa-regular fa-clock mr-1"></i> {formatDate(order.orderDate)}</span>
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-800">{order.customerName}</h3>
                                                <p className="text-sm text-slate-500"><i className="fa-solid fa-phone text-xs mr-1"></i> {order.customerPhone}</p>
                                                
                                                <div className="mt-3 flex flex-wrap gap-2">
                                                    {order.items.map((item, idx) => (
                                                        <span key={idx} className="text-xs font-medium bg-slate-100 text-slate-600 px-2 py-1 rounded-md border border-slate-200">
                                                            {item.quantity}x {item.category}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col md:items-end w-full md:w-auto gap-4">
                                                <div className="flex justify-between w-full md:w-auto md:justify-end items-center gap-6">
                                                    <div className="text-left md:text-right">
                                                        <p className="text-xs text-slate-400 font-medium uppercase">Total / Due</p>
                                                        <p className="font-bold text-slate-800">₹{order.totalAmount} <span className="text-brand-600 text-sm">/ ₹{order.totalAmount - order.amountPaid}</span></p>
                                                    </div>
                                                    <a href={getWhatsAppLink(order)} target="_blank" rel="noopener noreferrer" className="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center hover:bg-green-100 transition-colors shadow-sm" title="Notify on WhatsApp">
                                                        <i className="fa-brands fa-whatsapp text-xl"></i>
                                                    </a>
                                                </div>
                                                
                                                <div className="w-full">
                                                    <select 
                                                        value={order.status} 
                                                        onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                                        className={`w-full md:w-48 text-sm font-bold px-4 py-2 rounded-xl outline-none appearance-none border cursor-pointer
                                                            ${order.status === 'Delivered' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-700 focus:border-brand-500'}`}
                                                    >
                                                        {ORDER_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    ) : (
                        <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Upload Form */}
                            <div className="lg:col-span-1">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 sticky top-24">
                                    <h3 className="text-lg font-bold text-slate-800 mb-4">Add design to Gallery</h3>
                                    <form onSubmit={handleGalleryUpload} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Design Picture</label>
                                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition-colors cursor-pointer relative overflow-hidden group">
                                                <input type="file" accept="image/*" onChange={handleImageSelect} className="absolute inset-0 opacity-0 cursor-pointer z-10" required />
                                                {galForm.imageUrlPreview ? (
                                                    <img src={galForm.imageUrlPreview} className="w-full h-40 object-cover rounded-lg" alt="preview" />
                                                ) : (
                                                    <div className="py-6">
                                                        <i className="fa-solid fa-cloud-arrow-up text-3xl text-slate-300 mb-2 group-hover:text-brand-500 transition-colors"></i>
                                                        <p className="text-sm font-medium text-slate-600">Tap to upload asset</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Design Title</label>
                                            <input type="text" value={galForm.title} onChange={e=>setGalForm({...galForm, title: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-brand-500 outline-none text-sm" placeholder="E.g. Bridal Zardosi Blouse" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Category</label>
                                            <select value={galForm.category} onChange={e=>setGalForm({...galForm, category: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-brand-500 outline-none text-sm cursor-pointer">
                                                {GALLERY_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Description</label>
                                            <textarea value={galForm.description} onChange={e=>setGalForm({...galForm, description: e.target.value})} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-brand-500 outline-none text-sm resize-none h-20" placeholder="Details about custom threadwork..."></textarea>
                                        </div>
                                        <Button type="submit" className="w-full" disabled={isUploading} icon={isUploading ? "fa-circle-notch fa-spin" : "fa-upload"}>
                                            {isUploading ? 'Uploading...' : 'Publish to Gallery'}
                                        </Button>
                                    </form>
                                </div>
                            </div>
                            
                            {/* Gallery List */}
                            <div className="lg:col-span-2">
                                <h3 className="text-lg font-bold text-slate-800 mb-4">Current Portfolio ({gallery.length})</h3>
                                {gallery.length === 0 ? (
                                    <div className="bg-white p-8 rounded-2xl text-center border border-slate-100 shadow-sm">
                                        <p className="text-slate-500">Your gallery is empty. Upload designs to show clients.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {gallery.map(item => (
                                            <div key={item.id} className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center relative group">
                                                <button onClick={() => deleteGalleryItem(item.id)} className="absolute -top-2 -right-2 w-8 h-8 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-sm z-10">
                                                    <i className="fa-solid fa-trash text-xs"></i>
                                                </button>
                                                <img src={item.imageUrl} alt={item.title} className="w-20 h-24 object-cover rounded-xl" />
                                                <div className="flex-1 min-w-0">
                                                    <span className="text-[10px] font-bold uppercase tracking-wider text-brand-600 bg-brand-50 px-2 py-0.5 rounded">{item.category}</span>
                                                    <h4 className="font-bold text-slate-800 text-sm mt-1 truncate">{item.title}</h4>
                                                    <p className="text-xs text-slate-500 line-clamp-2 mt-0.5">{item.description}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in" onClick={() => setShowSettings(false)}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">System Config & Settings</h3>
                                
                                <div className="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Live SMS OTP Setup Guide</h4>
                                    <p className="text-xs text-slate-600 leading-relaxed mb-3">
                                        To process actual, high-speed SMS verification codes for your clients, complete these quick parameters in your Google Firebase Console:
                                    </p>
                                    <ol className="text-xs text-slate-600 space-y-2 list-decimal list-inside font-medium">
                                        <li>Go to <strong>Firebase Console &gt; Authentication &gt; Sign-in Method</strong>.</li>
                                        <li>Enable <strong>Phone</strong> provider.</li>
                                        <li>Add your domain/app URL under <strong>Authorized Domains</strong> so invisible ReCaptcha works safely.</li>
                                    </ol>
                                </div>

                                <form onSubmit={handlePinChange} className="space-y-4">
                                    <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Change Access PIN</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-500 mb-1">Current PIN</label>
                                            <input type="password" value={pinData.current} onChange={e=>setPinData({...pinData, current: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm" required />
                                        </div>
                                        <div>

                    <div className="glass-card rounded-3xl p-6 md:p-8 shadow-apple">

        const NewOrderForm = ({ setView, addOrder, customers, showToast }) => {
            const [searchPhone, setSearchPhone] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            
            const [items, setItems] = useState([{ category: ITEM_CATEGORIES[0], quantity: 1, description: '', price: 0, images: [] }]);
            const [expectedDate, setExpectedDate] = useState('');
            const [amountPaid, setAmountPaid] = useState(0);
            const [notes, setNotes] = useState('');

            // Try to auto-fill customer based on phone
            useEffect(() => {
                if (searchPhone.length >= 10) {
                    const found = customers.find(c => c.phone.includes(searchPhone));
                    if (found) setSelectedCustomer(found);
                    else setSelectedCustomer(null);
                } else {
                    setSelectedCustomer(null);
                }
            }, [searchPhone, customers]);

            const addItem = () => setItems([...items, { category: ITEM_CATEGORIES[0], quantity: 1, description: '', price: 0, images: [] }]);
            
            const updateItem = (index, field, value) => {
                const newItems = [...items];
                newItems[index][field] = value;
                setItems(newItems);
            };

            const removeItem = (index) => {
                if (items.length === 1) return;
                const newItems = [...items];
                newItems.splice(index, 1);
                setItems(newItems);
            };

            const handleImageUpload = async (index, e) => {
                const file = e.target.files[0];
                if (!file) return;
                showToast('Uploading custom design sketch...', 'info');
                try {
                    const url = await uploadImage(file);
                    const newItems = [...items];
                    newItems[index].images = [url];
                    setItems(newItems);
                    showToast('Sketch attached successfully.', 'success');
                } catch (err) {
                    showToast('Failed to upload sketch asset.', 'error');
                }
            };

            const totalAmount = items.reduce((sum, item) => sum + (parseFloat(item.price) || 0) * (parseInt(item.quantity) || 1), 0);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!selectedCustomer && searchPhone.length < 10) {
                    showToast('Please provide a valid 10-digit mobile number for the client.', 'error');
                    return;
                }
                if (!expectedDate) {
                    showToast('Please set an expected delivery date.', 'error');
                    return;
                }

                const custName = selectedCustomer ? selectedCustomer.name : 'Walk-in Client';

                const newOrder = {
                    id: generateId('ORD'),
                    customerName: custName,
                    customerPhone: searchPhone,
                    items: items,
                    status: 'Order Received',
                    orderDate: new Date().toISOString().split('T')[0],
                    expectedDeliveryDate: expectedDate,
                    totalAmount,
                    amountPaid: parseFloat(amountPaid) || 0,
                    notes

            return (
                <div className="max-w-3xl mx-auto p-4 md:p-8 animate-slide-up pb-24">
