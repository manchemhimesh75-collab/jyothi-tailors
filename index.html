                            <a href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, t.whatsappFloater.msg)} target="_blank" rel="noreferrer" className="w-9 h-9 rounded bg-maroon-900 border border-gold-400 flex items-center justify-center hover:bg-[#25D366] hover:text-white transition"><i className="fa-brands fa-whatsapp text-sm"></i></a>
                        </div>
                        
                        <div className="text-xs text-maroon-200 flex flex-col items-center md:items-end gap-2">
                            <button onClick={triggerInstall} className="hover:underline text-gold-300 text-[10px] uppercase font-bold tracking-widest flex items-center gap-1">
                                <i className="fa-solid fa-mobile-screen"></i> Download / Install App
                            </button>
                            {isAdmin || isCustomer ? (
                                <button onClick={logOutUser} className="hover:underline text-red-400 text-[10px] uppercase font-bold tracking-widest"><i className="fa-solid fa-sign-out-alt mr-1"></i> Exit Active Portal Session</button>
                            ) : (
                                <button onClick={openLoginModal} className="hover:underline hover:text-white text-[10px] uppercase font-bold tracking-widest"><i className="fa-solid fa-lock mr-1 text-gold-400"></i> Client & Owner Portal Access</button>
                            )}
                        </div>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-4 mt-8 pt-8 border-t border-maroon-900 text-center text-[10px] text-maroon-200 uppercase tracking-widest font-semibold">
                    &copy; {new Date().getFullYear()} {SHOP_NAME}. {t.footer.rights}
                </div>
            </footer>
        );

        const FloatingWhatsApp = ({ msg }) => (
            <a href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, msg)} target="_blank" rel="noreferrer" 
               className="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:bg-[#128C7E] transition transform hover:scale-110 group">
                <i className="fa-brands fa-whatsapp text-3xl"></i>
                <span className="absolute right-16 bg-white text-gray-855 text-xs px-3 py-2 rounded shadow-lg opacity-0 group-hover:opacity-100 transition whitespace-nowrap border border-gray-200 pointer-events-none font-semibold font-sans">
                    Atelier Support desk
                </span>
            </a>
        );

        const App = () => {
            const [currentView, setView] = useState('home');
            
            const [orders, setOrders] = useState(() => {
                try {
                    const localData = localStorage.getItem('jyothi_orders_v2');
                    return localData ? JSON.parse(localData) : initialOrders;
                } catch(e) { return initialOrders; }
            });

            const [galleryItems, setGalleryItems] = useState(() => {
                try {
                    const localGallery = localStorage.getItem('jyothi_gallery_v2');
                    return localGallery ? JSON.parse(localGallery) : defaultGallery;
                } catch(e) { return defaultGallery; }
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [isCustomer, setIsCustomer] = useState(null); 
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passcodeInput, setPasscodeInput] = useState('');
            const [loginError, setLoginError] = useState('');

            const [showOnboardingSplash, setShowOnboardingSplash] = useState(true);
            const [galleryInitialCategory, setGalleryInitialCategory] = useState(null);

            const [showInstallModal, setShowInstallModal] = useState(false);
            const [deviceType, setDeviceType] = useState('desktop');
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInAppBrowser, setIsInAppBrowser] = useState(false);

            const [adminPasscode, setAdminPasscode] = useState(() => {
                try {
                    return localStorage.getItem('jyothi_tailor_passcode_v2') || '1234';
                } catch(e) { return '1234'; }
            });

            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [cloudStatus, setCloudStatus] = useState('local-only'); 

            const t = translations['en'];

            useEffect(() => {
                try {
                    localStorage.setItem('jyothi_orders_v2', JSON.stringify(orders));
                } catch(e) {}
            }, [orders]);

            useEffect(() => {
                try {
                    localStorage.setItem('jyothi_gallery_v2', JSON.stringify(galleryItems));
                } catch(e) {}
            }, [galleryItems]);

            useEffect(() => {
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                
                if (/android/i.test(userAgent)) {
                    setDeviceType('android');
                } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    setDeviceType('ios');
                } else {
                    setDeviceType('desktop');
                }

                const inApp = (userAgent.indexOf('FBAN') > -1) || 
                              (userAgent.indexOf('FBAV') > -1) || 
                              (userAgent.indexOf('Instagram') > -1) || 
                              (userAgent.indexOf('WhatsApp') > -1) || 
                              (userAgent.indexOf('Messenger') > -1) ||
                              (userAgent.indexOf('Line') > -1);
                
                setIsInAppBrowser(inApp);

                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const triggerInstallPrompt = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setDeferredPrompt(null);
                        setShowInstallModal(false);
                    }
                }
            };

            useEffect(() => {
                const initFirebase = () => {
                    if (typeof window.FirebaseSDK === 'undefined') return;
                    const { initializeApp, getFirestore, getAuth, signInAnonymously, signInWithCustomToken, onSnapshot, collection, query, doc, getDoc } = window.FirebaseSDK;
                    const appId = 'jyothi-ladies-tailor';
                    
                    try {
                        let firebaseConfig = null;
                        
                        // Use your custom config if provided, otherwise fallback to sandbox
                        if (MY_FIREBASE_CONFIG) {
                            firebaseConfig = MY_FIREBASE_CONFIG;
                        } else if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            firebaseConfig = JSON.parse(__firebase_config);
                        }

                        if (firebaseConfig) {
                            const app = initializeApp(firebaseConfig);
                            const firestoreDb = getFirestore(app);
                            const auth = getAuth(app);
                            setDb(firestoreDb);

                            const initCloudAuth = async () => {
                                try {
                                    let credential;
                                    // Only try custom token if we are using the sandbox config
                                    if (!MY_FIREBASE_CONFIG && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        credential = await signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        credential = await signInAnonymously(auth);
                                    }
                                    setUser(credential.user);
                                    setCloudStatus('connected');

                                    try {
                                        const configRef = doc(firestoreDb, 'artifacts', appId, 'public', 'data', 'config', 'settings');
                                        const configSnap = await getDoc(configRef);
                                        if (configSnap.exists() && configSnap.data().passcode) {
                                            setAdminPasscode(configSnap.data().passcode);
                                            localStorage.setItem('jyothi_tailor_passcode_v2', configSnap.data().passcode);
                                        }
                                    } catch (configErr) {
                                        console.warn("Could not load cloud settings:", configErr.message);
                                    }
                                } catch (authErr) {
                                    console.warn("Firebase Anonymous Auth failed:", authErr.message);
                                    setCloudStatus('local-only');
                                }
                            };

                            initCloudAuth();

                            const galleryRef = collection(firestoreDb, 'artifacts', appId, 'public', 'data', 'gallery');
                            const unsubGallery = onSnapshot(query(galleryRef), 
                                (snapshot) => {
                                    const cloudItems = [];
                                    snapshot.forEach(doc => cloudItems.push({ id: doc.id, ...doc.data() }));
                                    if (cloudItems.length > 0) {
                                        setGalleryItems(cloudItems);
                                    }
                                },
                                (error) => {
                                    console.warn("Gallery sync error:", error.message);
                                }
                            );

                            const ordersRef = collection(firestoreDb, 'artifacts', appId, 'public', 'data', 'orders');
                            const unsubOrders = onSnapshot(query(ordersRef), 
                                (snapshot) => {
                                    const cloudOrders = [];
                                    snapshot.forEach(doc => cloudOrders.push({ id: doc.id, ...doc.data() }));
                                    if (cloudOrders.length > 0) {
                                        setOrders(cloudOrders);
                                    }
                                },
                                (error) => {
                                    console.warn("Orders sync error:", error.message);
                                }
                            );

                            return () => {
                                unsubGallery();
                                unsubOrders();
                            };
                        }
                    } catch (e) {
                        console.warn("Offline fallback mode active:", e.message);
                    }
                };

                if (window.FirebaseSDK) {
                    initFirebase();
                } else {
                    window.addEventListener('FirebaseSDKReady', initFirebase);
                }
                return () => window.removeEventListener('FirebaseSDKReady', initFirebase);
            }, []);

            const handlePortalLogin = (e) => {
                e.preventDefault();
                const cleanedInput = passcodeInput.toUpperCase().trim();

                const matchedOrder = orders.find(o => o.id.toUpperCase().trim() === cleanedInput);
                
                if (matchedOrder) {
                    if (matchedOrder.status === 'Completed & Delivered') {
                        setLoginError("This order has been completed and delivered. Your temporary tracking portal access has expired.");
                        return;
                    }
                    setIsCustomer(matchedOrder.id);
                    setIsAdmin(false);
                    setLoginError('');
                    setShowLoginModal(false);
                    setView('customerPortal');
                    setPasscodeInput('');
                    return;
                }

                if (passcodeInput === adminPasscode) {
                    setIsAdmin(true);
                    setIsCustomer(null);
                    setLoginError('');
                    setShowLoginModal(false);
                    setView('admin'); 
                    setPasscodeInput('');
                    return;
                }

                setLoginError("Incorrect credentials. Please enter a valid active production Order ID or owner passcode.");
            };

            const logOutUser = () => {
                setIsAdmin(false);
                setIsCustomer(null);
                setView('home');
            };

            const updateAdminPasscode = async (newCode) => {
                setAdminPasscode(newCode);
                localStorage.setItem('jyothi_tailor_passcode_v2', newCode);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'settings'), { passcode: newCode }, { merge: true });
                    } catch (e) {
                        console.warn("Cloud config sync failed:", e.message);
                    }
                }
            };

            const addOrder = async (order) => {
                const updatedOrders = [order, ...orders];
                setOrders(updatedOrders);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), order);
                    } catch (e) {
                        console.warn("Cloud save failed:", e.message);
                    }
                }
            };

            const updateOrderStatus = async (id, newStatus) => {
                const updated = orders.map(o => o.id === id ? { ...o, status: newStatus } : o);
                setOrders(updated);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, updateDoc } = window.FirebaseSDK;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), { status: newStatus });
                    } catch (e) {
                        console.warn("Cloud status update failed:", e.message);
                    }
                }
            };

            const updateOrderDetails = async (id, updatedFields) => {
                const updated = orders.map(o => o.id === id ? { ...o, ...updatedFields } : o);
                setOrders(updated);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, updateDoc } = window.FirebaseSDK;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id), updatedFields);
                    } catch (e) {
                        console.warn("Cloud details sync failed:", e.message);
                    }
                }
            };

            const deleteOrder = async (id) => {
                const updated = orders.filter(o => o.id !== id);
                setOrders(updated);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, deleteDoc } = window.FirebaseSDK;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                    } catch (e) {
                        console.warn("Cloud deletion failed:", e.message);
                    }
                }
            };

            const addGalleryItem = async (item) => {
                const updatedGallery = [item, ...galleryItems];
                setGalleryItems(updatedGallery);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, setDoc } = window.FirebaseSDK;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', item.id), item);
                    } catch (e) {
                        console.warn("Cloud gallery save failed:", e.message);
                    }
                }
            };

            const deleteGalleryItem = async (id) => {
                const updatedGallery = galleryItems.filter(item => item.id !== id);
                setGalleryItems(updatedGallery);

                if (db && user) {
                    const appId = 'jyothi-ladies-tailor';
                    try {
                        const { doc, deleteDoc } = window.FirebaseSDK;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gallery', id));
                    } catch (e) {
                        console.warn("Cloud gallery deletion failed:", e.message);
                    }
                }
            };

            const handleGatewayChoice = (choice) => {
                setShowOnboardingSplash(false);
                if (choice === 'maggam') {
                    setGalleryInitialCategory('Maggam Work');
                    setView('gallery');
                } else if (choice === 'machine') {
                    setGalleryInitialCategory('Machine Work');
                    setView('gallery');
                } else {
                    setView('home');
                }
            };

            useEffect(() => { window.scrollTo(0, 0); }, [currentView]);

            const renderView = () => {
                switch(currentView) {
                    case 'home': return <HomeView t={t} setView={setView} orders={orders} />;
                    case 'services': return <ServicesView t={t} setView={setView} />;
                    case 'gallery': 
                        return (
                            <GalleryView 
                                t={t} 
                                galleryItems={galleryItems} 
                                isAdmin={isAdmin} 
                                onDeleteGalleryItem={deleteGalleryItem} 
                                initialCategory={galleryInitialCategory}
                                clearInitialCategory={() => setGalleryInitialCategory(null)}
                            />
                        );
                    case 'order': return <OrderFormView t={t} addOrder={addOrder} />;
                    case 'contact': return <ContactView t={t} />;
                    case 'customerPortal': 
                        return isCustomer ? (
                            <CustomerPortalView t={t} customerOrder={orders.find(o => o.id === isCustomer)} />
                        ) : (
                            <HomeView t={t} setView={setView} orders={orders} />
                        );
                    case 'admin': 
                        return isAdmin ? (
                            <AdminDashboardView 
                                t={t} 
                                orders={orders} 
                                updateOrderStatus={updateOrderStatus} 
                                onUpdateOrderDetails={updateOrderDetails}
                                galleryItems={galleryItems} 
                                onAddGalleryItem={addGalleryItem}
                                onAddOrder={addOrder}
                                onDeleteOrder={deleteOrder}
                                adminPasscode={adminPasscode}
                                onUpdatePasscode={updateAdminPasscode}
                                cloudStatus={cloudStatus}
                            />
                        ) : (
                            <HomeView t={t} setView={setView} orders={orders} />
                        );
                    default: return <HomeView t={t} setView={setView} orders={orders} />;
                }
            };

            return (
                <div className="flex flex-col min-h-screen relative">
                    <Navbar 
                        currentView={currentView} 
                        setView={setView} 
                        t={t} 
                        isAdmin={isAdmin} 
                        isCustomer={isCustomer}
                        logOutUser={logOutUser} 
                        openLoginModal={() => setShowLoginModal(true)} 
                        triggerInstall={() => setShowInstallModal(true)}
                    />
                    
                    <main className="flex-grow">
                        {renderView()}
                    </main>

                    <Footer 
                        t={t} 
                        openLoginModal={() => setShowLoginModal(true)} 
                        isAdmin={isAdmin} 
                        isCustomer={isCustomer}
                        logOutUser={logOutUser} 
                        triggerInstall={() => setShowInstallModal(true)}
                    />
                    
                    <FloatingWhatsApp msg={t.whatsappFloater.msg} />

                    {/* Onboarding welcome splash modal */}
                    {showOnboardingSplash && (
                        <div className="fixed inset-0 bg-maroon-950/95 backdrop-blur-md flex items-center justify-center p-4 z-50 modal-animate">
                            <div className="bg-white rounded-lg shadow-2xl p-8 max-w-2xl w-full border-t-8 border-gold-500 relative slide-animate text-center font-sans">
                                <div className="absolute top-4 right-4">
                                    <button 
                                        onClick={() => setShowOnboardingSplash(false)}
                                        className="text-gray-500 hover:text-maroon-700 text-sm font-bold uppercase tracking-widest font-sans"
                                    >
                                        Skip <i className="fa-solid fa-angles-right text-xs"></i>
                                    </button>
                                </div>

                                <div className="w-12 h-12 bg-maroon-700 text-gold-300 rounded-md flex items-center justify-center font-serif text-2xl font-bold mx-auto mb-4 border border-gold-400">
                                    {SHOP_NAME ? SHOP_NAME.charAt(0) : 'J'}
                                </div>
                                <h3 className="text-2xl sm:text-3xl font-serif font-bold text-maroon-800 mb-1">Welcome to {SHOP_NAME}</h3>
                                <p className="text-xs tracking-widest uppercase font-bold text-gold-700 mb-6">Select your bespoke tailoring requirements</p>
                                
                                <p className="text-sm text-gray-700 max-w-lg mx-auto mb-8 font-medium leading-relaxed">
                                    Step into our digital atelier. Choose a service channel below to find curated patterns, pricing, or place custom stitching commissions instantly.
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <button 
                                        onClick={() => handleGatewayChoice('maggam')}
                                        className="p-5 border-2 border-maroon-100 hover:border-gold-500 hover:bg-maroon-50/50 rounded-lg text-center transition-all duration-300 shadow-sm hover:shadow-md flex flex-col items-center group"
                                    >
                                        <div className="w-12 h-12 bg-gold-100 text-gold-800 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition">
                                            <i className="fa-solid fa-wand-magic-sparkles text-xl"></i>
                                        </div>
                                        <span className="text-sm font-serif font-bold text-maroon-800 block mb-1">Maggam Work</span>
                                        <span className="text-[10px] text-gray-650 font-semibold leading-snug">Exquisite hand embroidery & zardozi bridal designs</span>
                                    </button>

                                    <button 
                                        onClick={() => handleGatewayChoice('machine')}
                                        className="p-5 border-2 border-maroon-100 hover:border-gold-500 hover:bg-maroon-50/50 rounded-lg text-center transition-all duration-300 shadow-sm hover:shadow-md flex flex-col items-center group"
                                    >
                                        <div className="w-12 h-12 bg-gold-100 text-gold-800 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition">
                                            <i className="fa-solid fa-microchip text-xl"></i>
                                        </div>
                                        <span className="text-sm font-serif font-bold text-maroon-800 block mb-1">Machine Work</span>
                                        <span className="text-[10px] text-gray-655 font-semibold leading-snug">Precision modern computer patterns & detailing</span>
                                    </button>

                                    <button 
                                        onClick={() => handleGatewayChoice('stitching')}
                                        className="p-5 border-2 border-maroon-100 hover:border-gold-500 hover:bg-maroon-50/50 rounded-lg text-center transition-all duration-300 shadow-sm hover:shadow-md flex flex-col items-center group"
                                    >
                                        <div className="w-12 h-12 bg-maroon-50 text-maroon-700 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition">
                                            <i className="fa-solid fa-scissors text-lg"></i>
                                        </div>
                                        <span className="text-sm font-serif font-bold text-maroon-800 block mb-1">Custom Stitching</span>
                                        <span className="text-[10px] text-gray-655 font-semibold leading-snug">Bespoke fits, kurtis, blouses & everyday wear tailoring</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <InstallModal 
                        isOpen={showInstallModal} 
                        onClose={() => setShowInstallModal(false)} 
                        deviceType={deviceType}
                        onTriggerInstallPrompt={triggerInstallPrompt}
                        hasNativePrompt={!!deferredPrompt}
                        isInAppBrowser={isInAppBrowser}
                    />

                    {/* CLIENT & OWNER INTEGRATED GATEWAY */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 modal-animate">
                            <div className="bg-white rounded shadow-2xl p-6 max-w-sm w-full border-t-4 border-maroon-700 slide-animate font-sans">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-serif font-bold text-maroon-800">Atelier Gateway Login</h3>
                                    <button onClick={() => { setShowLoginModal(false); setLoginError(''); }} className="text-gray-505 hover:text-gray-800">
                                        <i className="fa-solid fa-times"></i>
                                    </button>
                                </div>
                                <p className="text-xs text-gray-700 font-bold mb-4 leading-relaxed">
                                    Access your tracking details, invoices, and progress.
                                </p>
                                
                                <div className="bg-blue-50 p-3 rounded border border-blue-200 text-blue-900 text-xs mb-4 flex items-start gap-2.5 animate-pulse">
                                    <i className="fa-solid fa-circle-info text-blue-700 mt-0.5 text-sm shrink-0"></i>
                                    <div>
                                        <p className="font-bold text-blue-955">Important Notice for Clients:</p>
                                        <p className="mt-0.5 text-gray-800 font-semibold leading-normal font-sans">
                                            Your login <strong className="text-blue-900 font-sans">Passcode is your User ID</strong> (which is your unique Order ID, e.g., <strong className="font-mono">ORD-101</strong>).
                                        </p>
                                    </div>
                                </div>

                                <form onSubmit={handlePortalLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-800 uppercase mb-2 tracking-wider">Passcode (User ID / Order ID)</label>
                                        <input 
                                            type="password" 
                                            value={passcodeInput}
                                            onChange={(e) => setPasscodeInput(e.target.value)}
                                            placeholder="•••• or ORD-XXXX" 
                                            className="w-full p-3 border-2 border-maroon-200 rounded tracking-widest text-center text-sm font-bold uppercase focus:ring-2 focus:ring-maroon-500 outline-none text-gray-900 bg-white"
                                            required
                                        />
                                        {loginError && <p className="text-xs text-red-700 font-bold mt-2 text-center">{loginError}</p>}
                                    </div>
                                    <Button type="submit" className="w-full text-xs">Unlock Workspace</Button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
