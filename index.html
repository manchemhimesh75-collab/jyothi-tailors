<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyothi Ladies Tailor | Premium Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        maroon: {
                            50: '#fdf8f8', 100: '#f9ecec', 500: '#a32a2a',
                            600: '#8c2020', 700: '#731717', 800: '#5c1414', 900: '#4d1414',
                        },
                        gold: { 400: '#d4af37', 500: '#aa8c2c', }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #fcfbfb; }
        .lux-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase tools to the global window object so React can use them safely
        window.FirebaseTools = {
            initializeApp, getAuth, signInAnonymously, getFirestore, collection, onSnapshot, query, addDoc
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        
        const { useState, useEffect } = React;

        const MY_FIREBASE_CONFIG = {
          apiKey: "AIzaSyC0qsco6OLLAJnzxDqXR6OFjQLmtx8_ngA",
          authDomain: "jyothi-tailors.firebaseapp.com",
          projectId: "jyothi-tailors",
          storageBucket: "jyothi-tailors.firebasestorage.app",
          messagingSenderId: "768098264466",
          appId: "1:768098264466:web:9ed8ff328547eacf6b4d4b"
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [db, setDb] = useState(null);
            const [cloudStatus, setCloudStatus] = useState('connecting');
            const [orders, setOrders] = useState([]);
            const [msgBox, setMsgBox] = useState(null);

            const showMessage = (title, text, type="info") => {
                setMsgBox({ title, text, type });
            };

            useEffect(() => {
                const connectCloud = async () => {
                    try {
                        if (!window.FirebaseTools) {
                            setTimeout(connectCloud, 500); // Retry if tools aren't loaded yet
                            return;
                        }
                        
                        const { initializeApp, getFirestore, getAuth, signInAnonymously, collection, onSnapshot, query } = window.FirebaseTools;
                        
                        const app = initializeApp(MY_FIREBASE_CONFIG);
                        const firestore = getFirestore(app);
                        const auth = getAuth(app);

                        await signInAnonymously(auth);
                        setDb(firestore);
                        setCloudStatus('connected');

                        // Listen for Live Orders
                        const q = query(collection(firestore, 'public_orders'));
                        onSnapshot(q, (snapshot) => {
                            const loadedOrders = [];
                            snapshot.forEach((doc) => {
                                loadedOrders.push({ id: doc.id, ...doc.data() });
                            });
                            setOrders(loadedOrders);
                        });
                    } catch (err) {
                        console.error("Firebase connection failed:", err);
                        setCloudStatus('error');
                    }
                };
                
                connectCloud();
            }, []);

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800">
                    <header className="bg-white sticky top-0 z-50 lux-shadow">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                                <div className="w-10 h-10 bg-maroon-600 text-gold-400 rounded-full flex items-center justify-center text-xl">
                                    <i className="fa-solid fa-scissors"></i>
                                </div>
                                <div>
                                    <h1 className="font-serif text-xl font-bold text-maroon-900 leading-tight">Jyothi</h1>
                                    <p className="text-xs tracking-widest text-gray-500 uppercase">Ladies Tailor</p>
                                </div>
                            </div>
                            <nav className="hidden md:flex space-x-8 items-center">
                                <button onClick={() => setActiveTab('home')} className={`text-sm font-medium ${activeTab === 'home' ? 'text-maroon-600' : 'text-gray-600'}`}>Home</button>
                                <button onClick={() => setActiveTab('track')} className={`text-sm font-medium ${activeTab === 'track' ? 'text-maroon-600' : 'text-gray-600'}`}>Track Order</button>
                                <button onClick={() => setActiveTab('owner')} className="bg-maroon-50 text-maroon-700 px-4 py-2 rounded-full text-sm font-medium">
                                    <i className="fa-solid fa-crown mr-2 text-gold-500"></i> Owner Login
                                </button>
                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow">
                        {activeTab === 'home' && <HomeTab setActiveTab={setActiveTab} />}
                        {activeTab === 'track' && <TrackTab orders={orders} />}
                        {activeTab === 'owner' && <OwnerTab db={db} cloudStatus={cloudStatus} orders={orders} showMessage={showMessage} />}
                    </main>

                    {msgBox && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full lux-shadow text-center">
                                <h3 className="text-xl font-bold text-gray-900 mb-2">{msgBox.title}</h3>
                                <p className="text-gray-600 mb-6">{msgBox.text}</p>
                                <button onClick={() => setMsgBox(null)} className="w-full bg-gray-900 text-white py-3 rounded-xl">OK</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function HomeTab({ setActiveTab }) {
            return (
                <section className="bg-maroon-50 px-4 py-20 text-center">
                    <h1 className="font-serif text-4xl font-bold text-gray-900 mb-6">Perfect Fit, Beautifully Crafted.</h1>
                    <button onClick={() => setActiveTab('track')} className="bg-maroon-600 text-white px-8 py-4 rounded-full font-medium">Track My Order</button>
                </section>
            );
        }

        function TrackTab({ orders }) {
            const [searchId, setSearchId] = useState('');
            const [result, setResult] = useState(null);

            const handleSearch = (e) => {
                e.preventDefault();
                setResult(orders.find(o => o.orderId.toLowerCase() === searchId.toLowerCase()) || 'none');
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-16 text-center">
                    <h2 className="font-serif text-3xl font-bold mb-8">Track Your Outfit</h2>
                    <form onSubmit={handleSearch} className="flex gap-2 mb-8">
                        <input type="text" placeholder="Order ID..." value={searchId} onChange={e => setSearchId(e.target.value)} className="flex-grow px-4 py-2 border rounded-full" />
                        <button type="submit" className="bg-gray-900 text-white px-6 py-2 rounded-full">Track</button>
                    </form>
                    
                    {result && result !== 'none' && (
                        <div className="bg-white p-6 rounded-xl lux-shadow text-left">
                            <h3 className="text-xl font-bold">{result.orderId}</h3>
                            <p className="text-maroon-600 font-bold mb-4">{result.status}</p>
                            <p>Customer: {result.customerName}</p>
                            <p>Item: {result.itemType}</p>
                        </div>
                    )}
                    {result === 'none' && <p className="text-gray-500">Order not found.</p>}
                </div>
            );
        }

        function OwnerTab({ db, cloudStatus, orders, showMessage }) {
            const [passcode, setPasscode] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [newOrder, setNewOrder] = useState({ customerName: '', itemType: '', status: 'Fabric Received' });

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === 'jyothi123') setIsAuthenticated(true);
                else showMessage("Error", "Incorrect Passcode");
            };

            const handleAddOrder = async (e) => {
                e.preventDefault();
                if (!db) return showMessage("Error", "Cloud disconnected");
                try {
                    const { collection, addDoc } = window.FirebaseTools;
                    const orderId = `ORD-${Math.floor(1000 + Math.random() * 9000)}`;
                    await addDoc(collection(db, 'public_orders'), {
                        orderId, ...newOrder, date: new Date().toISOString()
                    });
                    showMessage("Success", "Order saved!");
                } catch (err) {
                    showMessage("Error", err.message);
                }
            };

            if (!isAuthenticated) return (
                <div className="max-w-md mx-auto py-20 px-4 text-center">
                    <h2 className="text-2xl font-bold mb-4">Owner Login</h2>
                    <form onSubmit={handleLogin}>
                        <input type="password" placeholder="Passcode" value={passcode} onChange={e => setPasscode(e.target.value)} className="border p-3 w-full rounded mb-4" />
                        <button className="bg-maroon-600 text-white px-6 py-3 rounded w-full">Login</button>
                    </form>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto py-12 px-4">
                    <h2 className="text-2xl font-bold mb-4">Dashboard <span className={`text-sm ml-4 ${cloudStatus === 'connected' ? 'text-green-600' : 'text-red-600'}`}>[{cloudStatus}]</span></h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-white p-6 rounded shadow">
                            <h3 className="font-bold mb-4">Add Order</h3>
                            <form onSubmit={handleAddOrder} className="space-y-4">
                                <input placeholder="Customer Name" required value={newOrder.customerName} onChange={e => setNewOrder({...newOrder, customerName: e.target.value})} className="border p-2 w-full" />
                                <input placeholder="Item Type" required value={newOrder.itemType} onChange={e => setNewOrder({...newOrder, itemType: e.target.value})} className="border p-2 w-full" />
                                <button className="bg-black text-white p-2 w-full">Save to Cloud</button>
                            </form>
                        </div>
                        
                        <div className="bg-white p-6 rounded shadow overflow-y-auto max-h-96">
                            <h3 className="font-bold mb-4">Active Orders</h3>
                            {orders.map(o => (
                                <div key={o.id} className="border-b py-2">
                                    <strong>{o.orderId}</strong> - {o.customerName} <span className="text-maroon-600 text-sm ml-2">({o.status})</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
