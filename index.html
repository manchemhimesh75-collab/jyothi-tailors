        /**

         * falls back silently to Base64 data if configurations are missing.
         */
        const uploadToCloudinary = async (fileData) => {
            if (!fileData) return null;
            
            // Check if user still has the placeholder default text
            if (CLOUDINARY_CLOUD_NAME === "your_cloud_name" || CLOUDINARY_UPLOAD_PRESET === "your_unsigned_preset_name") {
                console.log("Cloudinary parameters not yet updated, fallback to base64 mode.");
                return fileData;
            }

            try {
                const formData = new FormData();
                formData.append("file", fileData);
                formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

                if (!response.ok) {
                    throw new Error("Cloudinary rejected upload");
                }

                const data = await response.json();
                return data.secure_url; // Returns the high-speed live image URL
            } catch (error) {
                console.warn("Cloudinary upload failed, falling back to local base64:", error.message);
                return fileData;
            }

        const OrderFormView = ({ t, addOrder }) => {
            const [formData, setFormData] = useState({
                name: '', phone: '', whatsapp: '', email: '', address: '', measurements: '', instructions: ''
            });
            const [items, setItems] = useState([{ dressType: '', fabricDetails: '', quantity: 1, images: [] }]);
            const [measurementSheet, setMeasurementSheet] = useState(null);
            const [measurementFileName, setMeasurementFileName] = useState('');
            const [submitted, setSubmitted] = useState(false);
            const [orderId, setOrderId] = useState('');
            const [showPromptModal, setShowPromptModal] = useState(true);
            const [isUploading, setIsUploading] = useState(false); 

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleItemChange = (index, field, value) => {
                const updatedItems = [...items];
                updatedItems[index][field] = value;
                setItems(updatedItems);
            };

            const handleItemImageUpload = (index, e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const updatedItems = [...items];
                if (!updatedItems[index].images) {
                    updatedItems[index].images = [];
                }

                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updatedItems[index].images.push(reader.result);
                        setItems([...updatedItems]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleRemoveItemImage = (itemIndex, imageIndex) => {
                const updatedItems = [...items];
                updatedItems[itemIndex].images.splice(imageIndex, 1);
                setItems(updatedItems);
            };

            const addItemRow = () => {
                setItems([...items, { dressType: '', fabricDetails: '', quantity: 1, images: [] }]);
            };

            const removeItemRow = (index) => {
                if (items.length > 1) {
                    setItems(items.filter((_, idx) => idx !== index));
                }
            };

            const handleMeasurementUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setMeasurementFileName(file.name);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setMeasurementSheet(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsUploading(true);

                try {
                    const uploadedItems = [];
                    // Upload files to Cloudinary cloud loop
                    for (let item of items) {
                        const uploadedImages = [];
                        if (item.images && item.images.length > 0) {
                            for (let img of item.images) {
                                const cloudUrl = await uploadToCloudinary(img);
                                uploadedImages.push(cloudUrl);
                            }
                        }
                        uploadedItems.push({
                            ...item,
                            images: uploadedImages
                        });
                    }

                    // Upload measurement charts
                    let finalMeasurementSheet = null;
                    if (measurementSheet) {
                        finalMeasurementSheet = await uploadToCloudinary(measurementSheet);
                    }

                    const newId = 'ORD-' + Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                    const newOrder = {
                        id: newId,
                        ...formData,
                        items: uploadedItems,
                        measurementSheet: finalMeasurementSheet,
                        measurementFileName: measurementFileName,
                        status: 'Received',
                        amount: 0,
                        discount: 0,
                        amountPaid: 0,
                        date: new Date().toISOString().split('T')[0]
                    };
                    await addOrder(newOrder);
                    setOrderId(newId);
                    setSubmitted(true);
                    window.scrollTo(0, 0);
                } catch (err) {
                    console.error("Order submit upload error:", err);
                } finally {
                    setIsUploading(false);
                }
            };

            if (submitted) {
                return (
                    <div className="py-20 min-h-[60vh] flex items-center justify-center bg-cream px-4">
                        <div className="bg-white p-10 rounded shadow-2xl text-center max-w-md w-full border-t-4 border-green-500 modal-animate">
                            <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fa-solid fa-check text-3xl text-green-600"></i>
                            </div>
                            <h2 className="text-3xl font-serif font-bold text-maroon-700 mb-4">Registration Complete</h2>
                            <p className="text-gray-850 text-sm mb-6">{t.form.success}</p>
                            <div className="bg-gray-50 p-4 rounded mb-6 border border-gray-200">
                                <p className="text-xs text-gray-500 mb-1 font-bold uppercase font-sans">Your Temporary Passcode / Order ID</p>
                                <p className="text-2xl font-mono font-bold text-maroon-800 tracking-widest">{orderId}</p>
                            </div>

                            <div className="bg-green-50 border-2 border-green-200 rounded p-4 mb-6 text-left text-xs text-green-800 leading-relaxed font-sans">
                                <p className="font-bold mb-1 flex items-center gap-1.5 text-green-950">
                                    <i className="fa-solid fa-circle-info text-sm"></i> Immediate Action Required
                                </p>
                                <p className="font-medium text-gray-800">
                                    To approve design choices, discuss customization rates, or set up fabric pickup details, please call or WhatsApp our atelier with this Order ID. Use this ID to track your live order stage.
                                </p>
                            </div>

                            <div className="bg-maroon-50 border border-maroon-100 p-4 rounded text-left mb-6 text-xs">
                                <p className="font-bold text-maroon-800 mb-2"><i className="fa-solid fa-location-dot mr-1 text-sm"></i>Drop-off Atelier Address:</p>
                                <div className="text-gray-700 leading-relaxed font-sans space-y-0.5">
                                    <p className="font-bold text-maroon-900">MANCHEM JYOTHI</p>
                                    <p>Dr.No: 79-20-3</p>
                                    <p>Sri Sai Towers, Second Floor: B5</p>
                                    <p>Omkar Street, Gandhi Puram</p>
                                    <p className="text-xs text-gray-650 italic">Beside Vijatha Grand, Beside S Car Wash</p>
                                    <p className="font-semibold text-maroon-900">East Godavari, Andhra Pradesh</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <a 
                                    href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, `Hello, I just registered order ${orderId} on your portal. My name is ${formData.name}.`)} 
                                    target="_blank" 
                                    rel="noreferrer" 
                                    className="flex items-center justify-center gap-2 px-4 py-3 rounded text-xs tracking-wider uppercase font-bold bg-[#25D366] text-white hover:bg-[#128C7E] transition shadow-md active:scale-95"
                                >
                                    <i className="fa-brands fa-whatsapp text-lg"></i> Message Us
                                </a>
                                <a 
                                    href="tel:+919948698878" 
                                    className="flex items-center justify-center gap-2 px-4 py-3 rounded text-xs tracking-wider uppercase font-bold bg-maroon-700 text-white hover:bg-maroon-800 transition shadow-md active:scale-95 border border-maroon-700"
                                >
                                    <i className="fa-solid fa-phone"></i> Call Atelier
                                </a>
                            </div>

                            <Button onClick={() => setSubmitted(false)} variant="outline" className="w-full text-xs">Place Another Order</Button>
                        </div>
                    </div>
                );
            }

            const inputStyle = "w-full p-3 border-2 border-maroon-200 rounded focus:ring-2 focus:ring-maroon-500 outline-none text-sm transition font-sans text-gray-900 font-semibold";
            const labelStyle = "block text-xs font-bold uppercase text-gray-800 mb-2 tracking-wide font-sans";

            return (
                <div className="py-16 bg-pattern min-h-screen">
                    {showPromptModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 modal-animate">
                            <div className="bg-white rounded shadow-2xl p-6 max-w-sm w-full border-t-4 border-maroon-700 text-center relative slide-animate">
                                <button 
                                    onClick={() => setShowPromptModal(false)} 
                                    className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-lg"
                                >
                                    <i className="fa-solid fa-times"></i>
                                </button>
                                <div className="w-16 h-16 bg-maroon-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-maroon-100">
                                    <i className="fa-solid fa-phone-volume text-2xl text-maroon-700 animate-bounce"></i>
                                </div>
                                <h3 className="text-xl font-serif font-bold text-maroon-800 mb-2">Bespoke Fitting Advice</h3>
                                <p className="text-xs text-gray-700 mb-6 leading-relaxed font-sans font-medium">
                                    For the best quality custom fits and heavy design/maggam configurations, direct consult with our master tailors is highly recommended! Call or WhatsApp us instantly.
                                </p>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <a 
                                        href="tel:+919948698878" 
                                        className="flex items-center justify-center gap-2 px-4 py-3 rounded text-xs uppercase font-bold tracking-wider bg-maroon-700 text-white hover:bg-maroon-800 transition shadow-md active:scale-95"
                                    >
                                        <i className="fa-solid fa-phone"></i> Call Atelier
                                    </a>
                                    <a 
                                        href={getSanitizedWhatsAppLink(WHATSAPP_NUMBER, "Hello, I want to book a design consultation with you.")} 
                                        target="_blank" 
                                        rel="noreferrer" 
                                        className="flex items-center justify-center gap-2 px-4 py-3 rounded text-xs uppercase font-bold tracking-wider bg-[#25D366] text-white hover:bg-[#128C7E] transition shadow-md active:scale-95"
                                    >
                                        <i className="fa-brands fa-whatsapp text-lg"></i> WhatsApp
                                    </a>
                                </div>
                                <button 
                                    onClick={() => setShowPromptModal(false)}
                                    className="text-[10px] text-gray-655 hover:text-maroon-700 uppercase tracking-widest font-bold transition underline font-sans"
